version: "3.8"

services:
  app:
    image: 167729539/dns:latest
    container_name: dns-app
    restart: unless-stopped
    network_mode: host
    
    # 资源限制
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 256M
    
    # 挂载目录和配置文件
    volumes:
      - ./plugins:/opt/dns/plugins      # 插件目录
      - ./logs:/opt/dns/logs            # 日志目录
      - ./backups:/opt/dns/backups      # 备份目录
      - ./.env:/opt/dns/.env:ro         # 配置文件（只读）
    
    # 健康检查
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
