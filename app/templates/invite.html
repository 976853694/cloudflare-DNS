{% extends "base.html" %}

{% block title %}{{ site_settings.site_name|default('六趣DNS') }} - 邀请好友{% endblock %}

{% block content %}
<div class="pt-14 lg:pt-0 min-h-screen">
    <div class="p-4 lg:p-6" x-data="invitePage()">
        <!-- 页面标题 -->
        <div class="mb-6">
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('invite.title')"></h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1" x-text="$store.i18n.t('invite.description')"></p>
        </div>

        <!-- 邀请统计卡片 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <!-- 已邀请人数 -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('invite.totalInvited')"></p>
                        <p class="text-3xl font-bold text-blue-600 dark:text-blue-400 mt-1" x-text="inviteInfo.total_invited || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- 已首充人数 -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('invite.rechargedCount')"></p>
                        <p class="text-3xl font-bold text-green-600 dark:text-green-400 mt-1" x-text="inviteInfo.recharged_count || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- 已获得积分 -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('invite.totalEarned')"></p>
                        <p class="text-3xl font-bold text-orange-600 dark:text-orange-400 mt-1" x-text="inviteInfo.total_earned || 0"></p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 dark:bg-orange-900/30 rounded-full flex items-center justify-center">
                        <svg class="w-6 h-6 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- 邀请码区域 -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
                <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.t('invite.inviteCode')"></h2>
                </div>
                <div class="p-6">
                    <!-- 邀请码 -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('invite.yourCode')"></label>
                        <div class="flex items-center space-x-2">
                            <div class="flex-1 px-4 py-3 bg-gray-100 dark:bg-gray-700 rounded-lg text-center">
                                <span class="text-2xl font-mono font-bold text-blue-600 dark:text-blue-400" x-text="inviteInfo.invite_code || '---'"></span>
                            </div>
                            <button @click="copyCode()" class="px-4 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 hover:shadow-xl text-white rounded-lg transition">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- 邀请链接 -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('invite.inviteLink')"></label>
                        <div class="flex items-center space-x-2">
                            <input type="text" readonly :value="inviteLink" 
                                   class="flex-1 px-4 py-2 bg-gray-100 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-lg text-gray-600 dark:text-gray-300 text-sm">
                            <button @click="copyLink()" class="px-4 py-2 bg-green-600 hover:bg-green-700 text-white rounded-lg transition whitespace-nowrap">
                                <span x-text="$store.i18n.t('invite.copyLink')"></span>
                            </button>
                        </div>
                    </div>

                    <!-- 奖励说明 -->
                    <div class="bg-blue-50 dark:bg-blue-900/20 rounded-lg p-4">
                        <h3 class="text-sm font-medium text-blue-800 dark:text-blue-300 mb-2" x-text="$store.i18n.t('invite.rewardRules')"></h3>
                        <ul class="text-sm text-blue-700 dark:text-blue-400 space-y-1">
                            <li class="flex items-center">
                                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                                <span x-text="$store.i18n.t('invite.registerReward', {points: inviteInfo.register_reward || 50})"></span>
                            </li>
                            <li class="flex items-center" x-show="inviteInfo.invitee_reward > 0">
                                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                                <span x-text="$store.i18n.t('invite.inviteeReward', {points: inviteInfo.invitee_reward || 30})"></span>
                            </li>
                            <li class="flex items-center">
                                <svg class="w-4 h-4 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>
                                </svg>
                                <span x-text="$store.i18n.t('invite.rechargeReward', {points: inviteInfo.recharge_reward || 100})"></span>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <!-- 邀请记录 -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl border-2 border-gray-200 dark:border-gray-700 hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
                <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                    <h2 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.t('invite.inviteRecords')"></h2>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700/50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('invite.invitee')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('invite.status')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('invite.reward')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('invite.time')"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                            <template x-if="recordsLoading">
                                <tr>
                                    <td colspan="4" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                                        <svg class="animate-spin h-6 w-6 mx-auto mb-2" fill="none" viewBox="0 0 24 24">
                                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                        </svg>
                                        <span x-text="$store.i18n.t('common.loading')"></span>
                                    </td>
                                </tr>
                            </template>
                            <template x-if="!recordsLoading && records.length === 0">
                                <tr>
                                    <td colspan="4" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('common.noData')"></td>
                                </tr>
                            </template>
                            <template x-for="record in records" :key="record.id">
                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                    <td class="px-4 py-3 text-sm text-gray-900 dark:text-white" x-text="record.invitee?.username || '-'"></td>
                                    <td class="px-4 py-3">
                                        <span :class="record.status === 1 ? 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400' : 'bg-gray-100 text-gray-800 dark:bg-gray-700 dark:text-gray-300'"
                                              class="px-2 py-1 text-xs rounded-full" x-text="record.status_text"></span>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-green-600 dark:text-green-400 font-medium">
                                        +<span x-text="record.total_reward"></span>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400" x-text="record.created_at"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
                <!-- 分页 -->
                <div class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between" x-show="recordsTotal > 0">
                    <span class="text-sm text-gray-500 dark:text-gray-400">
                        <span x-text="$store.i18n.t('common.total')"></span> <span x-text="recordsTotal"></span> <span x-text="$store.i18n.t('common.items')"></span>
                    </span>
                    <div class="flex space-x-2">
                        <button @click="loadRecords(recordsPage - 1)" :disabled="recordsPage <= 1"
                                class="px-3 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-text="$store.i18n.t('common.prev')"></span>
                        </button>
                        <span class="px-3 py-1 text-sm text-gray-600 dark:text-gray-400" x-text="recordsPage + ' / ' + recordsPages"></span>
                        <button @click="loadRecords(recordsPage + 1)" :disabled="recordsPage >= recordsPages"
                                class="px-3 py-1 text-sm border border-gray-300 dark:border-gray-600 rounded hover:bg-gray-100 dark:hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed">
                            <span x-text="$store.i18n.t('common.next')"></span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast 提示 -->
        <div x-show="toast.show" x-cloak
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 transform translate-y-2"
             x-transition:enter-end="opacity-100 transform translate-y-0"
             x-transition:leave="transition ease-in duration-200"
             x-transition:leave-start="opacity-100 transform translate-y-0"
             x-transition:leave-end="opacity-0 transform translate-y-2"
             :class="toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'"
             class="fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white shadow-lg z-50">
            <span x-text="toast.message"></span>
        </div>
    </div>
</div>

<script>
function invitePage() {
    return {
        inviteInfo: {},
        records: [],
        recordsLoading: false,
        recordsPage: 1,
        recordsPages: 1,
        recordsTotal: 0,
        toast: { show: false, message: '', type: 'success' },

        get inviteLink() {
            if (!this.inviteInfo.invite_code) return '';
            return window.location.origin + '/register?invite=' + this.inviteInfo.invite_code;
        },

        async init() {
            await this.loadInviteInfo();
            await this.loadRecords(1);
        },

        async loadInviteInfo() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/login';
                return;
            }

            try {
                const res = await fetch('/api/invite/info', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.inviteInfo = data.data;
                }
            } catch (e) {
                console.error('Load invite info failed:', e);
            }
        },

        async loadRecords(page) {
            this.recordsLoading = true;
            const token = localStorage.getItem('token');

            try {
                const res = await fetch(`/api/invite/list?page=${page}&per_page=10`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    this.records = data.data.records;
                    this.recordsPage = data.data.page;
                    this.recordsPages = data.data.pages;
                    this.recordsTotal = data.data.total;
                }
            } catch (e) {
                console.error('Load records failed:', e);
            } finally {
                this.recordsLoading = false;
            }
        },

        copyCode() {
            if (!this.inviteInfo.invite_code) return;
            navigator.clipboard.writeText(this.inviteInfo.invite_code).then(() => {
                this.showToast(Alpine.store('i18n').t('common.copied'), 'success');
            });
        },

        copyLink() {
            if (!this.inviteLink) return;
            navigator.clipboard.writeText(this.inviteLink).then(() => {
                this.showToast(Alpine.store('i18n').t('common.copied'), 'success');
            });
        },

        showToast(message, type = 'success') {
            this.toast = { show: true, message, type };
            setTimeout(() => { this.toast.show = false; }, 3000);
        }
    };
}
</script>
{% endblock %}
