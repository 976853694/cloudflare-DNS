<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                    <!-- Header -->
                    <tr>
                        <td style="padding:40px 40px 20px;text-align:center;">
                            <h1 style="margin:0;color:#333;font-size:24px;">{{ title }}</h1>
                        </td>
                    </tr>
                    
                    <!-- Content -->
                    <tr>
                        <td style="padding:0 40px 20px;color:#666;font-size:14px;line-height:1.6;">
                            {{ content|safe }}
                        </td>
                    </tr>
                    
                    <!-- Button (optional) -->
                    {% if button_url and button_text %}
                    <tr>
                        <td style="padding:0 40px 30px;text-align:center;">
                            <a href="{{ button_url }}" style="display:inline-block;padding:12px 40px;background:#1a1a1a;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;">{{ button_text }}</a>
                        </td>
                    </tr>
                    {% endif %}
                    
                    <!-- Link fallback (optional) -->
                    {% if button_url %}
                    <tr>
                        <td style="padding:0 40px 20px;color:#999;font-size:12px;">
                            <p>如果按钮无法点击，请复制以下链接到浏览器：</p>
                            <p style="word-break:break-all;color:#666;">{{ button_url }}</p>
                        </td>
                    </tr>
                    {% endif %}
                    
                    <!-- Footer -->
                    <tr>
                        <td style="padding:20px 40px;border-top:1px solid #eee;color:#999;font-size:12px;text-align:center;">
                            {% if expiry_note %}
                            <p>{{ expiry_note }}</p>
                            {% endif %}
                            <p>如非本人操作，请忽略此邮件。</p>
                            {% if site_name %}
                            <p style="margin-top:15px;color:#ccc;">© {{ site_name }}</p>
                            {% endif %}
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
