<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="margin:0;padding:0;background:#f5f5f5;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
        <tr>
            <td align="center">
                <table width="600" cellpadding="0" cellspacing="0" style="background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1);">
                    <tr>
                        <td style="padding:40px 40px 20px;text-align:center;">
                            <h1 style="margin:0;color:#333;font-size:24px;">域名到期提醒</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 40px 20px;color:#666;font-size:14px;line-height:1.8;">
                            <p>您的域名 <strong style="color:#333;">{{ domain_name }}</strong> 将于 <strong style="color:#e74c3c;">{{ days_remaining }}天后</strong> 到期。</p>
                            <p>到期时间: {{ expires_at }}</p>
                            <p>请及时续费以避免服务中断。</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:0 40px 30px;text-align:center;">
                            <a href="{{ renew_url }}" style="display:inline-block;padding:12px 40px;background:#1a1a1a;color:#fff;text-decoration:none;border-radius:6px;font-size:14px;">立即续费</a>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:20px 40px;border-top:1px solid #eee;color:#999;font-size:12px;text-align:center;">
                            <p>如非本人操作，请忽略此邮件。</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
