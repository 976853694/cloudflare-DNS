{% extends "base.html" %}

{% block title %}{{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="profilePage()" x-init="init()">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-6" x-text="$store.i18n.t('nav.profile')"></h1>

    <div class="grid lg:grid-cols-3 gap-4 sm:gap-6">
        <!-- Left: Account Info -->
        <div class="lg:col-span-2 space-y-6">
            <!-- Basic Info -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '账户信息' : 'Account Info'"></h2>
                </div>
                <div class="p-6">
                    <div class="flex items-center space-x-4 mb-6">
                        <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-blue-600 rounded-full flex items-center justify-center text-white text-2xl font-bold" x-text="user?.username?.charAt(0).toUpperCase()"></div>
                        <div>
                            <p class="text-xl font-semibold text-gray-900 dark:text-white" x-text="user?.username"></p>
                            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="user?.email"></p>
                        </div>
                    </div>
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('user.role')"></p>
                            <p class="font-medium text-gray-900 dark:text-white mt-1" x-text="user?.role === 'admin' ? $store.i18n.t('user.admin') : (user?.role === 'demo' ? ($store.i18n.locale === 'zh' ? '演示用户' : 'Demo User') : $store.i18n.t('user.normalUser'))"></p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('common.status')"></p>
                            <p class="font-medium mt-1" :class="user?.status === 1 ? 'text-green-600' : 'text-red-600'" x-text="user?.status === 1 ? ($store.i18n.locale === 'zh' ? '正常' : 'Active') : ($store.i18n.locale === 'zh' ? '已禁用' : 'Disabled')"></p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('user.balance')"></p>
                            <p class="font-medium mt-1" :class="user?.balance == -1 ? 'text-purple-600' : 'text-gray-900 dark:text-white'" x-text="user?.balance_text || '¥0'"></p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('user.registerTime')"></p>
                            <p class="font-medium text-gray-900 dark:text-white mt-1" x-text="user?.created_at ? new Date(user.created_at).toLocaleDateString() : '-'"></p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '域名配额' : 'Domain Quota'"></p>
                            <p class="font-medium text-gray-900 dark:text-white mt-1"><span x-text="user?.used_domains || 0"></span> / <span x-text="user?.max_domains || 5"></span></p>
                        </div>
                        <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? 'DNS记录' : 'DNS Records'"></p>
                            <p class="font-medium text-gray-900 dark:text-white mt-1" x-text="stats.records_count || 0"></p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Change Password -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden" x-show="smtpEnabled">
                <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.t('auth.changePassword')"></h2>
                </div>
                <div class="p-6">
                    <div x-show="!pwdSent" class="max-w-md">
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4"><span x-text="$store.i18n.locale === 'zh' ? '点击下方按钮，我们将发送验证邮件到您的邮箱' : 'Click the button below, we will send a verification email to'"></span> <span class="font-medium text-gray-700 dark:text-gray-300" x-text="user?.email"></span><span x-text="$store.i18n.locale === 'zh' ? '，验证后即可设置新密码。' : ', then you can set a new password.'"></span></p>
                        <button @click="openPwdModal()" class="px-6 py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600" x-text="$store.i18n.t('auth.sendVerifyEmail')">
                        </button>
                    </div>
                    <div x-show="pwdSent" x-cloak class="text-center py-4">
                        <div class="w-12 h-12 mx-auto mb-3 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-gray-900 dark:text-white font-medium" x-text="$store.i18n.t('auth.emailSent')"></p>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1" x-text="$store.i18n.t('auth.clickLinkToComplete')"></p>
                        <button @click="pwdSent = false" class="mt-4 text-blue-600 hover:underline text-sm" x-text="$store.i18n.t('auth.resendCode')"></button>
                    </div>
                </div>
            </div>

            <!-- Change Email -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden" x-show="smtpEnabled">
                <div class="px-4 sm:px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.t('auth.changeEmail')"></h2>
                </div>
                <div class="p-4 sm:p-6">
                    <div x-show="!emailSent" class="max-w-md">
                        <p class="text-gray-500 dark:text-gray-400 text-sm mb-4"><span x-text="$store.i18n.locale === 'zh' ? '点击下方按钮，我们将发送验证邮件到您的当前邮箱' : 'Click the button below, we will send a verification email to your current email'"></span> <span class="font-medium text-gray-700 dark:text-gray-300" x-text="user?.email"></span><span x-text="$store.i18n.locale === 'zh' ? '，验证身份后可输入新邮箱。' : ', then you can enter a new email.'"></span></p>
                        <button @click="openEmailModal()" class="px-6 py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600" x-text="$store.i18n.t('auth.sendVerifyEmail')">
                        </button>
                    </div>
                    <div x-show="emailSent" x-cloak class="text-center py-4">
                        <div class="w-12 h-12 mx-auto mb-3 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                        <p class="text-gray-900 dark:text-white font-medium" x-text="$store.i18n.t('auth.emailSent')"></p>
                        <p class="text-gray-500 dark:text-gray-400 text-sm mt-1" x-text="$store.i18n.t('auth.clickLinkToComplete')"></p>
                        <button @click="emailSent = false" class="mt-4 text-blue-600 hover:underline text-sm" x-text="$store.i18n.t('auth.resendCode')"></button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right: Quick Stats -->
        <div class="space-y-6">
            <!-- Usage Stats -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '使用统计' : 'Usage Stats'"></h2>
                </div>
                <div class="p-6 space-y-4">
                    <div>
                        <div class="flex justify-between text-sm mb-1">
                            <span class="text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '域名配额使用' : 'Domain Quota Usage'"></span>
                            <span class="text-gray-900 dark:text-white font-medium"><span x-text="user?.used_domains || 0"></span>/<span x-text="user?.max_domains || 5"></span></span>
                        </div>
                        <div class="w-full bg-gray-100 dark:bg-gray-700 rounded-full h-2">
                            <div class="bg-blue-500 h-2 rounded-full transition-all" :style="'width: ' + Math.min(100, ((user?.used_domains || 0) / (user?.max_domains || 5)) * 100) + '%'"></div>
                        </div>
                    </div>
                    <div class="pt-4 border-t border-gray-100 dark:border-gray-700">
                        <div class="flex justify-between py-2">
                            <span class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.locale === 'zh' ? '总购买次数' : 'Total Orders'"></span>
                            <span class="font-medium text-gray-900 dark:text-white" x-text="stats.orders_count || 0"></span>
                        </div>
                        <div class="flex justify-between py-2">
                            <span class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.locale === 'zh' ? '总DNS记录' : 'Total DNS Records'"></span>
                            <span class="font-medium text-gray-900 dark:text-white" x-text="stats.records_count || 0"></span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
                <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '快捷操作' : 'Quick Actions'"></h2>
                </div>
                <div class="p-4 space-y-2">
                    <a href="/user/domains/new" class="flex items-center px-4 py-3 bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition">
                        <svg class="w-5 h-5 text-blue-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                        <span class="text-gray-700 dark:text-gray-300" x-text="$store.i18n.t('nav.buyDomain')"></span>
                    </a>
                    <a href="/user/redeem" class="flex items-center px-4 py-3 bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition">
                        <svg class="w-5 h-5 text-green-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"></path></svg>
                        <span class="text-gray-700 dark:text-gray-300" x-text="$store.i18n.t('nav.redeemCode')"></span>
                    </a>
                    <a href="/user/orders" class="flex items-center px-4 py-3 bg-gray-50 dark:bg-gray-700 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-600 transition">
                        <svg class="w-5 h-5 text-purple-600 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                        <span class="text-gray-700 dark:text-gray-300" x-text="$store.i18n.t('nav.orderHistory')"></span>
                    </a>
                </div>
            </div>

            <!-- Logout -->
            <button @click="logout" class="w-full px-4 py-3 border border-red-200 dark:border-red-800 text-red-600 rounded-xl hover:bg-red-50 dark:hover:bg-red-900/20 transition text-sm font-medium" x-text="$store.i18n.t('common.logout')">
            </button>
        </div>
    </div>

    <!-- 验证码弹窗 -->
    <div x-show="showModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="closeModal()">
        <!-- 遮罩 -->
        <div class="absolute inset-0 bg-black/50" @click="closeModal()"></div>
        <!-- 弹窗内容 -->
        <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md p-6" @click.stop>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="modalType === 'pwd' ? ($store.i18n.locale === 'zh' ? '修改密码验证' : 'Change Password Verification') : ($store.i18n.locale === 'zh' ? '修改邮箱验证' : 'Change Email Verification')"></h3>
                <button @click="closeModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300"></button>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <p class="text-gray-500 dark:text-gray-400 text-sm mb-4" x-text="$store.i18n.locale === 'zh' ? '请完成验证后发送邮件' : 'Please complete verification to send email'"></p>
            
            <!-- 图形验证码 -->
            <div x-show="modalCaptchaEnabled && captchaType === 'image'" class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.captcha')"></label>
                <div class="flex gap-2">
                    <input type="text" x-model="modalCaptchaCode" maxlength="4"
                        class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 text-lg tracking-widest"
                        :placeholder="$store.i18n.locale === 'zh' ? '请输入验证码' : 'Enter captcha'" @keyup.enter="submitModal()">
                    <img :src="modalCaptchaImage" @click="refreshModalCaptcha()" class="h-[50px] flex-shrink-0 rounded-lg cursor-pointer border border-gray-200 hover:border-gray-400 transition" :title="$store.i18n.locale === 'zh' ? '点击刷新' : 'Click to refresh'">
                </div>
            </div>
            
            <!-- Turnstile 验证码 -->
            <div x-show="modalCaptchaEnabled && captchaType === 'turnstile'" class="mb-4">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.humanVerify')"></label>
                <div id="turnstile-modal"></div>
            </div>
            
            <!-- 滑块验证码 -->
            <template x-if="modalCaptchaEnabled && captchaType === 'slider' && showModal">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.humanVerify')"></label>
                    <div x-data="sliderCaptcha({
                        onSuccess: (token) => {
                            modalSliderVerified = true;
                            modalSliderToken = token;
                        }
                    })" 
                    x-init="init()"
                    :key="sliderKey">
                        <div class="slider-captcha-container" :class="containerClass">
                            <template x-if="verified">
                                <div class="slider-captcha-success-icon">✓</div>
                            </template>
                            <template x-if="!verified">
                                <div>
                                    <div class="slider-captcha-bg" :style="bgStyle">
                                        <div class="slider-captcha-puzzle" :style="puzzleStyle"></div>
                                        <div class="slider-captcha-piece" :style="pieceStyle"></div>
                                        <div class="slider-captcha-refresh" @click="refresh()">
                                            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                                        </div>
                                        <div x-show="loading && status !== 'verifying'" class="slider-captcha-overlay">
                                            <div class="slider-captcha-spinner"></div>
                                        </div>
                                    </div>
                                    <div class="slider-captcha-track">
                                        <span class="slider-captcha-text" x-text="statusText"></span>
                                        <div class="slider-captcha-btn" :style="btnStyle" @mousedown="startDrag($event)" @touchstart="startDrag($event)">
                                            <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
            
            <!-- 无需验证码提示 -->
            <div x-show="!modalCaptchaEnabled" class="mb-4">
                <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.locale === 'zh' ? '点击下方按钮发送验证邮件' : 'Click the button below to send verification email'"></p>
            </div>
            
            <div class="flex gap-3">
                <button @click="closeModal()" class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700" x-text="$store.i18n.t('common.cancel')">
                </button>
                <button @click="submitModal()" 
                    :disabled="modalLoading || (modalCaptchaEnabled && captchaType === 'turnstile' && !modalTurnstileToken) || (modalCaptchaEnabled && captchaType === 'slider' && !modalSliderVerified)" 
                    class="flex-1 px-4 py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-text="modalLoading ? ($store.i18n.locale === 'zh' ? '发送中...' : 'Sending...') : $store.i18n.t('auth.sendVerifyEmail')"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function profilePage() {
    return {
        user: null, stats: {}, smtpEnabled: false,
        captchaType: 'image', turnstileSiteKey: '',
        captchaScenes: { change_password: true, change_email: true },
        pwdSent: false, emailSent: false,
        // 弹窗相关
        showModal: false, modalType: '', modalLoading: false,
        modalCaptchaId: '', modalCaptchaCode: '', modalCaptchaImage: '',
        modalTurnstileToken: '', modalTurnstileWidgetId: null,
        modalSliderVerified: false, modalSliderToken: '',
        sliderKey: 0,  // 用于强制重新创建滑块组件
        
        get token() { return localStorage.getItem('token'); },
        
        // 当前弹窗场景是否需要验证码
        get modalCaptchaEnabled() {
            if (this.modalType === 'pwd') return this.captchaScenes.change_password;
            if (this.modalType === 'email') return this.captchaScenes.change_email;
            return true;
        },
        
        async init() {
            if (!this.token) { window.location.href = '/login'; return; }
            await Promise.all([this.loadUser(), this.loadStats(), this.checkSmtp(), this.loadCaptchaConfig()]);
        },
        
        async loadCaptchaConfig() {
            try {
                const res = await fetch('/api/auth/captcha-config');
                const data = await res.json();
                if (data.code === 200) {
                    this.captchaType = data.data.type;
                    if (this.captchaType === 'turnstile') {
                        this.turnstileSiteKey = data.data.turnstile_site_key;
                    }
                    // 获取各场景的验证码开关
                    if (data.data.scenes) {
                        this.captchaScenes.change_password = data.data.scenes.change_password !== false;
                        this.captchaScenes.change_email = data.data.scenes.change_email !== false;
                    }
                }
            } catch (e) {
                this.captchaType = 'image';
            }
        },
        
        async loadUser() {
            const res = await fetch('/api/auth/me', { headers: { 'Authorization': 'Bearer ' + this.token } });
            const data = await res.json();
            if (data.code === 200) { this.user = data.data; }
            else { window.location.href = '/login'; }
        },
        
        async loadStats() {
            const [subRes, orderRes] = await Promise.all([
                fetch('/api/subdomains', { headers: { 'Authorization': 'Bearer ' + this.token } }),
                fetch('/api/purchase-records?per_page=1', { headers: { 'Authorization': 'Bearer ' + this.token } })
            ]);
            const subData = await subRes.json();
            const orderData = await orderRes.json();
            if (subData.code === 200) {
                this.stats.records_count = subData.data.subdomains.reduce((sum, s) => sum + (s.records_count || 0), 0);
            }
            if (orderData.code === 200) { this.stats.orders_count = orderData.data.pagination?.total || 0; }
        },
        
        async checkSmtp() {
            const res = await fetch('/api/auth/smtp-status');
            const data = await res.json();
            this.smtpEnabled = data.data?.configured || false;
        },
        
        // 打开修改密码弹窗
        openPwdModal() {
            this.modalType = 'pwd';
            this.openModal();
        },
        
        // 打开修改邮箱弹窗
        openEmailModal() {
            this.modalType = 'email';
            this.openModal();
        },
        
        // 打开弹窗
        openModal() {
            // 1. 先清除父组件状态
            this.showModal = true;
            this.modalSliderVerified = false;
            this.modalSliderToken = '';
            this.modalCaptchaCode = '';
            this.modalTurnstileToken = '';
            
            // 2. 等待 DOM 更新
            this.$nextTick(() => {
                // 只有启用验证码时才加载
                if (this.modalCaptchaEnabled) {
                    if (this.captchaType === 'image') {
                        this.refreshModalCaptcha();
                    } else if (this.captchaType === 'turnstile') {
                        this.renderModalTurnstile();
                    } else if (this.captchaType === 'slider') {
                        // 延迟刷新滑块验证码组件，确保组件已初始化
                        setTimeout(() => {
                            // 只需要调用 refresh()，它会自动重置 verified 状态并获取新验证码
                            this.refreshSlider();
                        }, 100);
                    }
                }
            });
        },
        
        // 刷新弹窗滑块验证码
        
        // 关闭弹窗
        closeModal() {
            // 1. 先重置滑块状态
            if (this.captchaType === 'slider') {
            }
            
            // 2. 清除父组件状态
            this.modalSliderVerified = false;
            this.modalSliderToken = '';
            this.modalCaptchaCode = '';
            this.modalTurnstileToken = '';
            
            // 3. 关闭弹窗
            this.showModal = false;
            this.modalType = '';
            this.modalLoading = false;
            
            // 4. 清理 Turnstile
            if (this.modalTurnstileWidgetId !== null && window.turnstile) {
                turnstile.remove(this.modalTurnstileWidgetId);
                this.modalTurnstileWidgetId = null;
            }
        },
        
        // 重置弹窗滑块验证码（不刷新，只重置状态）
        
        // 刷新弹窗验证码
        async refreshModalCaptcha() {
            const res = await fetch('/api/auth/captcha');
            const data = await res.json();
            if (data.code === 200) {
                this.modalCaptchaId = data.data.id;
                this.modalCaptchaImage = data.data.image;
                this.modalCaptchaCode = '';
            }
        },
        
        // 渲染弹窗 Turnstile
        renderModalTurnstile() {
            const loadAndRender = () => {
                const container = document.getElementById('turnstile-modal');
                if (!container || !window.turnstile) return;
                container.innerHTML = '';
                this.modalTurnstileWidgetId = turnstile.render(container, {
                    sitekey: this.turnstileSiteKey,
                    callback: (token) => { this.modalTurnstileToken = token; },
                    'expired-callback': () => { this.modalTurnstileToken = ''; }
                });
            };
            
            if (window.turnstile) {
                loadAndRender();
            } else {
                const script = document.createElement('script');
                script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js';
                script.async = true;
                script.onload = () => { setTimeout(loadAndRender, 100); };
                document.head.appendChild(script);
            }
        },
        
        // 提交弹窗
        async submitModal() {
            // 只有启用验证码时才验证
            if (this.modalCaptchaEnabled) {
                if (this.captchaType === 'image' && !this.modalCaptchaCode.trim()) {
                    alert('请输入验证码');
                    return;
                }
                if (this.captchaType === 'turnstile' && !this.modalTurnstileToken) {
                    alert('请完成人机验证');
                    return;
                }
                if (this.captchaType === 'slider' && !this.modalSliderVerified) {
                    alert('请完成滑块验证');
                    return;
                }
            }
            
            this.modalLoading = true;
            const url = this.modalType === 'pwd' ? '/api/auth/change-password/send' : '/api/auth/change-email/send';
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    captcha_id: this.modalCaptchaId,
                    captcha_code: this.modalCaptchaCode,
                    turnstile_token: this.modalTurnstileToken,
                    slider_token: this.modalSliderToken
                })
            });
            const data = await res.json();
            
            if (data.code === 200) {
                if (this.modalType === 'pwd') {
                    this.pwdSent = true;
                } else {
                    this.emailSent = true;
                }
                this.closeModal();
            } else {
                alert(data.message || '发送失败');
                if (this.modalCaptchaEnabled) {
                    if (this.captchaType === 'image') {
                        this.refreshModalCaptcha();
                    } else if (this.captchaType === 'turnstile' && window.turnstile && this.modalTurnstileWidgetId !== null) {
                        turnstile.reset(this.modalTurnstileWidgetId);
                        this.modalTurnstileToken = '';
                    } else if (this.captchaType === 'slider') {
                        this.modalSliderVerified = false;
                        this.modalSliderToken = '';
                    }
                }
            }
            this.modalLoading = false;
        },
        
        // ========== 滑块验证码方法 ==========
        
        async refreshSlider() {
            console.log('[Profile] Refreshing slider captcha...');
            this.sliderLoading = true;
            this.sliderStatus = 'idle';
            this.modalSliderVerified = false;
            this.sliderCurrentX = 0;
            this.sliderTrajectory = [];
            
            try {
                const response = await fetch('/api/auth/slider-captcha');
                const result = await response.json();
                
                if (result.code === 200) {
                    this.sliderToken = result.data.token;
                    this.modalSliderToken = result.data.token;
                    this.sliderStyleType = result.data.style_type;
                    this.sliderStyleParams = result.data.style_params;
                    this.sliderPuzzleX = result.data.puzzle_x;
                    this.sliderPuzzleY = result.data.puzzle_y;
                    console.log('[Profile] Slider captcha loaded, token:', this.sliderToken);
                }
            } catch (error) {
                console.error('[Profile] Failed to load slider captcha:', error);
            } finally {
                this.sliderLoading = false;
            }
        },
        
        startSliderDrag(e) {
            if (this.sliderLoading || this.modalSliderVerified || this.sliderStatus === 'verifying') return;
            
            e.preventDefault();
            this.sliderIsDragging = true;
            this.sliderStatus = 'dragging';
            this.sliderTrajectory = [];
            this.sliderStartTime = Date.now();
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            this.sliderStartX = clientX - this.sliderCurrentX;
            
            this.recordSliderTrajectory(e);
            
            document.addEventListener('mousemove', this.onSliderDrag.bind(this));
            document.addEventListener('mouseup', this.endSliderDrag.bind(this));
            document.addEventListener('touchmove', this.onSliderDrag.bind(this), { passive: false });
            document.addEventListener('touchend', this.endSliderDrag.bind(this));
        },
        
        onSliderDrag(e) {
            if (!this.sliderIsDragging) return;
            
            e.preventDefault();
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let newX = clientX - this.sliderStartX;
            
            newX = Math.max(0, Math.min(newX, this.sliderMaxSlide));
            this.sliderCurrentX = newX;
            
            this.recordSliderTrajectory(e);
        },
        
        async endSliderDrag(e) {
            if (!this.sliderIsDragging) return;
            
            this.sliderIsDragging = false;
            
            document.removeEventListener('mousemove', this.onSliderDrag);
            document.removeEventListener('mouseup', this.endSliderDrag);
            document.removeEventListener('touchmove', this.onSliderDrag);
            document.removeEventListener('touchend', this.endSliderDrag);
            
            this.recordSliderTrajectory(e);
            
            if (this.sliderCurrentX < 50) {
                this.sliderStatus = 'idle';
                this.sliderCurrentX = 0;
                return;
            }
            
            await this.verifySlider();
        },
        
        recordSliderTrajectory(e) {
            const clientX = e.type.includes('touch') 
                ? (e.touches?.[0]?.clientX || e.changedTouches?.[0]?.clientX || 0)
                : e.clientX;
            const clientY = e.type.includes('touch')
                ? (e.touches?.[0]?.clientY || e.changedTouches?.[0]?.clientY || 0)
                : e.clientY;
            
            this.sliderTrajectory.push({
                x: Math.round(clientX - this.sliderStartX),
                y: Math.round(clientY),
                t: Date.now() - this.sliderStartTime
            });
        },
        
        async verifySlider() {
            this.sliderStatus = 'verifying';
            this.sliderLoading = true;
            
            const position = Math.round((this.sliderCurrentX / this.sliderMaxSlide) * (this.sliderBgWidth - this.sliderPuzzleSize));
            
            try {
                const response = await fetch('/api/auth/slider-captcha/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: this.sliderToken,
                        position: position,
                        trajectory: this.sliderTrajectory
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200 && result.data?.success) {
                    this.sliderStatus = 'success';
                    this.modalSliderVerified = true;
                    this.modalSliderToken = this.sliderToken;
                    console.log('[Profile] Slider verification success');
                } else {
                    this.sliderStatus = 'fail';
                    this.modalSliderVerified = false;
                    this.modalSliderToken = '';
                    console.log('[Profile] Slider verification failed');
                    
                    setTimeout(() => {
                        this.refreshSlider();
                    }, 1500);
                }
            } catch (error) {
                console.error('[Profile] Slider verification error:', error);
                this.sliderStatus = 'fail';
                
                setTimeout(() => {
                    this.refreshSlider();
                }, 1500);
            } finally {
                this.sliderLoading = false;
            }
        },
        
        get sliderBgStyle() {
            if (!this.sliderStyleType || !this.sliderStyleParams) return '';
            
            const colors = this.sliderStyleParams.colors || ['#667eea', '#764ba2', '#f093fb'];
            const angles = this.sliderStyleParams.angles || [135, 45, 180];
            
            switch (this.sliderStyleType) {
                case 'gradient_overlay':
                    return `background: linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 100%), linear-gradient(${angles[1]}deg, ${colors[1]} 0%, ${colors[2]} 100%), linear-gradient(${angles[2]}deg, ${colors[2]} 0%, ${colors[0]} 100%); background-blend-mode: overlay, multiply, normal;`;
                case 'stripe_gradient':
                    const stripeWidth = this.sliderStyleParams.stripe_width || 10;
                    return `background: repeating-linear-gradient(45deg, ${colors[0]}, ${colors[0]} ${stripeWidth}px, ${colors[1]} ${stripeWidth}px, ${colors[1]} ${stripeWidth * 2}px), linear-gradient(to right, ${colors[1]}, ${colors[2]}); background-blend-mode: overlay;`;
                case 'radial_gradient':
                    const circles = this.sliderStyleParams.circles || [{x: 20, y: 80}, {x: 80, y: 20}, {x: 40, y: 40}];
                    return `background: radial-gradient(circle at ${circles[0].x}% ${circles[0].y}%, ${colors[0]}cc 0%, transparent 50%), radial-gradient(circle at ${circles[1].x}% ${circles[1].y}%, ${colors[1]}cc 0%, transparent 50%), radial-gradient(circle at ${circles[2].x}% ${circles[2].y}%, ${colors[2]}cc 0%, transparent 50%), linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);`;
                case 'grid_pattern':
                    const gridSize = this.sliderStyleParams.grid_size || 20;
                    return `background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 100%); background-size: ${gridSize}px ${gridSize}px, ${gridSize}px ${gridSize}px, 100% 100%;`;
                case 'wave_gradient':
                    return `background: linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 37%, ${colors[2]} 65%, ${colors[0]} 100%);`;
                case 'mosaic_effect':
                    const c4 = this.sliderStyleParams.colors?.[3] || colors[0];
                    return `background: conic-gradient(from 45deg at 25% 25%, ${colors[0]}, ${colors[1]}, ${colors[2]}, ${colors[0]}), conic-gradient(from 225deg at 75% 75%, ${c4}, ${colors[1]}, ${colors[2]}, ${c4}); background-size: 50% 50%; background-blend-mode: multiply;`;
                default:
                    return `background: linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%);`;
            }
        },
        
        get sliderPuzzleStyle() {
            return `top: ${this.sliderPuzzleY}px; left: ${this.sliderPuzzleX}px;`;
        },
        
        get sliderBtnStyle() {
            return `left: ${this.sliderCurrentX + 5}px;`;
        },
        
        get sliderPieceStyle() {
            const pieceX = (this.sliderCurrentX / this.sliderMaxSlide) * (this.sliderBgWidth - this.sliderPuzzleSize);
            return `top: ${this.sliderPuzzleY}px; left: ${pieceX}px; ${this.sliderBgStyle}`;
        },
        
        get sliderStatusText() {
            const texts = {
                'idle': '向右拖动滑块完成验证',
                'dragging': '继续拖动...',
                'verifying': '验证中...',
                'success': '验证成功',
                'fail': '验证失败，请重试'
            };
            return texts[this.sliderStatus] || texts['idle'];
        },
        
        logout() {
            if (confirm('确定要退出登录吗？')) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/login';
            }
        }
    }
}
</script>
