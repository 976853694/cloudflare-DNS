{% extends "base_public.html" %}

{% block title %}{{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="max-w-md w-full" x-data="loginForm()" x-init="init()">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-purple-600 bg-clip-text text-transparent" x-text="$store.i18n.t('auth.welcomeBack')"></h1>
            <p class="text-gray-600 dark:text-gray-400 mt-2" x-text="$store.i18n.t('auth.loginToAccount')"></p>
        </div>

        <form @submit.prevent="handleSubmit" class="bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-2xl p-8 shadow-xl hover:border-blue-500 dark:hover:border-blue-500 transition-all duration-200">
            <div x-show="error" x-cloak class="mb-6 p-4 bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800 rounded-lg text-red-600 dark:text-red-400 text-sm" x-text="error"></div>

            <!-- 沉睡账户重新激活提示 -->
            <div x-show="needReactivate" x-cloak class="mb-6 p-4 bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 rounded-lg">
                <div class="flex items-start gap-3">
                    <svg class="w-5 h-5 text-yellow-600 dark:text-yellow-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                    </svg>
                    <div class="flex-1">
                        <p class="text-yellow-800 dark:text-yellow-200 font-medium" x-text="$store.i18n.t('auth.accountDormant')"></p>
                        <p class="text-yellow-700 dark:text-yellow-300 text-sm mt-1">
                            <span x-text="$store.i18n.locale === 'zh' ? '邮箱: ' : 'Email: '"></span>
                            <span x-text="reactivateEmail"></span>
                        </p>
                        <div x-show="!reactivateSent" class="mt-3">
                            <button type="button" @click="sendReactivateEmail()" :disabled="reactivateSending"
                                class="px-4 py-2 bg-yellow-600 text-white rounded-lg text-sm hover:bg-yellow-700 disabled:opacity-50 flex items-center gap-2">
                                <svg x-show="reactivateSending" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                                </svg>
                                <span x-text="reactivateSending ? ($store.i18n.locale === 'zh' ? '发送中...' : 'Sending...') : $store.i18n.t('auth.reactivateAccount')"></span>
                            </button>
                        </div>
                        <div x-show="reactivateSent" class="mt-3 p-3 bg-green-50 dark:bg-green-900/20 rounded-lg">
                            <p class="text-green-700 dark:text-green-300 text-sm" x-text="$store.i18n.t('auth.reactivateSent')"></p>
                        </div>
                        <button type="button" @click="needReactivate = false; reactivateSent = false;" class="mt-2 text-sm text-yellow-600 dark:text-yellow-400 hover:underline" x-text="$store.i18n.locale === 'zh' ? '使用其他账号登录' : 'Login with another account'"></button>
                    </div>
                </div>
            </div>

            <!-- 登录方式切换 -->
            <div x-show="smsEnabled || magicLinkEnabled" class="flex mb-6 border-b border-gray-200 dark:border-gray-700">
                <button type="button" @click="loginType = 'email'" 
                    :class="loginType === 'email' ? 'border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'"
                    class="flex-1 pb-3 text-sm font-medium transition" x-text="$store.i18n.t('auth.emailLogin')"></button>
                <button type="button" x-show="smsEnabled" @click="loginType = 'phone'" 
                    :class="loginType === 'phone' ? 'border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'"
                    class="flex-1 pb-3 text-sm font-medium transition" x-text="$store.i18n.t('auth.phoneLogin')"></button>
                <button type="button" x-show="magicLinkEnabled" @click="loginType = 'magicLink'" 
                    :class="loginType === 'magicLink' ? 'border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'"
                    class="flex-1 pb-3 text-sm font-medium transition" x-text="$store.i18n.t('auth.magicLinkLogin')"></button>
            </div>

            <!-- 邮箱登录表单 -->
            <div x-show="loginType === 'email'">
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.email')"></label>
                    <input type="email" x-model="form.email" :required="loginType === 'email'"
                        class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="your@email.com">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.password')"></label>
                    <input type="password" x-model="form.password" :required="loginType === 'email'"
                        class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="••••••••">
                </div>
            </div>

            <!-- 手机登录表单 -->
            <div x-show="loginType === 'phone'" x-cloak>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '手机号' : 'Phone Number'"></label>
                    <input type="tel" x-model="phoneForm.phone" maxlength="11"
                        class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="请输入手机号">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '验证码' : 'Verification Code'"></label>
                    <div class="flex gap-2">
                        <input type="text" x-model="phoneForm.code" maxlength="6"
                            class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 transition text-lg tracking-widest"
                            placeholder="请输入验证码">
                        <button type="button" @click="sendSmsCode()" :disabled="smsSending || smsCountdown > 0"
                            class="px-4 py-3 bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-500 transition whitespace-nowrap disabled:opacity-50">
                            <span x-text="smsCountdown > 0 ? smsCountdown + 's' : (smsSending ? '发送中...' : '获取验证码')"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 邮箱链接登录表单 -->
            <div x-show="loginType === 'magicLink'" x-cloak>
                <div x-show="!magicLinkSent">
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4" x-text="$store.i18n.t('auth.magicLinkDesc')"></p>
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.email')"></label>
                        <input type="email" x-model="magicLinkForm.email"
                            class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="your@email.com">
                    </div>
                </div>
                <div x-show="magicLinkSent" class="text-center py-6">
                    <div class="w-16 h-16 mx-auto mb-4 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                        <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-2" x-text="$store.i18n.t('auth.magicLinkSent')"></h3>
                    <p class="text-gray-500 dark:text-gray-400 text-sm mb-4" x-text="$store.i18n.t('auth.magicLinkSentHint')"></p>
                    <button type="button" @click="magicLinkSent = false; magicLinkCountdown = 0;" 
                        :disabled="magicLinkCountdown > 0"
                        class="text-sm text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white disabled:opacity-50">
                        <span x-text="magicLinkCountdown > 0 ? magicLinkCountdown + $store.i18n.t('auth.magicLinkResendIn') : $store.i18n.t('auth.magicLinkResend')"></span>
                    </button>
                </div>
            </div>

            <!-- 2FA验证码 -->
            <div x-show="require2fa" x-cloak class="mb-6">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.twoFactorCode')"></label>
                <input type="text" x-model="form.totp_code" maxlength="9"
                    class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 transition text-center text-xl font-mono tracking-widest"
                    placeholder="000000">
                <p class="text-xs text-gray-500 dark:text-gray-400 mt-2" x-text="$store.i18n.t('auth.twoFactorHint')"></p>
            </div>

            <!-- 隐私政策同意 -->
            <div class="mb-6">
                <label class="flex items-start gap-2 cursor-pointer">
                    <input type="checkbox" x-model="agreePrivacy" class="mt-1 w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <span class="text-sm text-gray-600 dark:text-gray-400">
                        <span x-text="$store.i18n.t('legal.agreeToPolicy')"></span>
                        <a href="/privacy" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline" x-text="$store.i18n.t('legal.privacyPolicy')"></a>
                    </span>
                </label>
            </div>

            <button type="submit" :disabled="loading || !agreePrivacy || (loginType === 'magicLink' && magicLinkSent)"
                x-show="loginType !== 'magicLink' || !magicLinkSent"
                class="w-full bg-gradient-to-r from-blue-500 to-blue-600 text-white py-3 rounded-xl font-medium hover:from-blue-600 hover:to-blue-700 hover:shadow-xl transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed">
                <span x-show="!loading" x-text="loginType === 'magicLink' ? $store.i18n.t('auth.sendMagicLink') : $store.i18n.t('common.login')"></span>
                <span x-show="loading" class="flex items-center justify-center">
                    <svg class="animate-spin h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                    <span x-text="loginType === 'magicLink' ? $store.i18n.t('auth.sending') : $store.i18n.t('auth.loggingIn')"></span>
                </span>
            </button>

            <div class="flex items-center justify-between mt-6 text-sm">
                <a href="/forgot-password" class="text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" x-text="$store.i18n.t('auth.forgotPassword')"></a>
                <span class="text-gray-600 dark:text-gray-400"><span x-text="$store.i18n.t('auth.noAccount')"></span><a href="/register" class="text-blue-600 dark:text-blue-400 font-medium hover:underline" x-text="$store.i18n.t('auth.registerNow')"></a></span>
            </div>

            <!-- OAuth 登录 -->
            <template x-if="githubEnabled || googleEnabled || nodelocEnabled">
                <div class="mt-6">
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-200 dark:border-gray-600"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-white dark:bg-gray-800 text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('common.or')"></span>
                        </div>
                    </div>
                    <div class="mt-4 space-y-3">
                        <template x-if="githubEnabled">
                            <button type="button" @click="loginWithGithub" :disabled="githubLoading"
                                class="w-full flex items-center justify-center gap-2 px-4 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl hover:border-blue-500 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/10 text-gray-700 dark:text-gray-200 transition-all duration-200 disabled:opacity-50">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                                    <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                                </svg>
                                <span x-text="githubLoading ? $store.i18n.t('auth.redirecting') : $store.i18n.t('auth.loginWithGithub')"></span>
                            </button>
                        </template>
                        <template x-if="googleEnabled">
                            <button type="button" @click="loginWithGoogle" :disabled="googleLoading"
                                class="w-full flex items-center justify-center gap-2 px-4 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl hover:border-blue-500 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/10 text-gray-700 dark:text-gray-200 transition-all duration-200 disabled:opacity-50">
                                <svg class="w-5 h-5" viewBox="0 0 24 24">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                                <span x-text="googleLoading ? $store.i18n.t('auth.redirecting') : $store.i18n.t('auth.loginWithGoogle')"></span>
                            </button>
                        </template>
                        <template x-if="nodelocEnabled">
                            <button type="button" @click="loginWithNodeloc" :disabled="nodelocLoading"
                                class="w-full flex items-center justify-center gap-2 px-4 py-3 border-2 border-gray-200 dark:border-gray-600 rounded-xl hover:border-blue-500 dark:hover:border-blue-500 hover:bg-blue-50 dark:hover:bg-blue-900/10 text-gray-700 dark:text-gray-200 transition-all duration-200 disabled:opacity-50">
                                <svg class="w-5 h-5 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                                </svg>
                                <span x-text="nodelocLoading ? $store.i18n.t('auth.redirecting') : $store.i18n.t('auth.loginWithNodeloc')"></span>
                            </button>
                        </template>
                    </div>
                </div>
            </template>
        </form>

        <!-- 验证码弹窗 -->
        <div x-show="showCaptchaModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4" @keydown.escape.window="closeCaptchaModal()">
            <div class="absolute inset-0 bg-black/50" @click="closeCaptchaModal()"></div>
            <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl w-full max-w-md p-6" @click.stop>
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.t('auth.humanVerify')"></h3>
                    <button @click="closeCaptchaModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>
                <p class="text-gray-500 dark:text-gray-400 text-sm mb-4" x-text="$store.i18n.locale === 'zh' ? '请完成验证后继续' : 'Please complete verification to continue'"></p>
                
                <!-- 图形验证码 -->
                <div x-show="captchaType === 'image'" class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.captcha')"></label>
                    <div class="flex gap-2">
                        <input type="text" x-model="modalCaptchaCode" maxlength="4"
                            class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 text-lg tracking-widest"
                            :placeholder="$store.i18n.locale === 'zh' ? '请输入验证码' : 'Enter captcha'" @keyup.enter="submitCaptchaModal()">
                        <img :src="modalCaptchaImage" @click="refreshModalCaptcha()" class="h-[50px] flex-shrink-0 rounded-lg cursor-pointer border border-gray-200 hover:border-gray-400 transition" :title="$store.i18n.locale === 'zh' ? '点击刷新' : 'Click to refresh'">
                    </div>
                </div>
                
                <!-- Turnstile 验证码 -->
                <div x-show="captchaType === 'turnstile'" class="mb-4">
                    <div id="turnstile-modal"></div>
                </div>
                
                <!-- 滑块验证码 -->
                <template x-if="captchaType === 'slider' && showCaptchaModal">
                    <div class="mb-4">
                        <div x-data="sliderCaptcha({
                            onSuccess: (token) => {
                                modalSliderVerified = true;
                                modalSliderToken = token;
                            }
                        })" 
                        x-init="init()">
                            <div class="slider-captcha-container" :class="containerClass">
                                <template x-if="verified">
                                    <div class="slider-captcha-success-icon">✓</div>
                                </template>
                                <template x-if="!verified">
                                    <div>
                                        <div class="slider-captcha-bg" :style="bgStyle">
                                            <div class="slider-captcha-puzzle" :style="puzzleStyle"></div>
                                            <div class="slider-captcha-piece" :style="pieceStyle"></div>
                                            <div class="slider-captcha-refresh" @click="refresh()">
                                                <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                                            </div>
                                            <div x-show="loading && status !== 'verifying'" class="slider-captcha-overlay">
                                                <div class="slider-captcha-spinner"></div>
                                            </div>
                                        </div>
                                        <div class="slider-captcha-track">
                                            <span class="slider-captcha-text" x-text="statusText"></span>
                                            <div class="slider-captcha-btn" :style="btnStyle" @mousedown="startDrag($event)" @touchstart="startDrag($event)">
                                                <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>
                
                <div class="flex gap-3">
                    <button @click="closeCaptchaModal()" class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-lg text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700" x-text="$store.i18n.t('common.cancel')"></button>
                    <button @click="submitCaptchaModal()" :disabled="modalLoading || (captchaType === 'turnstile' && !modalTurnstileToken) || (captchaType === 'slider' && !modalSliderVerified)" 
                        class="flex-1 px-4 py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600 disabled:opacity-50">
                        <span x-text="modalLoading ? ($store.i18n.locale === 'zh' ? '验证中...' : 'Verifying...') : $store.i18n.t('common.confirm')"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function loginForm() {
    return {
        form: { email: '', password: '', captcha_id: '', captcha_code: '', turnstile_token: '', slider_token: '', totp_code: '' },
        phoneForm: { phone: '', code: '' },
        magicLinkForm: { email: '' },
        loginType: 'email',
        smsEnabled: false, smsSending: false, smsCountdown: 0,
        magicLinkEnabled: false, magicLinkSending: false, magicLinkSent: false, magicLinkCountdown: 0,
        loading: false, error: '',
        needReactivate: false, reactivateEmail: '', reactivateSending: false, reactivateSent: false,
        agreePrivacy: false,
        captchaType: 'image', captchaEnabled: true, turnstileSiteKey: '',
        require2fa: false,
        githubEnabled: false, githubLoading: false,
        googleEnabled: false, googleLoading: false,
        nodelocEnabled: false, nodelocLoading: false,
        // 弹窗相关
        showCaptchaModal: false, modalLoading: false,
        modalCaptchaId: '', modalCaptchaCode: '', modalCaptchaImage: '',
        modalTurnstileToken: '', modalTurnstileWidgetId: null,
        modalSliderVerified: false, modalSliderToken: '',
        pendingAction: 'login', // 'login' 或 'sendSms'
        
        // 滑块验证码状态（直接集成到父组件）
        sliderToken: '', sliderStyleType: '', sliderStyleParams: {},
        sliderPuzzleX: 0, sliderPuzzleY: 0,
        sliderCurrentX: 0, sliderIsDragging: false, sliderTrajectory: [],
        sliderLoading: false, sliderStatus: 'idle',
        sliderStartX: 0, sliderStartTime: 0,
        sliderBgWidth: 300, sliderBgHeight: 150, sliderPuzzleSize: 50,
        sliderTrackWidth: 0, sliderMaxSlide: 240,

        async init() {
            await this.loadCaptchaConfig();
            this.checkSmsStatus();
            this.checkMagicLinkStatus();
            this.checkGithubOAuth();
            this.checkGoogleOAuth();
            this.checkNodelocOAuth();
            this.handleOAuthCallback();
        },

        async checkMagicLinkStatus() {
            try {
                const res = await fetch('/api/auth/magic-link/config');
                const data = await res.json();
                this.magicLinkEnabled = data.code === 200 && data.data.enabled;
            } catch (e) { this.magicLinkEnabled = false; }
        },

        async checkSmsStatus() {
            try {
                const res = await fetch('/api/auth/sms/status');
                const data = await res.json();
                this.smsEnabled = data.code === 200 && data.data.enabled;
            } catch (e) { this.smsEnabled = false; }
        },

        async sendSmsCode() {
            if (!this.phoneForm.phone || !/^1[3-9]\d{9}$/.test(this.phoneForm.phone)) {
                this.error = '请输入正确的手机号'; return;
            }
            this.error = '';
            // 如果启用了人机验证，先打开验证码弹窗
            if (this.captchaEnabled) {
                this.pendingAction = 'sendSms';
                this.openCaptchaModal();
            } else {
                await this.doSendSmsCode();
            }
        },

        // 实际发送短信验证码
        async doSendSmsCode(captchaData = {}) {
            this.smsSending = true; this.error = '';
            try {
                const res = await fetch('/api/auth/sms/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        phone: this.phoneForm.phone, 
                        scene: 'login',
                        ...captchaData
                    })
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.smsCountdown = 60;
                    const timer = setInterval(() => { this.smsCountdown--; if (this.smsCountdown <= 0) clearInterval(timer); }, 1000);
                } else { this.error = data.message; }
            } catch (e) { this.error = '网络错误，请稍后重试'; }
            this.smsSending = false;
        },

        async loadCaptchaConfig() {
            try {
                const res = await fetch('/api/auth/captcha-config');
                const data = await res.json();
                if (data.code === 200) {
                    this.captchaEnabled = data.data.scenes?.login !== false;
                    this.captchaType = data.data.type;
                    if (this.captchaType === 'turnstile') {
                        this.turnstileSiteKey = data.data.turnstile_site_key;
                    }
                }
            } catch (e) { this.captchaEnabled = true; this.captchaType = 'image'; }
        },

        // 点击登录按钮
        handleSubmit() {
            this.error = '';
            // 手机登录不需要再验证（获取验证码时已验证），直接提交
            // 邮箱登录需要验证码
            // Magic Link 需要验证码
            if (this.loginType === 'phone') {
                this.submit();
            } else if (this.loginType === 'magicLink') {
                if (this.captchaEnabled) {
                    this.pendingAction = 'sendMagicLink';
                    this.openCaptchaModal();
                } else {
                    this.sendMagicLink();
                }
            } else if (this.captchaEnabled) {
                this.pendingAction = 'login';
                this.openCaptchaModal();
            } else {
                this.submit();
            }
        },

        // 打开验证码弹窗
        openCaptchaModal() {
            // 1. 先清除父组件状态
            this.showCaptchaModal = true;
            this.modalSliderVerified = false;
            this.modalSliderToken = '';
            this.modalCaptchaCode = '';
            this.modalTurnstileToken = '';
            
            // 2. 等待 DOM 更新
            this.$nextTick(() => {
                if (this.captchaType === 'image') {
                    this.refreshModalCaptcha();
                } else if (this.captchaType === 'turnstile') {
                    this.renderModalTurnstile();
                } else if (this.captchaType === 'slider') {
                    setTimeout(() => {
                        // 直接调用父组件的 refreshSlider 方法
                        this.refreshSlider();
                    }, 100);
                }
            });
        },

        // 关闭验证码弹窗
        closeCaptchaModal() {
            // 1. 清除父组件状态
            this.modalSliderVerified = false;
            this.modalSliderToken = '';
            this.modalCaptchaCode = '';
            this.modalTurnstileToken = '';
            
            // 2. 关闭弹窗
            this.showCaptchaModal = false;
            this.modalLoading = false;
            
            // 3. 清理 Turnstile
            if (this.modalTurnstileWidgetId !== null && window.turnstile) {
                turnstile.remove(this.modalTurnstileWidgetId);
                this.modalTurnstileWidgetId = null;
            }
        },

        // 刷新弹窗图形验证码
        async refreshModalCaptcha() {
            const res = await fetch('/api/auth/captcha');
            const data = await res.json();
            if (data.code === 200) {
                this.modalCaptchaId = data.data.id;
                this.modalCaptchaImage = data.data.image;
                this.modalCaptchaCode = '';
            }
        },

        // 渲染弹窗 Turnstile
        renderModalTurnstile() {
            const loadAndRender = () => {
                const container = document.getElementById('turnstile-modal');
                if (!container || !window.turnstile) return;
                container.innerHTML = '';
                this.modalTurnstileWidgetId = turnstile.render(container, {
                    sitekey: this.turnstileSiteKey,
                    callback: (token) => { this.modalTurnstileToken = token; },
                    'expired-callback': () => { this.modalTurnstileToken = ''; }
                });
            };
            if (window.turnstile) { loadAndRender(); }
            else {
                const script = document.createElement('script');
                script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js';
                script.async = true;
                script.onload = () => { setTimeout(loadAndRender, 100); };
                document.head.appendChild(script);
            }
        },

        // 提交验证码弹窗
        async submitCaptchaModal() {
            if (this.captchaType === 'image' && !this.modalCaptchaCode.trim()) {
                alert(this.$store.i18n.locale === 'zh' ? '请输入验证码' : 'Please enter captcha'); return;
            }
            if (this.captchaType === 'turnstile' && !this.modalTurnstileToken) {
                alert(this.$store.i18n.locale === 'zh' ? '请完成人机验证' : 'Please complete verification'); return;
            }
            if (this.captchaType === 'slider' && !this.modalSliderVerified) {
                alert(this.$store.i18n.locale === 'zh' ? '请完成滑块验证' : 'Please complete slider verification'); return;
            }
            
            // 先保存验证码数据，再关闭弹窗（closeCaptchaModal会清除状态）
            const captchaData = {
                captcha_id: this.modalCaptchaId,
                captcha_code: this.modalCaptchaCode,
                turnstile_token: this.modalTurnstileToken,
                slider_token: this.modalSliderToken
            };
            const action = this.pendingAction;
            this.closeCaptchaModal();
            
            if (action === 'sendSms') {
                // 发送短信验证码
                await this.doSendSmsCode(captchaData);
            } else if (action === 'sendMagicLink') {
                // 发送 Magic Link
                await this.sendMagicLink(captchaData);
            } else if (action === 'sendReactivate') {
                // 发送激活邮件
                await this.doSendReactivateEmail(captchaData);
            } else {
                // 登录
                this.form.captcha_id = captchaData.captcha_id;
                this.form.captcha_code = captchaData.captcha_code;
                this.form.turnstile_token = captchaData.turnstile_token;
                this.form.slider_token = captchaData.slider_token;
                await this.submit();
            }
        },

        // 发送 Magic Link
        async sendMagicLink(captchaData = {}) {
            if (!this.magicLinkForm.email) {
                this.error = this.$store.i18n.locale === 'zh' ? '请输入邮箱' : 'Please enter email';
                return;
            }
            this.loading = true; this.error = '';
            try {
                const res = await fetch('/api/auth/magic-link/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: this.magicLinkForm.email,
                        ...captchaData
                    })
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.magicLinkSent = true;
                    this.magicLinkCountdown = 60;
                    const timer = setInterval(() => { 
                        this.magicLinkCountdown--; 
                        if (this.magicLinkCountdown <= 0) clearInterval(timer); 
                    }, 1000);
                } else { 
                    this.error = data.message; 
                }
            } catch (e) { 
                this.error = this.$store.i18n.locale === 'zh' ? '网络错误，请稍后重试' : 'Network error, please try again'; 
            }
            this.loading = false;
        },

        async submit() {
            this.loading = true; this.error = '';
            try {
                let response, data;
                if (this.loginType === 'phone') {
                    if (!this.phoneForm.phone || !/^1[3-9]\d{9}$/.test(this.phoneForm.phone)) {
                        this.error = '请输入正确的手机号'; this.loading = false; return;
                    }
                    if (!this.phoneForm.code) { this.error = '请输入验证码'; this.loading = false; return; }
                    response = await fetch('/api/auth/login/phone', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.phoneForm)
                    });
                    data = await response.json();
                } else {
                    response = await fetch('/api/auth/login', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.form)
                    });
                    data = await response.json();
                }

                if (data.code === 200 && data.data) {
                    if (data.data.need_reactivate) {
                        this.needReactivate = true; this.reactivateEmail = data.data.email;
                        this.error = ''; this.loading = false; return;
                    }
                    if (data.data.require_2fa) {
                        this.require2fa = true; this.error = ''; this.loading = false; return;
                    }
                    if (data.data.access_token) {
                        localStorage.setItem('token', data.data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.data.user));
                        window.location.href = '/user';
                    }
                } else {
                    this.error = data.message || '登录失败';
                    if (data.data && data.data.need_reactivate) {
                        this.needReactivate = true; this.reactivateEmail = data.data.email; this.error = '';
                    }
                    // 清除验证码状态，下次需要重新验证
                    this.form.captcha_id = ''; this.form.captcha_code = '';
                    this.form.turnstile_token = ''; this.form.slider_token = '';
                }
            } catch (e) { this.error = '网络错误，请稍后重试'; }
            this.loading = false;
        },

        async sendReactivateEmail() {
            // 检查是否需要验证码
            if (this.captchaEnabled) {
                // 弹出验证码窗口
                this.pendingAction = 'sendReactivate';
                this.openCaptchaModal();
            } else {
                // 不需要验证码，直接发送
                await this.doSendReactivateEmail({});
            }
        },

        // 实际发送激活邮件
        async doSendReactivateEmail(captchaData = {}) {
            this.reactivateSending = true;
            try {
                const res = await fetch('/api/auth/reactivate/send', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        email: this.form.email,
                        ...captchaData
                    })
                });
                const data = await res.json();
                if (data.code === 200) { this.reactivateSent = true; }
                else { this.error = data.message || '发送失败'; }
            } catch (e) { this.error = '网络错误，请稍后重试'; }
            this.reactivateSending = false;
        },

        async checkGithubOAuth() {
            try {
                const res = await fetch('/api/auth/github/status');
                const data = await res.json();
                this.githubEnabled = data.code === 200 && data.data.configured;
            } catch (e) { this.githubEnabled = false; }
        },

        async checkGoogleOAuth() {
            try {
                const res = await fetch('/api/auth/google/status');
                const data = await res.json();
                this.googleEnabled = data.code === 200 && data.data.configured;
            } catch (e) { this.googleEnabled = false; }
        },

        async checkNodelocOAuth() {
            try {
                const res = await fetch('/api/auth/nodeloc/status');
                const data = await res.json();
                this.nodelocEnabled = data.code === 200 && data.data.configured;
            } catch (e) { this.nodelocEnabled = false; }
        },

        handleOAuthCallback() {
            const params = new URLSearchParams(window.location.search);
            const githubToken = params.get('github_token');
            const googleToken = params.get('google_token');
            const nodelocToken = params.get('nodeloc_token');
            const error = params.get('error');
            
            if (githubToken) { localStorage.setItem('token', githubToken); window.location.href = '/user'; }
            else if (googleToken) { localStorage.setItem('token', googleToken); window.location.href = '/user'; }
            else if (nodelocToken) { localStorage.setItem('token', nodelocToken); window.location.href = '/user'; }
            else if (error) {
                const errorMessages = {
                    'github_denied': '您取消了 GitHub 授权', 'github_no_code': 'GitHub 授权失败',
                    'github_token_failed': '获取 GitHub 令牌失败', 'github_user_failed': '获取 GitHub 用户信息失败',
                    'github_no_email': '无法获取您的 GitHub 邮箱，请确保邮箱已公开',
                    'google_denied': '您取消了 Google 授权', 'google_no_code': 'Google 授权失败',
                    'google_token_failed': '获取 Google 令牌失败', 'google_user_failed': '获取 Google 用户信息失败',
                    'google_no_email': '无法获取您的 Google 邮箱',
                    'nodeloc_denied': '您取消了 NodeLoc 授权', 'nodeloc_no_code': 'NodeLoc 授权失败',
                    'nodeloc_token_failed': '获取 NodeLoc 令牌失败', 'nodeloc_user_failed': '获取 NodeLoc 用户信息失败',
                    'nodeloc_no_email': '无法获取您的 NodeLoc 邮箱，请确保已授权邮箱权限'
                };
                this.error = errorMessages[error] || '第三方登录失败';
                window.history.replaceState({}, '', '/login');
            }
        },

        async loginWithGithub() {
            this.githubLoading = true;
            try {
                const res = await fetch('/api/auth/github');
                const data = await res.json();
                if (data.code === 200 && data.data.url) { window.location.href = data.data.url; }
                else { this.error = data.message || 'GitHub 登录失败'; this.githubLoading = false; }
            } catch (e) { this.error = '网络错误，请稍后重试'; this.githubLoading = false; }
        },

        async loginWithGoogle() {
            this.googleLoading = true;
            try {
                const res = await fetch('/api/auth/google');
                const data = await res.json();
                if (data.code === 200 && data.data.url) { window.location.href = data.data.url; }
                else { this.error = data.message || 'Google 登录失败'; this.googleLoading = false; }
            } catch (e) { this.error = '网络错误，请稍后重试'; this.googleLoading = false; }
        },

        async loginWithNodeloc() {
            this.nodelocLoading = true;
            try {
                const res = await fetch('/api/auth/nodeloc');
                const data = await res.json();
                if (data.code === 200 && data.data.url) { window.location.href = data.data.url; }
                else { this.error = data.message || 'NodeLoc 登录失败'; this.nodelocLoading = false; }
            } catch (e) { this.error = '网络错误，请稍后重试'; this.nodelocLoading = false; }
        },
        
        // ========== 滑块验证码方法（集成到父组件） ==========
        
        async refreshSlider() {
            console.log('[Login] Refreshing slider captcha...');
            this.sliderLoading = true;
            this.sliderStatus = 'idle';
            this.modalSliderVerified = false;
            this.sliderCurrentX = 0;
            this.sliderTrajectory = [];
            
            try {
                const response = await fetch('/api/auth/slider-captcha');
                const result = await response.json();
                
                if (result.code === 200) {
                    this.sliderToken = result.data.token;
                    this.modalSliderToken = result.data.token;
                    this.sliderStyleType = result.data.style_type;
                    this.sliderStyleParams = result.data.style_params;
                    this.sliderPuzzleX = result.data.puzzle_x;
                    this.sliderPuzzleY = result.data.puzzle_y;
                    console.log('[Login] Slider captcha loaded, token:', this.sliderToken);
                }
            } catch (error) {
                console.error('[Login] Failed to load slider captcha:', error);
            } finally {
                this.sliderLoading = false;
            }
        },
        
        startSliderDrag(e) {
            if (this.sliderLoading || this.modalSliderVerified || this.sliderStatus === 'verifying') return;
            
            e.preventDefault();
            this.sliderIsDragging = true;
            this.sliderStatus = 'dragging';
            this.sliderTrajectory = [];
            this.sliderStartTime = Date.now();
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            this.sliderStartX = clientX - this.sliderCurrentX;
            
            this.recordSliderTrajectory(e);
            
            document.addEventListener('mousemove', this.onSliderDrag.bind(this));
            document.addEventListener('mouseup', this.endSliderDrag.bind(this));
            document.addEventListener('touchmove', this.onSliderDrag.bind(this), { passive: false });
            document.addEventListener('touchend', this.endSliderDrag.bind(this));
        },
        
        onSliderDrag(e) {
            if (!this.sliderIsDragging) return;
            
            e.preventDefault();
            
            const clientX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            let newX = clientX - this.sliderStartX;
            
            newX = Math.max(0, Math.min(newX, this.sliderMaxSlide));
            this.sliderCurrentX = newX;
            
            this.recordSliderTrajectory(e);
        },
        
        async endSliderDrag(e) {
            if (!this.sliderIsDragging) return;
            
            this.sliderIsDragging = false;
            
            document.removeEventListener('mousemove', this.onSliderDrag);
            document.removeEventListener('mouseup', this.endSliderDrag);
            document.removeEventListener('touchmove', this.onSliderDrag);
            document.removeEventListener('touchend', this.endSliderDrag);
            
            this.recordSliderTrajectory(e);
            
            if (this.sliderCurrentX < 50) {
                this.sliderStatus = 'idle';
                this.sliderCurrentX = 0;
                return;
            }
            
            await this.verifySlider();
        },
        
        recordSliderTrajectory(e) {
            const clientX = e.type.includes('touch') 
                ? (e.touches?.[0]?.clientX || e.changedTouches?.[0]?.clientX || 0)
                : e.clientX;
            const clientY = e.type.includes('touch')
                ? (e.touches?.[0]?.clientY || e.changedTouches?.[0]?.clientY || 0)
                : e.clientY;
            
            this.sliderTrajectory.push({
                x: Math.round(clientX - this.sliderStartX),
                y: Math.round(clientY),
                t: Date.now() - this.sliderStartTime
            });
        },
        
        async verifySlider() {
            this.sliderStatus = 'verifying';
            this.sliderLoading = true;
            
            const position = Math.round((this.sliderCurrentX / this.sliderMaxSlide) * (this.sliderBgWidth - this.sliderPuzzleSize));
            
            try {
                const response = await fetch('/api/auth/slider-captcha/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: this.sliderToken,
                        position: position,
                        trajectory: this.sliderTrajectory
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200 && result.data?.success) {
                    this.sliderStatus = 'success';
                    this.modalSliderVerified = true;
                    this.modalSliderToken = this.sliderToken;
                    console.log('[Login] Slider verification success');
                } else {
                    this.sliderStatus = 'fail';
                    this.modalSliderVerified = false;
                    this.modalSliderToken = '';
                    console.log('[Login] Slider verification failed');
                    
                    setTimeout(() => {
                        this.refreshSlider();
                    }, 1500);
                }
            } catch (error) {
                console.error('[Login] Slider verification error:', error);
                this.sliderStatus = 'fail';
                
                setTimeout(() => {
                    this.refreshSlider();
                }, 1500);
            } finally {
                this.sliderLoading = false;
            }
        },
        
        get sliderBgStyle() {
            if (!this.sliderStyleType || !this.sliderStyleParams) return '';
            
            const colors = this.sliderStyleParams.colors || ['#667eea', '#764ba2', '#f093fb'];
            const angles = this.sliderStyleParams.angles || [135, 45, 180];
            
            switch (this.sliderStyleType) {
                case 'gradient_overlay':
                    return `background: linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 100%), linear-gradient(${angles[1]}deg, ${colors[1]} 0%, ${colors[2]} 100%), linear-gradient(${angles[2]}deg, ${colors[2]} 0%, ${colors[0]} 100%); background-blend-mode: overlay, multiply, normal;`;
                case 'stripe_gradient':
                    const stripeWidth = this.sliderStyleParams.stripe_width || 10;
                    return `background: repeating-linear-gradient(45deg, ${colors[0]}, ${colors[0]} ${stripeWidth}px, ${colors[1]} ${stripeWidth}px, ${colors[1]} ${stripeWidth * 2}px), linear-gradient(to right, ${colors[1]}, ${colors[2]}); background-blend-mode: overlay;`;
                case 'radial_gradient':
                    const circles = this.sliderStyleParams.circles || [{x: 20, y: 80}, {x: 80, y: 20}, {x: 40, y: 40}];
                    return `background: radial-gradient(circle at ${circles[0].x}% ${circles[0].y}%, ${colors[0]}cc 0%, transparent 50%), radial-gradient(circle at ${circles[1].x}% ${circles[1].y}%, ${colors[1]}cc 0%, transparent 50%), radial-gradient(circle at ${circles[2].x}% ${circles[2].y}%, ${colors[2]}cc 0%, transparent 50%), linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);`;
                case 'grid_pattern':
                    const gridSize = this.sliderStyleParams.grid_size || 20;
                    return `background: linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px), linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 100%); background-size: ${gridSize}px ${gridSize}px, ${gridSize}px ${gridSize}px, 100% 100%;`;
                case 'wave_gradient':
                    return `background: linear-gradient(${angles[0]}deg, ${colors[0]} 0%, ${colors[1]} 37%, ${colors[2]} 65%, ${colors[0]} 100%);`;
                case 'mosaic_effect':
                    const c4 = this.sliderStyleParams.colors?.[3] || colors[0];
                    return `background: conic-gradient(from 45deg at 25% 25%, ${colors[0]}, ${colors[1]}, ${colors[2]}, ${colors[0]}), conic-gradient(from 225deg at 75% 75%, ${c4}, ${colors[1]}, ${colors[2]}, ${c4}); background-size: 50% 50%; background-blend-mode: multiply;`;
                default:
                    return `background: linear-gradient(135deg, ${colors[0]} 0%, ${colors[1]} 100%);`;
            }
        },
        
        get sliderPuzzleStyle() {
            return `top: ${this.sliderPuzzleY}px; left: ${this.sliderPuzzleX}px;`;
        },
        
        get sliderBtnStyle() {
            return `left: ${this.sliderCurrentX + 5}px;`;
        },
        
        get sliderPieceStyle() {
            const pieceX = (this.sliderCurrentX / this.sliderMaxSlide) * (this.sliderBgWidth - this.sliderPuzzleSize);
            return `top: ${this.sliderPuzzleY}px; left: ${pieceX}px; ${this.sliderBgStyle}`;
        },
        
        get sliderStatusText() {
            const texts = {
                'idle': '向右拖动滑块完成验证',
                'dragging': '继续拖动...',
                'verifying': '验证中...',
                'success': '验证成功',
                'fail': '验证失败，请重试'
            };
            return texts[this.sliderStatus] || texts['idle'];
        }
    };
}
</script>
{% endblock %}
