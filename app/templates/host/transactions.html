{% extends "base.html" %}

{% block title %}交易记录 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6 max-w-full" x-data="hostTransactions()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="min-w-0">
            <div class="flex items-center gap-2 text-sm text-gray-500 dark:text-gray-400 mb-1">
                <a href="/host" class="hover:text-gray-700 dark:hover:text-gray-300">托管商面板</a>
                <span>/</span>
                <span>交易记录</span>
            </div>
            <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">交易记录</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">查看您的收益和订单记录</p>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2">
            <p class="text-xs text-gray-500 dark:text-gray-400">总收益</p>
            <p class="text-xl font-bold text-green-600" x-text="'¥' + totalEarnings.toFixed(2)"></p>
        </div>
    </div>

    <!-- Filters -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mb-6">
        <div class="flex flex-wrap gap-4">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">开始日期</label>
                <input type="date" x-model="filters.start_date" @change="loadTransactions()" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm">
            </div>
            <div class="flex-1 min-w-[200px]">
                <label class="block text-xs text-gray-500 dark:text-gray-400 mb-1">结束日期</label>
                <input type="date" x-model="filters.end_date" @change="loadTransactions()" class="w-full px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm">
            </div>
            <div class="flex items-end">
                <button @click="clearFilters()" class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white text-sm">清除筛选</button>
            </div>
        </div>
    </div>

    <!-- Transactions List -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
        <div x-show="loading" class="p-8 text-center">
            <div class="inline-block w-6 h-6 border-2 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div>
        </div>
        <div x-show="!loading && transactions.length === 0" x-cloak class="p-8 text-center">
            <div class="w-16 h-16 bg-gray-100 dark:bg-gray-700 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
            </div>
            <p class="text-gray-500 dark:text-gray-400">暂无交易记录</p>
        </div>
        
        <!-- Desktop Table -->
        <div x-show="!loading && transactions.length > 0" x-cloak class="hidden sm:block overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 dark:bg-gray-700/50">
                    <tr>
                        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">域名</th>
                        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">订单金额</th>
                        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">平台抽成</th>
                        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">实际收益</th>
                        <th class="px-5 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">时间</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                    <template x-for="tx in transactions" :key="tx.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                            <td class="px-5 py-4">
                                <p class="font-medium text-gray-900 dark:text-white" x-text="tx.domain_name || '-'"></p>
                                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="'订单 #' + tx.purchase_record_id"></p>
                            </td>
                            <td class="px-5 py-4 text-gray-600 dark:text-gray-300" x-text="'¥' + tx.total_amount?.toFixed(2)"></td>
                            <td class="px-5 py-4 text-gray-600 dark:text-gray-300">
                                <span x-text="'¥' + tx.platform_fee?.toFixed(2)"></span>
                                <span class="text-xs text-gray-400" x-text="'(' + tx.commission_rate + '%)'"></span>
                            </td>
                            <td class="px-5 py-4 font-medium text-green-600" x-text="'+¥' + tx.host_earnings?.toFixed(2)"></td>
                            <td class="px-5 py-4 text-gray-500 dark:text-gray-400 text-sm" x-text="formatDate(tx.created_at)"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
        
        <!-- Mobile List -->
        <div x-show="!loading && transactions.length > 0" x-cloak class="sm:hidden divide-y divide-gray-100 dark:divide-gray-700">
            <template x-for="tx in transactions" :key="tx.id">
                <div class="px-4 py-3">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <p class="font-medium text-gray-900 dark:text-white" x-text="tx.domain_name || '-'"></p>
                            <p class="text-xs text-gray-500 dark:text-gray-400" x-text="formatDate(tx.created_at)"></p>
                        </div>
                        <p class="font-medium text-green-600" x-text="'+¥' + tx.host_earnings?.toFixed(2)"></p>
                    </div>
                    <div class="flex gap-4 text-xs text-gray-500 dark:text-gray-400">
                        <span x-text="'订单: ¥' + tx.total_amount?.toFixed(2)"></span>
                        <span x-text="'抽成: ¥' + tx.platform_fee?.toFixed(2) + ' (' + tx.commission_rate + '%)'"></span>
                    </div>
                </div>
            </template>
        </div>
        
        <!-- Pagination -->
        <div x-show="!loading && pagination.total_pages > 1" x-cloak class="px-5 py-4 border-t border-gray-100 dark:border-gray-700 flex items-center justify-between">
            <p class="text-sm text-gray-500 dark:text-gray-400">
                共 <span x-text="pagination.total"></span> 条记录
            </p>
            <div class="flex gap-2">
                <button @click="goToPage(pagination.page - 1)" :disabled="pagination.page <= 1" class="px-3 py-1.5 border border-gray-200 dark:border-gray-600 rounded-lg text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-700">上一页</button>
                <span class="px-3 py-1.5 text-sm text-gray-600 dark:text-gray-400" x-text="pagination.page + ' / ' + pagination.total_pages"></span>
                <button @click="goToPage(pagination.page + 1)" :disabled="pagination.page >= pagination.total_pages" class="px-3 py-1.5 border border-gray-200 dark:border-gray-600 rounded-lg text-sm disabled:opacity-50 disabled:cursor-not-allowed hover:bg-gray-50 dark:hover:bg-gray-700">下一页</button>
            </div>
        </div>
    </div>
</div>

<script>
function hostTransactions() {
    return {
        loading: true,
        transactions: [],
        totalEarnings: 0,
        pagination: { page: 1, per_page: 20, total: 0, total_pages: 0 },
        filters: { start_date: '', end_date: '' },
        
        async init() {
            await this.loadTransactions();
            this.loading = false;
        },
        
        async loadTransactions() {
            try {
                let url = `/api/host/transactions?page=${this.pagination.page}&per_page=${this.pagination.per_page}`;
                if (this.filters.start_date) url += `&start_date=${this.filters.start_date}`;
                if (this.filters.end_date) url += `&end_date=${this.filters.end_date}`;
                
                const res = await fetch(url, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.transactions = data.data.items || [];
                    this.pagination = {
                        page: data.data.page,
                        per_page: data.data.per_page,
                        total: data.data.total,
                        total_pages: data.data.total_pages
                    };
                    this.totalEarnings = data.data.total_earnings || 0;
                }
            } catch (e) {
                console.error('Load transactions failed:', e);
            }
        },
        
        goToPage(page) {
            if (page < 1 || page > this.pagination.total_pages) return;
            this.pagination.page = page;
            this.loadTransactions();
        },
        
        clearFilters() {
            this.filters = { start_date: '', end_date: '' };
            this.pagination.page = 1;
            this.loadTransactions();
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }
    }
}
</script>
{% endblock %}
