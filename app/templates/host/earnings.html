{% extends "base.html" %}

{% block title %}收益提现 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6 max-w-full" x-data="hostEarnings()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="min-w-0">
            <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('host.earnings')"></h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm" x-text="$store.i18n.t('host.withdrawal.title')"></p>
        </div>
        <button @click="showWithdrawModal = true" :disabled="earnings.host_balance <= 0"
            class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed font-medium flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span x-text="$store.i18n.t('host.withdrawal.apply')"></span>
        </button>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-gradient-to-br from-green-50 to-green-100 dark:from-green-900/20 dark:to-green-800/20 
                    border border-green-200 dark:border-green-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <p class="text-xs text-green-600 dark:text-green-400 font-medium uppercase" x-text="$store.i18n.t('host.withdrawal.balance')"></p>
            <p class="text-2xl sm:text-3xl font-bold text-green-900 dark:text-green-100 mt-1" x-text="'¥' + (earnings.host_balance || 0).toFixed(2)"></p>
        </div>
        <div class="bg-gradient-to-br from-blue-50 to-blue-100 dark:from-blue-900/20 dark:to-blue-800/20 
                    border border-blue-200 dark:border-blue-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
            </div>
            <p class="text-xs text-blue-600 dark:text-blue-400 font-medium uppercase" x-text="$store.i18n.t('host.totalEarnings')"></p>
            <p class="text-2xl sm:text-3xl font-bold text-blue-900 dark:text-blue-100 mt-1" x-text="'¥' + (earnings.total_earnings || 0).toFixed(2)"></p>
        </div>
        <div class="bg-gradient-to-br from-purple-50 to-purple-100 dark:from-purple-900/20 dark:to-purple-800/20 
                    border border-purple-200 dark:border-purple-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <p class="text-xs text-purple-600 dark:text-purple-400 font-medium uppercase">已提现</p>
            <p class="text-2xl sm:text-3xl font-bold text-purple-900 dark:text-purple-100 mt-1" x-text="'¥' + (earnings.withdrawn || 0).toFixed(2)"></p>
        </div>
        <div class="bg-gradient-to-br from-orange-50 to-orange-100 dark:from-orange-900/20 dark:to-orange-800/20 
                    border border-orange-200 dark:border-orange-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-orange-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
            </div>
            <p class="text-xs text-orange-600 dark:text-orange-400 font-medium uppercase">处理中</p>
            <p class="text-2xl sm:text-3xl font-bold text-orange-900 dark:text-orange-100 mt-1" x-text="'¥' + (earnings.pending_withdrawal || 0).toFixed(2)"></p>
        </div>
    </div>

    <!-- Tabs -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
        <div class="border-b border-gray-200 dark:border-gray-700">
            <nav class="flex -mb-px">
                <button @click="activeTab = 'withdrawals'" 
                    :class="activeTab === 'withdrawals' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="px-6 py-3 border-b-2 font-medium text-sm" x-text="$store.i18n.t('host.withdrawal.history')"></button>
                <button @click="activeTab = 'transactions'" 
                    :class="activeTab === 'transactions' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700'"
                    class="px-6 py-3 border-b-2 font-medium text-sm" x-text="$store.i18n.t('host.transactions')"></button>
            </nav>
        </div>

        <!-- Withdrawals Tab -->
        <div x-show="activeTab === 'withdrawals'" x-cloak>
            <div x-show="loading" class="p-8 text-center">
                <div class="inline-block w-6 h-6 border-2 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div>
            </div>
            <div x-show="!loading && withdrawals.length === 0" x-cloak class="p-8 text-center">
                <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-gray-400" x-text="$store.i18n.t('host.withdrawal.noRecords')"></p>
            </div>
            <div x-show="!loading && withdrawals.length > 0" x-cloak class="divide-y divide-gray-100 dark:divide-gray-700">
                <template x-for="w in withdrawals" :key="w.id">
                    <div class="flex items-center justify-between px-5 py-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <p class="font-medium text-gray-900 dark:text-white" x-text="'¥' + w.amount.toFixed(2)"></p>
                                <span :class="{
                                    'bg-yellow-100 text-yellow-800': w.status === 'pending',
                                    'bg-blue-100 text-blue-800': w.status === 'approved',
                                    'bg-red-100 text-red-800': w.status === 'rejected',
                                    'bg-green-100 text-green-800': w.status === 'completed'
                                }" class="px-2 py-0.5 rounded text-xs font-medium" x-text="w.status_text"></span>
                            </div>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">
                                <span x-text="getPaymentMethodText(w.payment_method)"></span> · 
                                <span x-text="w.payment_account"></span>
                            </p>
                            <p class="text-xs text-gray-400 mt-0.5" x-text="w.created_at?.split('T')[0]"></p>
                            <p x-show="w.admin_remark" class="text-xs text-red-500 mt-1" x-text="'备注: ' + w.admin_remark"></p>
                        </div>
                        <div class="flex items-center gap-2">
                            <button x-show="w.status === 'pending'" @click="cancelWithdrawal(w.id)"
                                class="px-3 py-1.5 text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-lg text-sm" x-text="$store.i18n.t('host.withdrawal.cancel')"></button>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Transactions Tab -->
        <div x-show="activeTab === 'transactions'" x-cloak>
            <div x-show="loading" class="p-8 text-center">
                <div class="inline-block w-6 h-6 border-2 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div>
            </div>
            <div x-show="!loading && transactions.length === 0" x-cloak class="p-8 text-center">
                <svg class="w-12 h-12 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                <p class="text-gray-400" x-text="$store.i18n.t('host.noTransactions')"></p>
            </div>
            <div x-show="!loading && transactions.length > 0" x-cloak class="divide-y divide-gray-100 dark:divide-gray-700">
                <template x-for="tx in transactions" :key="tx.id">
                    <div class="flex items-center justify-between px-5 py-4">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-900 dark:text-white truncate" x-text="tx.domain_name || '域名'"></p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="tx.created_at?.split('T')[0]"></p>
                        </div>
                        <div class="text-right">
                            <p class="font-medium text-green-600" x-text="'+¥' + tx.host_earnings?.toFixed(2)"></p>
                            <p class="text-xs text-gray-500" x-text="'订单: ¥' + tx.total_amount?.toFixed(2)"></p>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>

    <!-- Withdraw Modal -->
    <div x-show="showWithdrawModal" x-cloak class="fixed inset-0 z-50 overflow-y-auto" aria-modal="true">
        <div class="flex items-center justify-center min-h-screen px-4">
            <div class="fixed inset-0 bg-black/50" @click="showWithdrawModal = false"></div>
            <div class="relative bg-white dark:bg-gray-800 rounded-xl shadow-xl max-w-md w-full p-6">
                <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4" x-text="$store.i18n.t('host.withdrawal.apply')"></h3>
                
                <form @submit.prevent="submitWithdrawal">
                    <div class="space-y-4">
                        <!-- Amount -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.t('host.withdrawal.amount')"></label>
                            <div class="relative">
                                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500">¥</span>
                                <input type="number" x-model="withdrawForm.amount" step="0.01" :min="earnings.min_withdraw || 10" :max="earnings.host_balance"
                                    class="w-full pl-8 pr-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500">
                            </div>
                            <p class="text-xs text-gray-500 mt-1">
                                <span x-text="$store.i18n.t('host.withdrawal.balance') + ': ¥' + (earnings.host_balance || 0).toFixed(2)"></span>
                                <span class="ml-2" x-text="$store.i18n.t('host.withdrawal.minAmount') + ': ¥' + (earnings.min_withdraw || 10)"></span>
                            </p>
                        </div>
                        
                        <!-- Payment Method -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.t('host.withdrawal.paymentMethod')"></label>
                            <select x-model="withdrawForm.payment_method"
                                class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500">
                                <option value="alipay" x-text="$store.i18n.t('host.withdrawal.alipay')"></option>
                                <option value="wechat" x-text="$store.i18n.t('host.withdrawal.wechat')"></option>
                                <option value="bank" x-text="$store.i18n.t('host.withdrawal.bank')"></option>
                            </select>
                        </div>
                        
                        <!-- Payment Account -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.t('host.withdrawal.paymentAccount')"></label>
                            <input type="text" x-model="withdrawForm.payment_account"
                                class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500"
                                :placeholder="withdrawForm.payment_method === 'bank' ? '银行卡号' : '账号'">
                        </div>
                        
                        <!-- Payment Name -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.t('host.withdrawal.paymentName')"></label>
                            <input type="text" x-model="withdrawForm.payment_name"
                                class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500"
                                placeholder="真实姓名">
                        </div>
                    </div>
                    
                    <div class="flex gap-3 mt-6">
                        <button type="button" @click="showWithdrawModal = false"
                            class="flex-1 px-4 py-2 border border-gray-200 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700">
                            取消
                        </button>
                        <button type="submit" :disabled="submitting"
                            class="flex-1 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 disabled:opacity-50">
                            <span x-show="!submitting" x-text="$store.i18n.t('host.withdrawal.submit')"></span>
                            <span x-show="submitting">提交中...</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>


<script>
function hostEarnings() {
    return {
        loading: true,
        submitting: false,
        activeTab: 'withdrawals',
        showWithdrawModal: false,
        earnings: {},
        withdrawals: [],
        transactions: [],
        withdrawForm: {
            amount: 0,
            payment_method: 'alipay',
            payment_account: '',
            payment_name: ''
        },
        
        async init() {
            await Promise.all([
                this.loadEarnings(),
                this.loadWithdrawals(),
                this.loadTransactions()
            ]);
            this.loading = false;
        },
        
        async loadEarnings() {
            try {
                const res = await fetch('/api/host/earnings', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.earnings = data.data;
                }
            } catch (e) {
                console.error('Load earnings failed:', e);
            }
        },
        
        async loadWithdrawals() {
            try {
                const res = await fetch('/api/host/withdrawals', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.withdrawals = data.data.items || [];
                }
            } catch (e) {
                console.error('Load withdrawals failed:', e);
            }
        },
        
        async loadTransactions() {
            try {
                const res = await fetch('/api/host/transactions?per_page=50', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.transactions = data.data.items || [];
                }
            } catch (e) {
                console.error('Load transactions failed:', e);
            }
        },
        
        getPaymentMethodText(method) {
            const methods = {
                'alipay': Alpine.store('i18n').t('host.withdrawal.alipay'),
                'wechat': Alpine.store('i18n').t('host.withdrawal.wechat'),
                'bank': Alpine.store('i18n').t('host.withdrawal.bank')
            };
            return methods[method] || method;
        },
        
        async submitWithdrawal() {
            const minAmount = this.earnings.min_withdraw || 10;
            
            if (!this.withdrawForm.amount || this.withdrawForm.amount <= 0) {
                window.$toast?.error('请输入提现金额');
                return;
            }
            if (this.withdrawForm.amount < minAmount) {
                window.$toast?.error(`最低提现金额为 ¥${minAmount}`);
                return;
            }
            if (!this.withdrawForm.payment_account) {
                window.$toast?.error('请输入收款账号');
                return;
            }
            if (!this.withdrawForm.payment_name) {
                window.$toast?.error('请输入收款人姓名');
                return;
            }
            
            this.submitting = true;
            try {
                const res = await fetch('/api/host/withdrawals', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + localStorage.getItem('token')
                    },
                    body: JSON.stringify(this.withdrawForm)
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    window.$toast?.success(Alpine.store('i18n').t('host.withdrawal.messages.submitted'));
                    this.showWithdrawModal = false;
                    this.withdrawForm = { amount: 0, payment_method: 'alipay', payment_account: '', payment_name: '' };
                    await this.loadEarnings();
                    await this.loadWithdrawals();
                } else {
                    window.$toast?.error(data.message || '提交失败');
                }
            } catch (e) {
                console.error('Submit withdrawal failed:', e);
                window.$toast?.error('网络错误');
            } finally {
                this.submitting = false;
            }
        },
        
        async cancelWithdrawal(id) {
            if (!confirm(Alpine.store('i18n').t('host.withdrawal.confirmCancel'))) return;
            
            try {
                const res = await fetch(`/api/host/withdrawals/${id}/cancel`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    window.$toast?.success(Alpine.store('i18n').t('host.withdrawal.messages.cancelled'));
                    await this.loadEarnings();
                    await this.loadWithdrawals();
                } else {
                    window.$toast?.error(data.message || '取消失败');
                }
            } catch (e) {
                console.error('Cancel withdrawal failed:', e);
                window.$toast?.error('网络错误');
            }
        }
    }
}
</script>
{% endblock %}
