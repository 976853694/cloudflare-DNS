{% extends "base.html" %}

{% block title %}托管商面板 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6 max-w-full" x-data="hostDashboard()" x-init="init()">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div class="min-w-0">
            <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white">托管商面板</h1>
            <p class="text-gray-500 dark:text-gray-400 mt-1 text-sm">管理您的域名托管业务</p>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl px-4 py-2 sm:px-5 sm:py-3">
                <p class="text-xs text-gray-500 dark:text-gray-400">托管收益</p>
                <p class="text-lg sm:text-xl font-bold text-green-600" x-text="'¥' + (dashboard.host_balance || 0).toFixed(2)"></p>
            </div>
        </div>
    </div>

    <!-- Stats Cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <!-- 渠道数量 -->
        <div class="bg-gradient-to-br from-blue-50 to-blue-100 dark:from-blue-900/20 dark:to-blue-800/20 
                    border border-blue-200 dark:border-blue-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-blue-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path>
                    </svg>
                </div>
            </div>
            <p class="text-xs text-blue-600 dark:text-blue-400 font-medium uppercase">渠道数量</p>
            <p class="text-2xl sm:text-3xl font-bold text-blue-900 dark:text-blue-100 mt-1" x-text="dashboard.channels_count || 0"></p>
        </div>
        
        <!-- 域名数量 -->
        <div class="bg-gradient-to-br from-green-50 to-green-100 dark:from-green-900/20 dark:to-green-800/20 
                    border border-green-200 dark:border-green-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-green-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                    </svg>
                </div>
            </div>
            <p class="text-xs text-green-600 dark:text-green-400 font-medium uppercase">域名数量</p>
            <p class="text-2xl sm:text-3xl font-bold text-green-900 dark:text-green-100 mt-1" x-text="dashboard.domains_count || 0"></p>
        </div>
        
        <!-- 套餐数量 -->
        <div class="bg-gradient-to-br from-purple-50 to-purple-100 dark:from-purple-900/20 dark:to-purple-800/20 
                    border border-purple-200 dark:border-purple-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-purple-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                    </svg>
                </div>
            </div>
            <p class="text-xs text-purple-600 dark:text-purple-400 font-medium uppercase">套餐数量</p>
            <p class="text-2xl sm:text-3xl font-bold text-purple-900 dark:text-purple-100 mt-1" x-text="dashboard.plans_count || 0"></p>
        </div>
        
        <!-- 平台抽成 -->
        <div class="bg-gradient-to-br from-orange-50 to-orange-100 dark:from-orange-900/20 dark:to-orange-800/20 
                    border border-orange-200 dark:border-orange-700 rounded-xl p-5 
                    hover:shadow-xl hover:scale-105 transition-all duration-200">
            <div class="flex items-center justify-between mb-3">
                <div class="w-12 h-12 bg-orange-500/20 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-orange-600 dark:text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path>
                    </svg>
                </div>
            </div>
            <p class="text-xs text-orange-600 dark:text-orange-400 font-medium uppercase">平台抽成</p>
            <p class="text-2xl sm:text-3xl font-bold text-orange-900 dark:text-orange-100 mt-1" x-text="(dashboard.commission_rate || 10) + '%'"></p>
        </div>
    </div>

    <!-- Quick Actions -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <a href="/host/channels" class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-5 text-white hover:from-blue-600 hover:to-blue-700 hover:shadow-xl hover:scale-105 transition-all duration-200 group">
            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01"></path></svg>
            </div>
            <p class="font-semibold text-base">渠道管理</p>
            <p class="text-blue-100 text-sm mt-1">管理DNS服务商账户</p>
        </a>
        <a href="/host/domains" class="bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl p-5 hover:border-green-500 dark:hover:border-green-500 hover:shadow-xl hover:scale-105 transition-all duration-200 group">
            <div class="w-12 h-12 bg-green-100 dark:bg-green-900/30 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6 text-green-600 dark:text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path></svg>
            </div>
            <p class="font-semibold text-gray-900 dark:text-white text-base">域名管理</p>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">添加和管理托管域名</p>
        </a>
        <a href="/host/plans" class="bg-white dark:bg-gray-800 border-2 border-gray-200 dark:border-gray-700 rounded-xl p-5 hover:border-purple-500 dark:hover:border-purple-500 hover:shadow-xl hover:scale-105 transition-all duration-200 group">
            <div class="w-12 h-12 bg-purple-100 dark:bg-purple-900/30 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <p class="font-semibold text-gray-900 dark:text-white text-base">套餐管理</p>
            <p class="text-gray-500 dark:text-gray-400 text-sm mt-1">创建和管理销售套餐</p>
        </a>
        <a href="/host/earnings" class="bg-gradient-to-br from-green-500 to-green-600 rounded-xl p-5 text-white hover:from-green-600 hover:to-green-700 hover:shadow-xl hover:scale-105 transition-all duration-200 group">
            <div class="w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <p class="font-semibold text-base">收益提现</p>
            <p class="text-green-100 text-sm mt-1">管理收益和提现</p>
        </a>
    </div>

    <!-- Recent Transactions -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden shadow-sm">
        <div class="px-5 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center">
            <h2 class="font-semibold text-gray-900 dark:text-white text-lg">最近交易</h2>
            <a href="/host/transactions" class="text-blue-600 hover:text-blue-800 dark:hover:text-blue-400 text-sm font-medium transition-colors">
                查看全部 →
            </a>
        </div>
        <div x-show="loading" class="p-8 text-center">
            <div class="inline-block w-8 h-8 border-3 border-gray-200 dark:border-gray-600 border-t-blue-600 dark:border-t-blue-400 rounded-full animate-spin"></div>
        </div>
        <div x-show="!loading && transactions.length === 0" x-cloak class="p-12 text-center">
            <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
            </svg>
            <p class="text-gray-400 dark:text-gray-500">暂无交易记录</p>
        </div>
        <div x-show="!loading && transactions.length > 0" x-cloak class="divide-y divide-gray-100 dark:divide-gray-700">
            <template x-for="tx in transactions.slice(0, 5)" :key="tx.id">
                <div class="flex items-center justify-between px-5 py-4 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                    <div class="flex items-center gap-4 flex-1 min-w-0">
                        <div class="w-10 h-10 bg-gradient-to-br from-green-500 to-green-600 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-900 dark:text-white truncate" x-text="tx.domain_name || '域名'"></p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5" x-text="tx.created_at?.split('T')[0]"></p>
                        </div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <p class="font-semibold text-green-600 dark:text-green-400 text-lg" x-text="'+¥' + (tx.host_earnings || 0).toFixed(2)"></p>
                        <p class="text-xs text-gray-500 dark:text-gray-400" x-text="'订单: ¥' + (tx.total_amount || 0).toFixed(2)"></p>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>

<script>
function hostDashboard() {
    return {
        loading: true,
        dashboard: {},
        transactions: [],
        
        async init() {
            await this.loadDashboard();
            await this.loadTransactions();
            this.loading = false;
        },
        
        async loadDashboard() {
            try {
                const res = await fetch('/api/host/dashboard', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.dashboard = data.data;
                }
            } catch (e) {
                console.error('Load dashboard failed:', e);
            }
        },
        
        async loadTransactions() {
            try {
                const res = await fetch('/api/host/transactions?per_page=5', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.transactions = data.data.items || [];
                }
            } catch (e) {
                console.error('Load transactions failed:', e);
            }
        }
    }
}
</script>
{% endblock %}
