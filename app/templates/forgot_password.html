{% extends "base_public.html" %}

{% block title %}{{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center p-4" x-data="forgotPage()" x-init="init()">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('auth.resetPassword')"></h1>
            <p class="text-gray-500 dark:text-gray-400 mt-2" x-text="$store.i18n.locale === 'zh' ? '选择重置方式找回您的密码' : 'Choose a method to reset your password'"></p>
        </div>
        
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
            <!-- 重置方式切换 -->
            <div x-show="smsEnabled && !sent" class="flex mb-6 border-b border-gray-200 dark:border-gray-700">
                <button type="button" @click="resetType = 'email'" 
                    :class="resetType === 'email' ? 'border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'"
                    class="flex-1 pb-3 text-sm font-medium transition" x-text="$store.i18n.locale === 'zh' ? '邮箱重置' : 'Email Reset'"></button>
                <button type="button" @click="resetType = 'phone'" 
                    :class="resetType === 'phone' ? 'border-b-2 border-gray-900 dark:border-white text-gray-900 dark:text-white' : 'text-gray-500 dark:text-gray-400'"
                    class="flex-1 pb-3 text-sm font-medium transition" x-text="$store.i18n.locale === 'zh' ? '手机重置' : 'Phone Reset'"></button>
            </div>

            <!-- 邮箱重置 -->
            <div x-show="!sent && resetType === 'email'" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '邮箱地址' : 'Email Address'"></label>
                    <input type="email" x-model="email" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400" placeholder="your@email.com">
                </div>
                <!-- 图形验证码 -->
                <div x-show="captchaEnabled && captchaType === 'image'">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.captcha')"></label>
                    <div class="flex gap-3">
                        <input type="text" x-model="captcha_code" maxlength="4" @keyup.enter="send"
                            class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 text-lg tracking-widest"
                            :placeholder="$store.i18n.locale === 'zh' ? '请输入验证码' : 'Enter captcha'">
                        <img :src="captchaImage" @click="refreshCaptcha()" class="h-[50px] rounded-lg cursor-pointer border border-gray-200 hover:border-gray-400 transition" :title="$store.i18n.locale === 'zh' ? '点击刷新' : 'Click to refresh'">
                    </div>
                </div>
                <!-- Turnstile 验证码 -->
                <div x-show="captchaEnabled && captchaType === 'turnstile'">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.humanVerify')"></label>
                    <div id="turnstile-container"></div>
                    <p x-show="turnstileError" class="text-red-500 text-sm mt-2" x-text="turnstileError"></p>
                </div>
                <!-- 滑块验证码 -->
                <div x-show="captchaEnabled && captchaType === 'slider'" x-data="sliderCaptchaWrapper()" x-init="init()">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('auth.humanVerify')"></label>
                    <div class="slider-captcha-container" :class="containerClass">
                        <template x-if="verified">
                            <div class="slider-captcha-success-icon">✓</div>
                        </template>
                        <template x-if="!verified">
                            <div>
                                <div class="slider-captcha-bg" :style="bgStyle">
                                    <div class="slider-captcha-puzzle" :style="puzzleStyle"></div>
                                    <div class="slider-captcha-piece" :style="pieceStyle"></div>
                                    <div class="slider-captcha-refresh" @click="refresh()">
                                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                                    </div>
                                    <div x-show="loading && status !== 'verifying'" class="slider-captcha-overlay">
                                        <div class="slider-captcha-spinner"></div>
                                    </div>
                                </div>
                                <div class="slider-captcha-track">
                                    <span class="slider-captcha-text" x-text="statusText"></span>
                                    <div class="slider-captcha-btn" :style="btnStyle" @mousedown="startDrag($event)" @touchstart="startDrag($event)">
                                        <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
                <button @click="send" :disabled="sending || (captchaEnabled && captchaType === 'turnstile' && !turnstileToken) || (captchaEnabled && captchaType === 'slider' && !sliderVerified)" class="w-full py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600 disabled:opacity-50">
                    <span x-text="sending ? $store.i18n.t('auth.sendingEmail') : ($store.i18n.locale === 'zh' ? '发送重置链接' : 'Send Reset Link')"></span>
                </button>
            </div>

            <!-- 手机重置 -->
            <div x-show="!sent && resetType === 'phone'" x-cloak class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '手机号' : 'Phone Number'"></label>
                    <input type="tel" x-model="phone" maxlength="11" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400" placeholder="请输入手机号">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '验证码' : 'Verification Code'"></label>
                    <div class="flex gap-2">
                        <input type="text" x-model="smsCode" maxlength="6"
                            class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400 text-lg tracking-widest"
                            placeholder="请输入验证码">
                        <button type="button" @click="sendSmsCode()" :disabled="smsSending || smsCountdown > 0"
                            class="px-4 py-3 bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-500 transition whitespace-nowrap disabled:opacity-50">
                            <span x-text="smsCountdown > 0 ? smsCountdown + 's' : (smsSending ? '发送中...' : '获取验证码')"></span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '新密码' : 'New Password'"></label>
                    <input type="password" x-model="newPassword" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 dark:bg-gray-700 dark:text-white rounded-lg focus:outline-none focus:border-gray-400" placeholder="请输入新密码（6-32位）">
                </div>
                <button @click="resetByPhone" :disabled="resetting" class="w-full py-3 bg-gray-900 dark:bg-gray-700 text-white rounded-lg hover:bg-gray-800 dark:hover:bg-gray-600 disabled:opacity-50">
                    <span x-text="resetting ? '重置中...' : '重置密码'"></span>
                </button>
            </div>

            <p x-show="!sent" class="text-center text-sm text-gray-500 dark:text-gray-400 mt-4">
                <a href="/login" class="text-blue-600 hover:underline" x-text="$store.i18n.t('common.backToLogin')"></a>
            </p>
            
            <div x-show="sent" x-cloak class="text-center py-4">
                <div class="w-16 h-16 mx-auto mb-4 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <h2 class="text-xl font-bold text-gray-900 dark:text-white mb-2" x-text="$store.i18n.t('auth.emailSent')"></h2>
                <p class="text-gray-500 dark:text-gray-400 mb-4" x-text="$store.i18n.locale === 'zh' ? '如果该邮箱已注册，您将收到重置密码的邮件' : 'If this email is registered, you will receive a password reset email'"></p>
                <p class="text-sm text-gray-400" x-text="$store.i18n.locale === 'zh' ? '请检查您的收件箱和垃圾邮件文件夹' : 'Please check your inbox and spam folder'"></p>
                <a href="/login" class="mt-6 inline-block text-blue-600 hover:underline" x-text="$store.i18n.t('common.backToLogin')"></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function forgotPage() {
    return {
        email: '', sending: false, sent: false,
        captcha_id: '', captcha_code: '', captchaImage: '',
        captchaType: 'image', captchaEnabled: true, turnstileSiteKey: '', turnstileToken: '', turnstileError: '', turnstileWidgetId: null,
        sliderVerified: false, slider_token: '',
        // 手机重置相关
        resetType: 'email',
        smsEnabled: false,
        phone: '',
        smsCode: '',
        newPassword: '',
        smsSending: false,
        smsCountdown: 0,
        resetting: false,
        
        async init() {
            await this.loadCaptchaConfig();
            await this.checkSmsStatus();
        },

        async checkSmsStatus() {
            try {
                const res = await fetch('/api/auth/sms/status');
                const data = await res.json();
                this.smsEnabled = data.code === 200 && data.data.enabled;
            } catch (e) {
                this.smsEnabled = false;
            }
        },

        async sendSmsCode() {
            if (!this.phone || !/^1[3-9]\d{9}$/.test(this.phone)) {
                alert('请输入正确的手机号');
                return;
            }
            
            this.smsSending = true;
            
            try {
                const res = await fetch('/api/auth/sms/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: this.phone,
                        scene: 'reset',
                        captcha_id: this.captcha_id,
                        captcha_code: this.captcha_code,
                        turnstile_token: this.turnstileToken
                    })
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    this.smsCountdown = 60;
                    const timer = setInterval(() => {
                        this.smsCountdown--;
                        if (this.smsCountdown <= 0) clearInterval(timer);
                    }, 1000);
                } else {
                    alert(data.message);
                    if (this.captchaType === 'image') this.refreshCaptcha();
                    else this.resetTurnstile();
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
            
            this.smsSending = false;
        },

        async resetByPhone() {
            if (!this.phone || !/^1[3-9]\d{9}$/.test(this.phone)) {
                alert('请输入正确的手机号');
                return;
            }
            if (!this.smsCode) {
                alert('请输入验证码');
                return;
            }
            if (!this.newPassword || this.newPassword.length < 6 || this.newPassword.length > 32) {
                alert('密码需为6-32个字符');
                return;
            }
            
            this.resetting = true;
            
            try {
                const res = await fetch('/api/auth/forgot-password/phone', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: this.phone,
                        code: this.smsCode,
                        password: this.newPassword
                    })
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    alert('密码重置成功，请使用新密码登录');
                    window.location.href = '/login';
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert('网络错误，请稍后重试');
            }
            
            this.resetting = false;
        },
        
        async loadCaptchaConfig() {
            try {
                const res = await fetch('/api/auth/captcha-config');
                const data = await res.json();
                if (data.code === 200) {
                    this.captchaEnabled = data.data.scenes?.forgot_password !== false;
                    if (!this.captchaEnabled) return;
                    
                    this.captchaType = data.data.type;
                    if (this.captchaType === 'turnstile') {
                        this.turnstileSiteKey = data.data.turnstile_site_key;
                        this.loadTurnstile();
                    } else if (this.captchaType === 'slider') {
                        // 滑块验证码由独立组件处理
                    } else {
                        this.refreshCaptcha();
                    }
                }
            } catch (e) {
                this.captchaEnabled = true;
                this.captchaType = 'image';
                this.refreshCaptcha();
            }
        },
        
        loadTurnstile() {
            if (window.turnstile) { this.renderTurnstile(); return; }
            const script = document.createElement('script');
            script.src = 'https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad';
            script.async = true;
            document.head.appendChild(script);
            window.onTurnstileLoad = () => { this.renderTurnstile(); };
        },
        
        renderTurnstile() {
            const container = document.getElementById('turnstile-container');
            if (!container || !window.turnstile) return;
            container.innerHTML = '';
            this.turnstileWidgetId = turnstile.render(container, {
                sitekey: this.turnstileSiteKey,
                callback: (token) => { this.turnstileToken = token; this.turnstileError = ''; },
                'error-callback': () => { this.turnstileError = '验证失败，请重试'; this.turnstileToken = ''; },
                'expired-callback': () => { this.turnstileToken = ''; this.turnstileError = '验证已过期，请重新验证'; }
            });
        },
        
        resetTurnstile() {
            if (window.turnstile && this.turnstileWidgetId !== null) {
                turnstile.reset(this.turnstileWidgetId);
                this.turnstileToken = '';
            }
        },
        
        async refreshCaptcha() {
            const res = await fetch('/api/auth/captcha');
            const data = await res.json();
            if (data.code === 200) {
                this.captcha_id = data.data.id;
                this.captchaImage = data.data.image;
                this.captcha_code = '';
            }
        },
        
        async send() {
            if (!this.email.trim()) { alert('请输入邮箱'); return; }
            if (this.captchaEnabled && this.captchaType === 'image' && !this.captcha_code.trim()) { alert('请输入验证码'); return; }
            if (this.captchaEnabled && this.captchaType === 'turnstile' && !this.turnstileToken) { alert('请完成人机验证'); return; }
            if (this.captchaEnabled && this.captchaType === 'slider' && !this.sliderVerified) { alert('请完成滑块验证'); return; }
            
            this.sending = true;
            const res = await fetch('/api/auth/forgot-password', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: this.email,
                    captcha_id: this.captcha_id,
                    captcha_code: this.captcha_code,
                    turnstile_token: this.turnstileToken,
                    slider_token: this.slider_token
                })
            });
            const data = await res.json();
            if (data.code === 200) { this.sent = true; }
            else {
                alert(data.message);
                if (this.captchaEnabled) {
                    if (this.captchaType === 'image') { this.refreshCaptcha(); }
                    else if (this.captchaType === 'turnstile') { this.resetTurnstile(); }
                    else if (this.captchaType === 'slider') { this.resetSlider(); }
                }
            }
            this.sending = false;
        },

        resetSlider() {
            this.sliderVerified = false;
            this.slider_token = '';
            // 触发滑块组件刷新
            const sliderEl = document.querySelector('[x-data*="sliderCaptchaWrapper"]');
            if (sliderEl && sliderEl.__x) {
                sliderEl.__x.$data.refresh();
            }
        }
    }
}

// 滑块验证码包装组件（用于找回密码页面）
function sliderCaptchaWrapper() {
    const base = sliderCaptcha({
        onSuccess: (token) => {
            // 获取父组件并更新状态（兼容 Alpine.js v2 和 v3）
            const forgotFormEl = document.querySelector('[x-data*="forgotPage"]');
            if (forgotFormEl) {
                // Alpine.js v3
                if (forgotFormEl._x_dataStack) {
                    const data = forgotFormEl._x_dataStack[0];
                    if (data) {
                        data.sliderVerified = true;
                        data.slider_token = token;
                    }
                }
                // Alpine.js v2
                else if (forgotFormEl.__x) {
                    forgotFormEl.__x.$data.sliderVerified = true;
                    forgotFormEl.__x.$data.slider_token = token;
                }
            }
        },
        onFail: () => {
            const forgotFormEl = document.querySelector('[x-data*="forgotPage"]');
            if (forgotFormEl) {
                // Alpine.js v3
                if (forgotFormEl._x_dataStack) {
                    const data = forgotFormEl._x_dataStack[0];
                    if (data) {
                        data.sliderVerified = false;
                        data.slider_token = '';
                    }
                }
                // Alpine.js v2
                else if (forgotFormEl.__x) {
                    forgotFormEl.__x.$data.sliderVerified = false;
                    forgotFormEl.__x.$data.slider_token = '';
                }
            }
        }
    });
    return base;
}
</script>
{% endblock %}
