{% extends "base.html" %}
{% block title %}快捷登录设置 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}
{% block content %}
<div class="p-4 sm:p-6" x-data="oauthSettingsPage()" x-init="init()">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-6" x-text="$store.i18n.locale === 'zh' ? '快捷登录设置' : 'OAuth Login Settings'"></h1>

    <!-- 域名提示 -->
    <div class="mb-6 p-4 bg-amber-50 dark:bg-amber-900/20 border border-amber-200 dark:border-amber-800 rounded-xl">
        <div class="flex items-start gap-3">
            <svg class="w-5 h-5 text-amber-600 dark:text-amber-400 mt-0.5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
            <div>
                <p class="text-sm font-medium text-amber-800 dark:text-amber-300" x-text="$store.i18n.locale === 'zh' ? '重要提示' : 'Important Notice'"></p>
                <p class="text-sm text-amber-700 dark:text-amber-400 mt-1">
                    <span x-text="$store.i18n.locale === 'zh' ? '回调地址基于当前访问域名生成：' : 'Callback URL is based on current domain:'"></span>
                    <code class="bg-amber-100 dark:bg-amber-900/50 px-1.5 py-0.5 rounded text-xs font-mono" x-text="window.location.origin"></code>
                </p>
                <p class="text-sm text-amber-700 dark:text-amber-400 mt-1" x-text="$store.i18n.locale === 'zh' ? '请确保在第三方平台配置的回调地址与此域名一致，否则登录会失败。如需修改，请在「系统设置」中配置站点URL。' : 'Make sure the callback URL configured on third-party platforms matches this domain, otherwise login will fail. To change it, configure Site URL in System Settings.'"></p>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden hover:shadow-lg transition-shadow">
        <div x-show="loading" class="p-10 text-center"><div class="inline-block w-8 h-8 border-4 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div></div>
        
        <div x-show="!loading && forbidden" class="p-10 text-center">
            <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
            </svg>
            <p class="text-gray-500 dark:text-gray-400 text-lg" x-text="$store.i18n.locale === 'zh' ? '演示用户无权查看此设置' : 'Demo users cannot view this setting'"></p>
        </div>
        
        <div x-show="!loading && !forbidden" class="p-4 sm:p-6 space-y-6">
            <!-- GitHub OAuth -->
            <div class="border border-gray-200 dark:border-gray-700 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                    </svg>
                    <h3 class="text-lg font-medium text-gray-900 dark:text-white">GitHub</h3>
                    <span x-show="form.github_oauth_enabled === '1'" class="px-2 py-1 text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full" x-text="$store.i18n.locale === 'zh' ? '已启用' : 'Enabled'"></span>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                    <span x-text="$store.i18n.locale === 'zh' ? '允许用户使用 GitHub 账号快捷登录。' : 'Allow users to login with GitHub account.'"></span>
                    <a href="https://github.com/settings/developers" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline" x-text="$store.i18n.locale === 'zh' ? '前往创建 OAuth App' : 'Create OAuth App'"></a>
                </p>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '启用状态' : 'Status'"></label>
                        <select x-model="form.github_oauth_enabled" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="0" x-text="$store.i18n.locale === 'zh' ? '禁用' : 'Disabled'"></option>
                            <option value="1" x-text="$store.i18n.locale === 'zh' ? '启用' : 'Enabled'"></option>
                        </select>
                    </div>
                    <div></div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client ID</label>
                        <input type="text" x-model="form.github_client_id" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="Ov23li...">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client Secret</label>
                        <input type="password" x-model="form.github_client_secret" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="••••••••">
                    </div>
                </div>
                <div class="mt-4 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                    <p class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '回调地址配置：' : 'Callback URL:'"></p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 bg-gray-200 dark:bg-gray-600 px-3 py-2 rounded text-sm" x-text="window.location.origin + '/api/auth/github/callback'"></code>
                        <button @click="copyToClipboard(window.location.origin + '/api/auth/github/callback')" class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700" x-text="$store.i18n.locale === 'zh' ? '复制' : 'Copy'"></button>
                    </div>
                </div>
            </div>

            <!-- Google OAuth -->
            <div class="border border-gray-200 dark:border-gray-700 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <svg class="w-8 h-8" viewBox="0 0 24 24">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <h3 class="text-lg font-medium text-gray-900 dark:text-white">Google</h3>
                    <span x-show="form.google_oauth_enabled === '1'" class="px-2 py-1 text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full" x-text="$store.i18n.locale === 'zh' ? '已启用' : 'Enabled'"></span>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                    <span x-text="$store.i18n.locale === 'zh' ? '允许用户使用 Google 账号快捷登录。' : 'Allow users to login with Google account.'"></span>
                    <a href="https://console.cloud.google.com/apis/credentials" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline" x-text="$store.i18n.locale === 'zh' ? '前往 Google Cloud Console' : 'Go to Google Cloud Console'"></a>
                </p>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '启用状态' : 'Status'"></label>
                        <select x-model="form.google_oauth_enabled" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="0" x-text="$store.i18n.locale === 'zh' ? '禁用' : 'Disabled'"></option>
                            <option value="1" x-text="$store.i18n.locale === 'zh' ? '启用' : 'Enabled'"></option>
                        </select>
                    </div>
                    <div></div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client ID</label>
                        <input type="text" x-model="form.google_client_id" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="xxx.apps.googleusercontent.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client Secret</label>
                        <input type="password" x-model="form.google_client_secret" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="••••••••">
                    </div>
                </div>
                <div class="mt-4 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                    <p class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '回调地址配置：' : 'Callback URL:'"></p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 bg-gray-200 dark:bg-gray-600 px-3 py-2 rounded text-sm" x-text="window.location.origin + '/api/auth/google/callback'"></code>
                        <button @click="copyToClipboard(window.location.origin + '/api/auth/google/callback')" class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700" x-text="$store.i18n.locale === 'zh' ? '复制' : 'Copy'"></button>
                    </div>
                </div>
            </div>

            <!-- NodeLoc OAuth -->
            <div class="border border-gray-200 dark:border-gray-700 rounded-xl p-6">
                <div class="flex items-center gap-3 mb-4">
                    <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                    <h3 class="text-lg font-medium text-gray-900 dark:text-white">NodeLoc</h3>
                    <span x-show="form.nodeloc_oauth_enabled === '1'" class="px-2 py-1 text-xs bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 rounded-full" x-text="$store.i18n.locale === 'zh' ? '已启用' : 'Enabled'"></span>
                </div>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-4">
                    <span x-text="$store.i18n.locale === 'zh' ? '允许用户使用 NodeLoc 论坛账号快捷登录。' : 'Allow users to login with NodeLoc forum account.'"></span>
                    <a href="https://www.nodeloc.com/oauth-provider/applications" target="_blank" class="text-blue-600 dark:text-blue-400 hover:underline" x-text="$store.i18n.locale === 'zh' ? '前往创建 OAuth App' : 'Create OAuth App'"></a>
                </p>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '启用状态' : 'Status'"></label>
                        <select x-model="form.nodeloc_oauth_enabled" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="0" x-text="$store.i18n.locale === 'zh' ? '禁用' : 'Disabled'"></option>
                            <option value="1" x-text="$store.i18n.locale === 'zh' ? '启用' : 'Enabled'"></option>
                        </select>
                    </div>
                    <div></div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client ID</label>
                        <input type="text" x-model="form.nodeloc_client_id" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="your-client-id">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Client Secret</label>
                        <input type="password" x-model="form.nodeloc_client_secret" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="••••••••">
                    </div>
                </div>
                <div class="mt-4 p-4 bg-gray-50 dark:bg-gray-700/50 rounded-xl">
                    <p class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '回调地址配置：' : 'Callback URL:'"></p>
                    <div class="flex items-center gap-2">
                        <code class="flex-1 bg-gray-200 dark:bg-gray-600 px-3 py-2 rounded text-sm" x-text="window.location.origin + '/api/auth/nodeloc/callback'"></code>
                        <button @click="copyToClipboard(window.location.origin + '/api/auth/nodeloc/callback')" class="px-3 py-2 text-sm border border-gray-300 dark:border-gray-600 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-700" x-text="$store.i18n.locale === 'zh' ? '复制' : 'Copy'"></button>
                    </div>
                </div>
            </div>

            <div class="flex justify-end pt-4">
                <button @click="save" :disabled="saving" class="px-6 py-3 bg-gray-900 dark:bg-gray-600 text-white rounded-xl hover:bg-gray-800 dark:hover:bg-gray-500 disabled:opacity-50">
                    <span x-show="!saving" x-text="$store.i18n.locale === 'zh' ? '保存设置' : 'Save Settings'"></span>
                    <span x-show="saving" x-text="$store.i18n.locale === 'zh' ? '保存中...' : 'Saving...'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function oauthSettingsPage() {
    return {
        form: {
            github_oauth_enabled: '0',
            github_client_id: '',
            github_client_secret: '',
            google_oauth_enabled: '0',
            google_client_id: '',
            google_client_secret: '',
            nodeloc_oauth_enabled: '0',
            nodeloc_client_id: '',
            nodeloc_client_secret: ''
        },
        loading: true,
        saving: false,
        forbidden: false,
        get token() { return localStorage.getItem('token'); },
        get locale() { return Alpine.store('i18n').locale; },
        
        async init() {
            if (!this.token) { window.location.href = '/login'; return; }
            await this.load();
        },
        
        async load() {
            this.loading = true;
            const res = await fetch('/api/admin/settings', { headers: { 'Authorization': 'Bearer ' + this.token } });
            const data = await res.json();
            if (data.code === 200) {
                const s = data.data.settings;
                this.form.github_oauth_enabled = s.github_oauth_enabled || '0';
                this.form.github_client_id = s.github_client_id || '';
                this.form.github_client_secret = s.github_client_secret || '';
                this.form.google_oauth_enabled = s.google_oauth_enabled || '0';
                this.form.google_client_id = s.google_client_id || '';
                this.form.google_client_secret = s.google_client_secret || '';
                this.form.nodeloc_oauth_enabled = s.nodeloc_oauth_enabled || '0';
                this.form.nodeloc_client_id = s.nodeloc_client_id || '';
                this.form.nodeloc_client_secret = s.nodeloc_client_secret || '';
            } else if (data.code === 403) {
                this.forbidden = true;
            }
            this.loading = false;
        },
        
        async save() {
            this.saving = true;
            const res = await fetch('/api/admin/settings', {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                body: JSON.stringify(this.form)
            });
            const data = await res.json();
            if (data.code === 200) {
                alert(this.locale === 'zh' ? '设置保存成功' : 'Settings saved successfully');
            } else {
                alert(data.message || (this.locale === 'zh' ? '保存失败' : 'Save failed'));
            }
            this.saving = false;
        },
        
        copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert(this.locale === 'zh' ? '已复制到剪贴板' : 'Copied to clipboard');
            });
        }
    }
}
</script>
{% endblock %}
