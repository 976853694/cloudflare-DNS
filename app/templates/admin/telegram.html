{% extends "base.html" %}
{% block title %}Telegram - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}
{% block content %}
<div class="p-4 sm:p-6" x-data="telegramPage()" x-init="init()">
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-6" x-text="$store.i18n.t('telegram.title')"></h1>
    <div class="space-y-6">
        <!-- 机器人配置 -->
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-4" x-text="$store.i18n.t('telegram.botConfig')"></h2>
            <div x-show="loading" class="py-10 text-center">
                <div class="inline-block w-8 h-8 border-4 border-gray-200 border-t-gray-600 rounded-full animate-spin"></div>
            </div>
            <div x-show="!loading" class="space-y-4">
                <div class="grid sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('telegram.botName')"></label>
                        <input type="text" x-model="form.name" class="w-full px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :placeholder="$store.i18n.t('telegram.botNamePlaceholder')">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('telegram.botToken')"></label>
                        <div class="flex gap-2">
                            <input type="text" x-model="form.token" class="flex-1 px-4 py-3 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :placeholder="$store.i18n.t('telegram.botTokenPlaceholder')">
                            <button @click="testToken" :disabled="testing || !form.token" class="px-4 py-2 bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-xl hover:bg-gray-200 disabled:opacity-50">
                                <span x-show="!testing" x-text="$store.i18n.t('telegram.test')"></span>
                                <span x-show="testing" class="inline-block w-4 h-4 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></span>
                            </button>
                        </div>
                    </div>
                </div>
                <div x-show="form.username" class="p-4 bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 rounded-xl">
                    <div class="flex items-center gap-2 text-green-700 dark:text-green-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span><span x-text="$store.i18n.t('telegram.botUsername')"></span>: @<span x-text="form.username"></span></span>
                    </div>
                </div>
                <div class="flex flex-wrap gap-3 pt-4">
                    <button @click="saveBot" :disabled="saving || !form.name || !form.token" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl hover:bg-blue-700 disabled:opacity-50 transition-colors">
                        <span x-show="!saving" x-text="$store.i18n.t('telegram.saveConfig')"></span>
                        <span x-show="saving" class="inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
                    </button>
                    <button x-show="botExists" @click="toggleBot" :disabled="toggling" class="px-6 py-2.5 rounded-xl" :class="form.is_enabled ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-green-100 text-green-600 hover:bg-green-200'">
                        <span x-show="!toggling" x-text="form.is_enabled ? $store.i18n.t('telegram.disableBot') : $store.i18n.t('telegram.enableBot')"></span>
                        <span x-show="toggling" class="inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full animate-spin"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- API地址配置 -->
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-3 sm:gap-0 mb-4">
                <h2 class="text-lg font-medium text-gray-900 dark:text-white" x-text="$store.i18n.t('telegram.apiConfig')"></h2>
                <button @click="addApiUrl" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-xl hover:bg-blue-700 transition-colors">
                    <span x-text="$store.i18n.t('telegram.addApiUrl')"></span>
                </button>
            </div>
            <p class="text-sm text-gray-500 dark:text-gray-400 mb-4" x-text="$store.i18n.t('telegram.apiConfigDesc')"></p>
            
            <!-- API地址列表 -->
            <div class="space-y-3">
                <template x-for="(url, index) in form.api_urls" :key="index">
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500 dark:text-gray-400 w-6" x-text="index + 1"></span>
                        <input type="text" x-model="form.api_urls[index]" class="flex-1 px-4 py-2.5 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm" :placeholder="$store.i18n.t('telegram.apiUrlPlaceholder')">
                        <button @click="testApiUrl(index)" :disabled="testingApi[index] || !form.api_urls[index]" class="px-3 py-2 bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 rounded-xl hover:bg-gray-200 disabled:opacity-50 text-sm">
                            <span x-show="!testingApi[index]" x-text="$store.i18n.t('telegram.test')"></span>
                            <span x-show="testingApi[index]" class="inline-block w-4 h-4 border-2 border-gray-400 border-t-transparent rounded-full animate-spin"></span>
                        </button>
                        <button @click="removeApiUrl(index)" class="px-3 py-2 bg-red-100 text-red-600 rounded-xl hover:bg-red-200 text-sm">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                        <!-- 状态指示 -->
                        <span x-show="apiStatus[index] === 'success'" class="text-green-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </span>
                        <span x-show="apiStatus[index] === 'error'" class="text-red-500">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        </span>
                    </div>
                </template>
                <div x-show="form.api_urls.length === 0" class="text-center py-8 text-gray-500 dark:text-gray-400">
                    <p x-text="$store.i18n.t('telegram.noApiUrls')"></p>
                    <p class="text-sm mt-1" x-text="$store.i18n.t('telegram.useDefaultApi')"></p>
                </div>
            </div>
        </div>

        <!-- 使用说明 -->
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-6 hover:shadow-lg transition-shadow">
            <h2 class="text-lg font-medium text-gray-900 dark:text-white mb-4" x-text="$store.i18n.t('telegram.instructions')"></h2>
            <div class="text-sm text-gray-600 dark:text-gray-400 space-y-2">
                <p x-text="$store.i18n.t('telegram.step1')"></p>
                <p x-text="$store.i18n.t('telegram.step2')"></p>
                <p x-text="$store.i18n.t('telegram.step3')"></p>
                <p x-text="$store.i18n.t('telegram.step4')"></p>
                <p x-text="$store.i18n.t('telegram.step5')"></p>
            </div>
            <div class="mt-4 p-4 bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl transition-colors">
                <h3 class="text-sm font-medium text-blue-800 dark:text-blue-300 mb-2" x-text="$store.i18n.t('telegram.proxyTip')"></h3>
                <p class="text-sm text-blue-700 dark:text-blue-400" x-text="$store.i18n.t('telegram.proxyDesc')"></p>
            </div>
        </div>
    </div>
</div>
<script>
function telegramPage() {
    return {
        loading: true, saving: false, testing: false, toggling: false, botExists: false,
        form: { name: '', token: '', username: '', is_enabled: true, api_urls: [] },
        testingApi: {},
        apiStatus: {},
        async init() { await this.loadBot(); },
        async loadBot() {
            this.loading = true;
            try {
                const resp = await fetch('/api/admin/telegram/bot', { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
                const data = await resp.json();
                if (data.code === 0 && data.data) { 
                    this.form = { 
                        name: data.data.name || '', 
                        token: data.data.token || '', 
                        username: data.data.username || '', 
                        is_enabled: data.data.is_enabled,
                        api_urls: data.data.api_urls || []
                    }; 
                    this.botExists = true; 
                }
            } catch (e) { console.error(e); }
            this.loading = false;
        },
        async testToken() {
            if (!this.form.token) return;
            this.testing = true;
            try {
                const apiUrl = this.form.api_urls.length > 0 ? this.form.api_urls[0] : '';
                const resp = await fetch('/api/admin/telegram/bot/test', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') }, 
                    body: JSON.stringify({ token: this.form.token, api_url: apiUrl }) 
                });
                const data = await resp.json();
                if (data.code === 0) { this.form.username = data.data.username || ''; window.$toast && window.$toast.success(data.message); }
                else { window.$toast && window.$toast.error(data.message); }
            } catch (e) { window.$toast && window.$toast.error(Alpine.store('i18n').t('telegram.testFailed')); }
            this.testing = false;
        },
        async saveBot() {
            if (!this.form.name || !this.form.token) return;
            // 过滤空的API地址
            this.form.api_urls = this.form.api_urls.filter(url => url && url.trim());
            this.saving = true;
            try {
                const resp = await fetch('/api/admin/telegram/bot', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') }, 
                    body: JSON.stringify(this.form) 
                });
                const data = await resp.json();
                if (data.code === 0) { this.form.username = data.data.username || ''; this.botExists = true; window.$toast && window.$toast.success(data.message); }
                else { window.$toast && window.$toast.error(data.message); }
            } catch (e) { window.$toast && window.$toast.error(Alpine.store('i18n').t('telegram.saveFailed')); }
            this.saving = false;
        },
        async toggleBot() {
            this.toggling = true;
            try {
                const resp = await fetch('/api/admin/telegram/bot/toggle', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') } });
                const data = await resp.json();
                if (data.code === 0) { this.form.is_enabled = data.data.is_enabled; window.$toast && window.$toast.success(data.message); }
                else { window.$toast && window.$toast.error(data.message); }
            } catch (e) { window.$toast && window.$toast.error(Alpine.store('i18n').t('telegram.operationFailed')); }
            this.toggling = false;
        },
        addApiUrl() {
            this.form.api_urls.push('');
        },
        removeApiUrl(index) {
            this.form.api_urls.splice(index, 1);
            delete this.testingApi[index];
            delete this.apiStatus[index];
        },
        async testApiUrl(index) {
            const url = this.form.api_urls[index];
            if (!url) return;
            this.testingApi[index] = true;
            this.apiStatus[index] = null;
            try {
                const resp = await fetch('/api/admin/telegram/api/test', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('token') }, 
                    body: JSON.stringify({ api_url: url, token: this.form.token }) 
                });
                const data = await resp.json();
                if (data.code === 0) { 
                    this.apiStatus[index] = 'success';
                    window.$toast && window.$toast.success(data.message); 
                } else { 
                    this.apiStatus[index] = 'error';
                    window.$toast && window.$toast.error(data.message); 
                }
            } catch (e) { 
                this.apiStatus[index] = 'error';
                window.$toast && window.$toast.error(Alpine.store('i18n').t('telegram.testFailed')); 
            }
            this.testingApi[index] = false;
        }
    };
}
</script>
{% endblock %}
