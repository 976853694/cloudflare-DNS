{% extends "base.html" %}

{% block title %}工单管理 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="adminTicketsPage()" x-init="init()">
    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.total"></div>
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('adminTicket.totalTickets')"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-2xl font-bold text-yellow-600 dark:text-yellow-400" x-text="stats.pending"></div>
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('adminTicket.pending')"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-2xl font-bold text-blue-600 dark:text-blue-400" x-text="stats.processing"></div>
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('adminTicket.processing')"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-2xl font-bold text-green-600 dark:text-green-400" x-text="stats.closed"></div>
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('adminTicket.closed')"></div>
        </div>
    </div>

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('adminTicket.title')"></h1>
        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
            <button x-show="selectedIds.length > 0" @click="batchDelete()" class="bg-red-500 text-white px-4 py-2 rounded-xl text-sm hover:bg-red-600 whitespace-nowrap">
                <span x-text="$store.i18n.t('common.delete')"></span> (<span x-text="selectedIds.length"></span>)
            </button>
            <select x-model="statusFilter" @change="page=1; loadTickets()" class="px-3 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <option value="" x-text="$store.i18n.t('adminTicket.allStatus')"></option>
                <option value="0" x-text="$store.i18n.t('adminTicket.pending')"></option>
                <option value="1" x-text="$store.i18n.t('adminTicket.processing')"></option>
                <option value="2" x-text="$store.i18n.t('adminTicket.closed')"></option>
            </select>
            <div class="flex gap-2">
                <input type="text" x-model="keyword" @keyup.enter="page=1; loadTickets()" :placeholder="$store.i18n.t('adminTicket.searchPlaceholder')" class="flex-1 sm:w-48 px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 text-sm bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <button @click="page=1; loadTickets()" class="bg-gray-900 dark:bg-gray-600 text-white px-4 py-2 rounded-xl text-sm hover:bg-gray-800 dark:hover:bg-gray-500 whitespace-nowrap" x-text="$store.i18n.t('common.search')"></button>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden hover:shadow-lg transition-shadow">
        <div x-show="loading" class="p-10 text-center"><div class="inline-block w-8 h-8 border-4 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div></div>
        
        <!-- 桌面端表格 -->
        <div x-show="!loading" class="hidden lg:block overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 dark:bg-gray-700">
                    <tr>
                        <th class="px-6 py-3 text-left">
                            <input type="checkbox" @change="toggleSelectAll" :checked="selectedIds.length === tickets.length && tickets.length > 0" class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                        </th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.ticketNo')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.subject')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.user')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.status')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.replies')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('adminTicket.updatedAt')"></th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('common.actions')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100 dark:divide-gray-700">
                    <template x-for="ticket in tickets" :key="ticket.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 cursor-pointer" @click="viewTicket(ticket.id)">
                            <td class="px-6 py-4" @click.stop>
                                <input type="checkbox" :value="ticket.id" x-model="selectedIds" class="w-4 h-4 rounded border-gray-300 dark:border-gray-600 text-blue-600 focus:ring-blue-500">
                            </td>
                            <td class="px-6 py-4 text-gray-900 dark:text-white font-mono text-sm" x-text="ticket.ticket_no"></td>
                            <td class="px-6 py-4">
                                <div class="font-medium text-gray-900 dark:text-white" x-text="ticket.subject"></div>
                                <div class="text-sm text-gray-500 dark:text-gray-400 truncate max-w-xs" x-text="ticket.content"></div>
                            </td>
                            <td class="px-6 py-4 text-gray-600 dark:text-gray-300" x-text="ticket.from_username"></td>
                            <td class="px-6 py-4">
                                <span :class="{
                                    'bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300': ticket.status === 0,
                                    'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': ticket.status === 1,
                                    'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300': ticket.status === 2
                                } transition-colors" class="px-2 py-1 rounded text-xs" x-text="ticket.status_text"></span>
                            </td>
                            <td class="px-6 py-4">
                                <span class="text-gray-600 dark:text-gray-300" x-text="ticket.reply_count"></span>
                                <span x-show="ticket.unread_count > 0" class="ml-1 px-1.5 py-0.5 bg-red-500 text-white text-xs rounded-full" x-text="ticket.unread_count"></span>
                            </td>
                            <td class="px-6 py-4 text-gray-500 dark:text-gray-400 text-sm" x-text="ticket.updated_at"></td>
                            <td class="px-6 py-4" @click.stop>
                                <div class="flex items-center space-x-3">
                                    <button @click="viewTicket(ticket.id)" class="text-blue-500 hover:text-blue-700 text-sm" x-text="$store.i18n.t('common.view')"></button>
                                    <button x-show="ticket.status !== 2" @click="closeTicket(ticket)" class="text-orange-500 hover:text-orange-700 text-sm" x-text="$store.i18n.t('adminTicket.close')"></button>
                                    <button @click="deleteTicket(ticket)" class="text-red-500 hover:text-red-700 text-sm" x-text="$store.i18n.t('common.delete')"></button>
                                </div>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="!loading && tickets.length === 0">
                        <td colspan="8" class="px-6 py-10 text-center text-gray-400 dark:text-gray-500" x-text="$store.i18n.t('adminTicket.noTickets')"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 移动端卡片列表 -->
        <div x-show="!loading" class="lg:hidden divide-y divide-gray-100 dark:divide-gray-700">
            <template x-for="ticket in tickets" :key="ticket.id">
                <div class="p-4 hover:bg-gray-50 dark:hover:bg-gray-700/50" @click="viewTicket(ticket.id)">
                    <div class="flex items-start justify-between mb-2">
                        <div>
                            <span class="font-mono text-sm text-gray-500 dark:text-gray-400" x-text="ticket.ticket_no"></span>
                            <span x-show="ticket.unread_count > 0" class="ml-1 px-1.5 py-0.5 bg-red-500 text-white text-xs rounded-full" x-text="ticket.unread_count"></span>
                        </div>
                        <span :class="{
                            'bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300': ticket.status === 0,
                            'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': ticket.status === 1,
                            'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300': ticket.status === 2
                        } transition-colors" class="px-2 py-0.5 rounded text-xs" x-text="ticket.status_text"></span>
                    </div>
                    <div class="font-medium text-gray-900 dark:text-white mb-1" x-text="ticket.subject"></div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 truncate mb-2" x-text="ticket.content"></div>
                    <div class="flex items-center justify-between text-xs text-gray-400 dark:text-gray-500">
                        <span x-text="ticket.from_username"></span>
                        <span x-text="ticket.updated_at"></span>
                    </div>
                </div>
            </template>
            <div x-show="tickets.length === 0" class="p-10 text-center text-gray-400 dark:text-gray-500" x-text="$store.i18n.t('adminTicket.noTickets')"></div>
        </div>

        <div x-show="!loading && pagination.pages > 1" class="px-4 sm:px-6 py-4 border-t border-gray-100 dark:border-gray-700 flex flex-col sm:flex-row items-center justify-between gap-3">
            <span class="text-sm text-gray-500 dark:text-gray-400"><span x-text="$store.i18n.t('common.total')"></span> <span x-text="pagination.total"></span> <span x-text="$store.i18n.t('common.records')"></span></span>
            <div class="flex items-center space-x-2">
                <button @click="goPage(page - 1)" :disabled="page <= 1" class="px-3 py-1 border border-gray-200 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300" x-text="$store.i18n.t('common.prev')"></button>
                <span class="px-3 py-1 text-gray-600 dark:text-gray-400 text-sm" x-text="page + ' / ' + pagination.pages"></span>
                <button @click="goPage(page + 1)" :disabled="page >= pagination.pages" class="px-3 py-1 border border-gray-200 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300" x-text="$store.i18n.t('common.next')"></button>
            </div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div x-show="toast.show" x-cloak x-transition class="fixed bottom-4 right-4 px-4 py-2 rounded-xl text-white text-sm z-50" :class="toast.type === 'success' ? 'bg-green-500' : 'bg-red-500'" x-text="toast.message"></div>
</div>

<script>
function adminTicketsPage() {
    return {
        tickets: [],
        loading: true,
        page: 1,
        pagination: { total: 0, pages: 1 },
        statusFilter: '',
        keyword: '',
        stats: { total: 0, pending: 0, processing: 0, closed: 0 },
        toast: { show: false, message: '', type: 'success' },
        selectedIds: [],

        async init() {
            await this.loadStats();
            await this.loadTickets();
        },

        async loadStats() {
            try {
                const res = await fetch('/api/admin/tickets/stats', {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.stats = data.data;
                }
            } catch (e) {
                console.error('Load stats failed:', e);
            }
        },

        async loadTickets() {
            this.loading = true;
            this.selectedIds = [];
            try {
                const params = new URLSearchParams({ page: this.page, per_page: 20 });
                if (this.statusFilter !== '') params.append('status', this.statusFilter);
                if (this.keyword) params.append('keyword', this.keyword);
                
                const res = await fetch('/api/admin/tickets?' + params, {
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.tickets = data.data.tickets;
                    this.pagination = { total: data.data.total, pages: data.data.pages };
                }
            } catch (e) {
                console.error('Load tickets failed:', e);
            }
            this.loading = false;
        },

        viewTicket(id) {
            location.href = '/admin/tickets/' + id;
        },

        async closeTicket(ticket) {
            if (!confirm(Alpine.store('i18n').t('adminTicket.confirmClose'))) return;
            try {
                const res = await fetch(`/api/admin/tickets/${ticket.id}/close`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.showToast(Alpine.store('i18n').t('adminTicket.closeSuccess'), 'success');
                    this.loadTickets();
                    this.loadStats();
                } else {
                    this.showToast(data.message, 'error');
                }
            } catch (e) {
                this.showToast('操作失败', 'error');
            }
        },

        async deleteTicket(ticket) {
            if (!confirm(Alpine.store('i18n').t('adminTicket.confirmDelete'))) return;
            try {
                const res = await fetch(`/api/admin/tickets/${ticket.id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.showToast(Alpine.store('i18n').t('adminTicket.deleteSuccess'), 'success');
                    this.loadTickets();
                    this.loadStats();
                } else {
                    this.showToast(data.message, 'error');
                }
            } catch (e) {
                this.showToast('操作失败', 'error');
            }
        },

        async batchDelete() {
            if (!confirm(Alpine.store('i18n').t('adminTicket.confirmBatchDelete', { count: this.selectedIds.length }))) return;
            try {
                const res = await fetch('/api/admin/tickets/batch', {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + localStorage.getItem('token'),
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ids: this.selectedIds })
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.showToast(data.message, 'success');
                    this.loadTickets();
                    this.loadStats();
                } else {
                    this.showToast(data.message, 'error');
                }
            } catch (e) {
                this.showToast('操作失败', 'error');
            }
        },

        toggleSelectAll() {
            if (this.selectedIds.length === this.tickets.length) {
                this.selectedIds = [];
            } else {
                this.selectedIds = this.tickets.map(t => t.id);
            }
        },

        goPage(p) {
            if (p < 1 || p > this.pagination.pages) return;
            this.page = p;
            this.loadTickets();
        },

        showToast(message, type = 'success') {
            this.toast = { show: true, message, type };
            setTimeout(() => this.toast.show = false, 3000);
        }
    };
}
</script>
{% endblock %}
