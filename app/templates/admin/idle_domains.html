{% extends "base.html" %}

{% block title %}空置域名管理 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="idleDomainsPage()" x-init="init()">
    <!-- 页面标题 -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('idleDomain.title')"></h1>
        <div class="flex gap-2">
            <button @click="manualCheck()" class="px-4 py-2 bg-blue-600 text-white rounded-xl hover:bg-blue-700 text-sm transition-colors">
                <span x-text="$store.i18n.t('idleDomain.manualCheck')"></span>
            </button>
            <button @click="batchSendReminder()" :disabled="selectedIds.length === 0" class="px-4 py-2 bg-green-600 text-white rounded-xl hover:bg-green-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                <span x-text="$store.i18n.t('idleDomain.batchSendReminder')"></span>
            </button>
            <button @click="batchDelete()" :disabled="selectedIds.length === 0" class="px-4 py-2 bg-red-600 text-white rounded-xl hover:bg-red-700 disabled:opacity-50 disabled:cursor-not-allowed text-sm">
                <span x-text="$store.i18n.t('idleDomain.batchDelete')"></span>
            </button>
        </div>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="$store.i18n.t('idleDomain.totalIdle')"></div>
                    <div class="text-2xl font-bold text-gray-900 dark:text-white" x-text="stats.total_idle_count || 0"></div>
                </div>
                <div class="w-12 h-12 bg-gray-100 dark:bg-gray-700 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-gray-600 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="$store.i18n.t('idleDomain.pendingReminder')"></div>
                    <div class="text-2xl font-bold text-yellow-600 dark:text-yellow-400" x-text="stats.pending_reminder_count || 0"></div>
                </div>
                <div class="w-12 h-12 bg-yellow-100 dark:bg-yellow-900/30 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-yellow-600 dark:text-yellow-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="$store.i18n.t('idleDomain.reminded')"></div>
                    <div class="text-2xl font-bold text-blue-600 dark:text-blue-400" x-text="stats.reminded_count || 0"></div>
                </div>
                <div class="w-12 h-12 bg-blue-100 dark:bg-blue-900/30 rounded-xl flex items-center justify-center transition-colors">
                    <svg class="w-6 h-6 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="flex items-center justify-between">
                <div>
                    <div class="text-sm text-gray-500 dark:text-gray-400 mb-1" x-text="$store.i18n.t('idleDomain.pendingDeletion')"></div>
                    <div class="text-2xl font-bold text-red-600 dark:text-red-400" x-text="stats.pending_deletion_count || 0"></div>
                </div>
                <div class="w-12 h-12 bg-red-100 dark:bg-red-900/30 rounded-xl flex items-center justify-center">
                    <svg class="w-6 h-6 text-red-600 dark:text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- 筛选和搜索 -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mb-6 hover:shadow-lg transition-shadow">
        <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('common.status')"></label>
                <select x-model="filter.status" @change="loadList()" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                    <option value="all" x-text="$store.i18n.t('common.all')"></option>
                    <option value="pending_reminder" x-text="$store.i18n.t('idleDomain.pendingReminder')"></option>
                    <option value="reminded" x-text="$store.i18n.t('idleDomain.reminded')"></option>
                    <option value="pending_deletion" x-text="$store.i18n.t('idleDomain.pendingDeletion')"></option>
                </select>
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.t('common.search')"></label>
                <input type="text" x-model="filter.search" @input="loadList()" :placeholder="$store.i18n.t('idleDomain.searchPlaceholder')" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
        </div>
    </div>

    <!-- 域名列表 -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden hover:shadow-lg transition-shadow">
        <!-- 桌面端表格 -->
        <div class="hidden sm:block overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600">
                    <tr>
                        <th class="px-4 py-3 text-left">
                            <input type="checkbox" @change="toggleSelectAll($event)" :checked="selectedIds.length === list.length && list.length > 0" class="rounded border-gray-300 dark:border-gray-600">
                        </th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('idleDomain.domainName')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('idleDomain.owner')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('idleDomain.idleDays')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('idleDomain.reminderSentAt')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('common.status')"></th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.t('common.actions')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                    <template x-for="item in list" :key="item.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                            <td class="px-4 py-3">
                                <input type="checkbox" :value="item.id" x-model="selectedIds" class="rounded border-gray-300 dark:border-gray-600">
                            </td>
                            <td class="px-4 py-3 text-sm font-medium text-gray-900 dark:text-white" x-text="item.full_name"></td>
                            <td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-300">
                                <div x-text="item.username"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400" x-text="item.user_email"></div>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">
                                <span x-text="item.idle_days"></span> <span x-text="$store.i18n.t('common.days')"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400" x-text="item.idle_reminder_sent_at || '-'"></td>
                            <td class="px-4 py-3">
                                <span class="px-2 py-1 rounded text-xs" :class="{
                                    'bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300': item.status === 'pending_reminder',
                                    'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': item.status === 'reminded',
                                    'bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300': item.status === 'pending_deletion'
                                } transition-colors" x-text="getStatusText(item.status)"></span>
                            </td>
                            <td class="px-4 py-3 text-right space-x-2">
                                <button @click="sendReminder(item)" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 text-sm" x-text="$store.i18n.t('idleDomain.sendReminder')"></button>
                                <button @click="deleteDomain(item)" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 text-sm" x-text="$store.i18n.t('common.delete')"></button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="list.length === 0">
                        <td colspan="7" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('common.noData')"></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 移动端卡片视图 -->
        <div class="sm:hidden divide-y divide-gray-200 dark:divide-gray-700">
            <!-- 全选 -->
            <div class="px-4 py-3 bg-gray-50 dark:bg-gray-700 flex items-center gap-3">
                <input type="checkbox" @change="toggleSelectAll($event)" :checked="selectedIds.length === list.length && list.length > 0" class="rounded border-gray-300 dark:border-gray-600">
                <span class="text-sm text-gray-600 dark:text-gray-300" x-text="$store.i18n.locale === 'zh' ? '全选' : 'Select All'"></span>
            </div>
            <template x-for="item in list" :key="item.id">
                <div class="p-4">
                    <div class="flex items-start gap-3 mb-3">
                        <input type="checkbox" :value="item.id" x-model="selectedIds" class="mt-1 rounded border-gray-300 dark:border-gray-600">
                        <div class="flex-1 min-w-0">
                            <p class="font-medium text-gray-900 dark:text-white truncate" x-text="item.full_name"></p>
                            <p class="text-sm text-gray-500 dark:text-gray-400" x-text="item.username"></p>
                        </div>
                        <span class="px-2 py-1 rounded text-xs flex-shrink-0" :class="{
                            'bg-yellow-100 dark:bg-yellow-900/50 text-yellow-700 dark:text-yellow-300': item.status === 'pending_reminder',
                            'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': item.status === 'reminded',
                            'bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300': item.status === 'pending_deletion'
                        } transition-colors" x-text="getStatusText(item.status)"></span>
                    </div>
                    <div class="flex items-center justify-between text-xs text-gray-500 dark:text-gray-400 mb-3 ml-7">
                        <span><span x-text="$store.i18n.locale === 'zh' ? '空置' : 'Idle'"></span>: <span x-text="item.idle_days"></span><span x-text="$store.i18n.t('common.days')"></span></span>
                        <span x-text="item.idle_reminder_sent_at || '-'"></span>
                    </div>
                    <div class="flex items-center justify-end gap-4 ml-7">
                        <button @click="sendReminder(item)" class="text-blue-600 dark:text-blue-400 text-sm" x-text="$store.i18n.t('idleDomain.sendReminder')"></button>
                        <button @click="deleteDomain(item)" class="text-red-600 dark:text-red-400 text-sm" x-text="$store.i18n.t('common.delete')"></button>
                    </div>
                </div>
            </template>
            <div x-show="list.length === 0" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('common.noData')"></div>
        </div>

        <!-- 分页 -->
        <div x-show="pagination.total_pages > 1" class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="text-sm text-gray-700 dark:text-gray-300">
                <span x-text="$store.i18n.t('common.total')"></span>: <span x-text="pagination.total"></span>
            </div>
            <div class="flex gap-2">
                <button @click="prevPage()" :disabled="pagination.page <= 1" class="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded text-sm disabled:opacity-50 disabled:cursor-not-allowed" x-text="$store.i18n.t('common.prev')"></button>
                <span class="px-3 py-1 text-sm text-gray-700 dark:text-gray-300">
                    <span x-text="pagination.page"></span> / <span x-text="pagination.total_pages"></span>
                </span>
                <button @click="nextPage()" :disabled="pagination.page >= pagination.total_pages" class="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded text-sm disabled:opacity-50 disabled:cursor-not-allowed" x-text="$store.i18n.t('common.next')"></button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function idleDomainsPage() {
    return {
        stats: {},
        list: [],
        selectedIds: [],
        filter: {
            status: 'all',
            search: ''
        },
        pagination: {
            page: 1,
            per_page: 20,
            total: 0,
            total_pages: 0
        },

        get token() { return localStorage.getItem('token'); },

        async init() {
            await this.loadStats();
            await this.loadList();
        },

        async loadStats() {
            try {
                const res = await fetch('/api/admin/idle-domains/stats', {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.stats = data.data;
                }
            } catch (e) {
                console.error('Load stats failed:', e);
            }
        },

        async loadList() {
            try {
                const params = new URLSearchParams({
                    status: this.filter.status,
                    search: this.filter.search,
                    page: this.pagination.page,
                    per_page: this.pagination.per_page
                });

                const res = await fetch('/api/admin/idle-domains/list?' + params.toString(), {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.list = data.data.items;
                    this.pagination.total = data.data.total;
                    this.pagination.total_pages = data.data.total_pages;
                    this.selectedIds = [];
                }
            } catch (e) {
                console.error('Load list failed:', e);
            }
        },

        async sendReminder(item) {
            if (!confirm(this.$store.i18n.locale === 'zh' ? `确定要发送提醒邮件给 ${item.full_name} 吗?` : `Send reminder to ${item.full_name}?`)) return;

            try {
                const res = await fetch(`/api/admin/idle-domains/${item.id}/send-reminder`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                alert(data.message);
                if (data.code === 200) {
                    await this.loadStats();
                    await this.loadList();
                }
            } catch (e) {
                alert(this.$store.i18n.locale === 'zh' ? '发送失败' : 'Send failed');
            }
        },

        async deleteDomain(item) {
            if (!confirm(this.$store.i18n.locale === 'zh' ? `确定要删除域名 ${item.full_name} 吗? 此操作不可恢复!` : `Delete ${item.full_name}? This cannot be undone!`)) return;

            try {
                const res = await fetch(`/api/admin/idle-domains/${item.id}/delete`, {
                    method: 'DELETE',
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                alert(data.message);
                if (data.code === 200) {
                    await this.loadStats();
                    await this.loadList();
                }
            } catch (e) {
                alert(this.$store.i18n.locale === 'zh' ? '删除失败' : 'Delete failed');
            }
        },

        async batchSendReminder() {
            if (this.selectedIds.length === 0) return;
            if (!confirm(this.$store.i18n.locale === 'zh' ? `确定要批量发送提醒邮件给 ${this.selectedIds.length} 个域名吗?` : `Send reminder to ${this.selectedIds.length} domains?`)) return;

            try {
                const res = await fetch('/api/admin/idle-domains/batch-send-reminder', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + this.token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ subdomain_ids: this.selectedIds })
                });
                const data = await res.json();
                alert(data.message);
                if (data.code === 200) {
                    await this.loadStats();
                    await this.loadList();
                }
            } catch (e) {
                alert(this.$store.i18n.locale === 'zh' ? '批量发送失败' : 'Batch send failed');
            }
        },

        async batchDelete() {
            if (this.selectedIds.length === 0) return;
            if (!confirm(this.$store.i18n.locale === 'zh' ? `确定要批量删除 ${this.selectedIds.length} 个域名吗? 此操作不可恢复!` : `Delete ${this.selectedIds.length} domains? This cannot be undone!`)) return;

            try {
                const res = await fetch('/api/admin/idle-domains/batch-delete', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + this.token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ subdomain_ids: this.selectedIds })
                });
                const data = await res.json();
                alert(data.message);
                if (data.code === 200) {
                    await this.loadStats();
                    await this.loadList();
                }
            } catch (e) {
                alert(this.$store.i18n.locale === 'zh' ? '批量删除失败' : 'Batch delete failed');
            }
        },

        async manualCheck() {
            if (!confirm(this.$store.i18n.locale === 'zh' ? '确定要立即执行空置域名检测吗?' : 'Run idle domain check now?')) return;

            try {
                const res = await fetch('/api/admin/idle-domains/manual-check', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                
                if (data.code === 200) {
                    const result = data.data;
                    let message = this.$store.i18n.locale === 'zh' 
                        ? `检测完成!\n待提醒: ${result.reminder_count}个\n待删除: ${result.deletion_count}个`
                        : `Check completed!\nPending reminder: ${result.reminder_count}\nPending deletion: ${result.deletion_count}`;
                    
                    alert(message);
                    await this.loadStats();
                    await this.loadList();
                } else {
                    alert(data.message);
                }
            } catch (e) {
                alert(this.$store.i18n.locale === 'zh' ? '检测失败' : 'Check failed');
            }
        },

        toggleSelectAll(event) {
            if (event.target.checked) {
                this.selectedIds = this.list.map(item => item.id);
            } else {
                this.selectedIds = [];
            }
        },

        prevPage() {
            if (this.pagination.page > 1) {
                this.pagination.page--;
                this.loadList();
            }
        },

        nextPage() {
            if (this.pagination.page < this.pagination.total_pages) {
                this.pagination.page++;
                this.loadList();
            }
        },

        getStatusText(status) {
            const texts = {
                'pending_reminder': this.$store.i18n.t('idleDomain.pendingReminder'),
                'reminded': this.$store.i18n.t('idleDomain.reminded'),
                'pending_deletion': this.$store.i18n.t('idleDomain.pendingDeletion')
            };
            return texts[status] || status;
        }
    };
}
</script>
{% endblock %}
