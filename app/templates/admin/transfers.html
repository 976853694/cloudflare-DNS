{% extends "base.html" %}

{% block title %}转移管理 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="adminTransfers()" x-init="init()">
    <!-- 标题 -->
    <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white mb-6" x-text="$store.i18n.t('transfer.adminTitle')"></h1>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.t('transfer.stats.total')"></p>
            <p class="text-2xl font-bold text-gray-900 dark:text-white mt-1" x-text="stats.total_transfers || 0"></p>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.t('transfer.stats.completed')"></p>
            <p class="text-2xl font-bold text-green-600 mt-1" x-text="stats.completed_transfers || 0"></p>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.t('transfer.stats.pending')"></p>
            <p class="text-2xl font-bold text-yellow-600 mt-1" x-text="stats.pending_transfers || 0"></p>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <p class="text-gray-500 dark:text-gray-400 text-sm" x-text="$store.i18n.t('transfer.stats.feeCollected')"></p>
            <p class="text-2xl font-bold text-blue-600 mt-1" x-text="stats.total_fee_collected || 0"></p>
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mb-6 hover:shadow-lg transition-shadow">
        <div class="flex flex-wrap gap-4">
            <!-- 搜索 -->
            <div class="flex-1 min-w-[200px]">
                <input type="text" x-model="keyword" @keyup.enter="page = 1; loadData()"
                    :placeholder="$store.i18n.t('transfer.searchPlaceholder')"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            </div>
            <!-- 状态筛选 -->
            <select x-model="status" @change="page = 1; loadData()"
                class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <option value="" x-text="$store.i18n.t('transfer.allStatus')"></option>
                <option value="0" x-text="$store.i18n.t('transfer.statusPending')"></option>
                <option value="1" x-text="$store.i18n.t('transfer.statusCompleted')"></option>
                <option value="2" x-text="$store.i18n.t('transfer.statusCancelled')"></option>
                <option value="3" x-text="$store.i18n.t('transfer.statusExpired')"></option>
            </select>
            <!-- 日期范围 -->
            <input type="date" x-model="dateFrom" @change="page = 1; loadData()"
                class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            <input type="date" x-model="dateTo" @change="page = 1; loadData()"
                class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
            <!-- 搜索按钮 -->
            <button @click="page = 1; loadData()"
                class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl transition-colors">
                <span x-text="$store.i18n.t('common.search')"></span>
            </button>
        </div>
    </div>

    <!-- 加载中 -->
    <template x-if="loading">
        <div class="flex justify-center py-12">
            <div class="w-8 h-8 border-4 border-gray-200 dark:border-gray-700 border-t-blue-500 rounded-full animate-spin"></div>
        </div>
    </template>

    <!-- 列表 -->
    <template x-if="!loading">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden hover:shadow-lg transition-shadow">
            <!-- 空状态 -->
            <template x-if="transfers.length === 0">
                <div class="text-center py-12">
                    <p class="text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('transfer.noRecords')"></p>
                </div>
            </template>

            <!-- 表格 -->
            <template x-if="transfers.length > 0">
                <div class="hidden lg:block overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50 dark:bg-gray-700/50">
                            <tr>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">ID</th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('transfer.domain')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('transfer.fromUser')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('transfer.toUser')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('transfer.fee')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('common.status')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('common.time')"></th>
                                <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('common.actions')"></th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                            <template x-for="item in transfers" :key="item.id">
                                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                                    <td class="px-4 py-3 text-sm text-gray-900 dark:text-white" x-text="item.id"></td>
                                    <td class="px-4 py-3 text-sm text-gray-900 dark:text-white" x-text="item.subdomain_name"></td>
                                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400" x-text="item.from_username"></td>
                                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400" x-text="item.to_username"></td>
                                    <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400" x-text="item.fee_points"></td>
                                    <td class="px-4 py-3">
                                        <span class="px-2 py-1 rounded-full text-xs font-medium"
                                            :class="{
                                                'bg-yellow-100 dark:bg-yellow-900/30 text-yellow-600 dark:text-yellow-400': item.status === 0,
                                                'bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400': item.status === 1,
                                                'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400': item.status === 2,
                                                'bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400': item.status === 3
                                            }"
                                            x-text="item.status_text"></span>
                                    </td>
                                    <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400" x-text="item.created_at"></td>
                                    <td class="px-4 py-3">
                                        <button @click="openRemarkModal(item)" class="text-blue-600 hover:text-blue-800 text-sm" x-text="$store.i18n.t('transfer.addRemark')"></button>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>

            <!-- 分页 -->
            <div x-show="total > perPage" class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex justify-between items-center">
                <span class="text-sm text-gray-600 dark:text-gray-400">
                    <span x-text="$store.i18n.t('common.total')"></span> <span x-text="total"></span> <span x-text="$store.i18n.t('common.records')"></span>
                </span>
                <div class="flex gap-2">
                    <button @click="page--; loadData()" :disabled="page <= 1"
                        class="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700">
                        <span x-text="$store.i18n.t('common.prev')"></span>
                    </button>
                    <span class="px-3 py-1 text-sm text-gray-600 dark:text-gray-400">
                        <span x-text="page"></span> / <span x-text="Math.ceil(total / perPage)"></span>
                    </span>
                    <button @click="page++; loadData()" :disabled="page >= Math.ceil(total / perPage)"
                        class="px-3 py-1 border border-gray-300 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700">
                        <span x-text="$store.i18n.t('common.next')"></span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- 备注弹窗 -->
    <div x-show="showRemarkModal" x-cloak class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" @click.self="showRemarkModal = false">
        <div class="bg-white dark:bg-gray-800 rounded-xl p-6 w-full max-w-md mx-4 hover:shadow-lg transition-shadow">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4" x-text="$store.i18n.t('transfer.addRemark')"></h3>
            <div class="mb-4">
                <p class="text-sm text-gray-600 dark:text-gray-400 mb-2">
                    <span x-text="$store.i18n.t('transfer.domain')"></span>: <span class="text-gray-900 dark:text-white" x-text="currentItem?.subdomain_name"></span>
                </p>
                <p x-show="currentItem?.remark" class="text-sm text-gray-600 dark:text-gray-400 mb-2">
                    <span x-text="$store.i18n.t('transfer.userRemark')"></span>: <span class="text-gray-900 dark:text-white" x-text="currentItem?.remark"></span>
                </p>
            </div>
            <textarea x-model="adminRemark" rows="3"
                :placeholder="$store.i18n.t('transfer.adminRemarkPlaceholder')"
                class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white mb-4"></textarea>
            <div class="flex justify-end gap-3">
                <button @click="showRemarkModal = false" class="px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700">
                    <span x-text="$store.i18n.t('common.cancel')"></span>
                </button>
                <button @click="saveRemark()" :disabled="saving" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl disabled:opacity-50 transition-colors">
                    <span x-show="!saving" x-text="$store.i18n.t('common.save')"></span>
                    <span x-show="saving" x-text="$store.i18n.t('common.saving')"></span>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function adminTransfers() {
    return {
        transfers: [],
        stats: {},
        loading: true,
        keyword: '',
        status: '',
        dateFrom: '',
        dateTo: '',
        page: 1,
        perPage: 20,
        total: 0,
        showRemarkModal: false,
        currentItem: null,
        adminRemark: '',
        saving: false,

        async init() {
            await Promise.all([this.loadStats(), this.loadData()]);
        },

        async loadStats() {
            const token = localStorage.getItem('token');
            try {
                const res = await fetch('/api/admin/transfer/stats', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.stats = data.data;
                }
            } catch (e) {
                console.error('Load stats failed:', e);
            }
        },

        async loadData() {
            this.loading = true;
            const token = localStorage.getItem('token');

            try {
                const params = new URLSearchParams({
                    page: this.page,
                    per_page: this.perPage
                });
                if (this.keyword) params.append('keyword', this.keyword);
                if (this.status !== '') params.append('status', this.status);
                if (this.dateFrom) params.append('date_from', this.dateFrom);
                if (this.dateTo) params.append('date_to', this.dateTo);

                const res = await fetch(`/api/admin/transfer/list?${params}`, {
                    headers: { 'Authorization': 'Bearer ' + token }
                });

                const data = await res.json();
                if (data.code === 200) {
                    this.transfers = data.data.items || [];
                    this.total = data.data.total || 0;
                }
            } catch (e) {
                console.error('Load transfers failed:', e);
            } finally {
                this.loading = false;
            }
        },

        openRemarkModal(item) {
            this.currentItem = item;
            this.adminRemark = item.admin_remark || '';
            this.showRemarkModal = true;
        },

        async saveRemark() {
            this.saving = true;
            const token = localStorage.getItem('token');

            try {
                const res = await fetch('/api/admin/transfer/remark', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        transfer_id: this.currentItem.id,
                        remark: this.adminRemark
                    })
                });

                const data = await res.json();
                if (data.code === 200) {
                    this.showRemarkModal = false;
                    await this.loadData();
                } else {
                    alert(data.message || '保存失败');
                }
            } catch (e) {
                alert('网络错误');
            } finally {
                this.saving = false;
            }
        }
    };
}
</script>
{% endblock %}
