{% extends "base.html" %}

{% block title %}邀请记录 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="invitesPage()" x-init="init()">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('admin.inviteRecords')"></h1>
    </div>

    <!-- 统计卡片 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('admin.totalInvites')"></div>
            <div class="text-2xl font-bold text-gray-900 dark:text-white mt-1" x-text="stats.total_invites"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('admin.rechargedCount')"></div>
            <div class="text-2xl font-bold text-green-600 dark:text-green-400 mt-1" x-text="stats.recharged_count"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('admin.registerRewardTotal')"></div>
            <div class="text-2xl font-bold text-blue-600 dark:text-blue-400 mt-1" x-text="stats.total_register_reward"></div>
        </div>
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
            <div class="text-sm text-gray-500 dark:text-gray-400" x-text="$store.i18n.t('admin.totalRewardPoints')"></div>
            <div class="text-2xl font-bold text-purple-600 dark:text-purple-400 mt-1" x-text="stats.total_reward"></div>
        </div>
    </div>

    <!-- 搜索和筛选 -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 mb-6 hover:shadow-lg transition-shadow">
        <div class="flex flex-col sm:flex-row gap-4">
            <div class="flex-1">
                <input type="text" x-model="search" @keyup.enter="loadRecords()" 
                    class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white"
                    :placeholder="$store.i18n.t('admin.searchInvite')">
            </div>
            <select x-model="statusFilter" @change="loadRecords()" class="px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl focus:outline-none focus:border-gray-400 dark:focus:border-gray-500 bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                <option value="" x-text="$store.i18n.t('admin.allStatus')"></option>
                <option value="0" x-text="$store.i18n.t('admin.registered')"></option>
                <option value="1" x-text="$store.i18n.t('admin.recharged')"></option>
            </select>
            <button @click="loadRecords()" class="px-4 py-2 bg-gray-900 dark:bg-gray-600 text-white rounded-xl hover:bg-gray-800 dark:hover:bg-gray-500">
                <span x-text="$store.i18n.t('common.search')"></span>
            </button>
        </div>
    </div>

    <!-- 记录列表 -->
    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden hover:shadow-lg transition-shadow">
        <div x-show="loading" class="p-10 text-center">
            <div class="inline-block w-8 h-8 border-4 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div>
        </div>
        
        <div x-show="!loading && records.length === 0" class="p-10 text-center text-gray-500 dark:text-gray-400">
            <svg class="w-16 h-16 mx-auto text-gray-300 dark:text-gray-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
            </svg>
            <p x-text="$store.i18n.t('admin.noInviteRecords')"></p>
        </div>

        <div x-show="!loading && records.length > 0" class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-50 dark:bg-gray-700/50">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase">ID</th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('admin.inviter')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('admin.invitee')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('admin.inviteCode')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('admin.reward')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('common.status')"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400 uppercase" x-text="$store.i18n.t('common.time')"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                    <template x-for="record in records" :key="record.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                            <td class="px-4 py-3 text-sm text-gray-900 dark:text-white" x-text="record.id"></td>
                            <td class="px-4 py-3">
                                <div class="text-sm font-medium text-gray-900 dark:text-white" x-text="record.inviter_username"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400" x-text="record.inviter_email"></div>
                            </td>
                            <td class="px-4 py-3">
                                <div class="text-sm font-medium text-gray-900 dark:text-white" x-text="record.invitee_username"></div>
                                <div class="text-xs text-gray-500 dark:text-gray-400" x-text="record.invitee_email"></div>
                            </td>
                            <td class="px-4 py-3 text-sm font-mono text-gray-900 dark:text-white" x-text="record.invite_code"></td>
                            <td class="px-4 py-3">
                                <div class="text-sm text-gray-900 dark:text-white">
                                    <span x-text="$store.i18n.t('admin.registerReward') + ': '"></span>
                                    <span class="text-blue-600 dark:text-blue-400" x-text="record.register_reward"></span>
                                </div>
                                <div class="text-sm text-gray-900 dark:text-white" x-show="record.recharge_reward > 0">
                                    <span x-text="$store.i18n.t('admin.rechargeReward') + ': '"></span>
                                    <span class="text-green-600 dark:text-green-400" x-text="record.recharge_reward"></span>
                                </div>
                            </td>
                            <td class="px-4 py-3">
                                <span x-show="record.status === 0" class="px-2 py-1 text-xs rounded-full bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300" x-text="$store.i18n.t('admin.registered')"></span>
                                <span x-show="record.status === 1" class="px-2 py-1 text-xs rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400" x-text="$store.i18n.t('admin.recharged')"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400" x-text="record.created_at"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div x-show="!loading && pages > 1" class="px-4 py-3 border-t border-gray-200 dark:border-gray-700 flex items-center justify-between">
            <div class="text-sm text-gray-500 dark:text-gray-400">
                <span x-text="$store.i18n.t('common.total')"></span> <span x-text="total"></span> <span x-text="$store.i18n.t('common.records')"></span>
            </div>
            <div class="flex gap-2">
                <button @click="page > 1 && (page--, loadRecords())" :disabled="page <= 1" class="px-3 py-1 border border-gray-200 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">
                    <span x-text="$store.i18n.t('common.prev')"></span>
                </button>
                <span class="px-3 py-1 text-sm text-gray-700 dark:text-gray-300" x-text="page + ' / ' + pages"></span>
                <button @click="page < pages && (page++, loadRecords())" :disabled="page >= pages" class="px-3 py-1 border border-gray-200 dark:border-gray-600 rounded text-sm disabled:opacity-50 hover:bg-gray-50 dark:hover:bg-gray-700 text-gray-700 dark:text-gray-300">
                    <span x-text="$store.i18n.t('common.next')"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function invitesPage() {
    return {
        records: [],
        stats: { total_invites: 0, recharged_count: 0, total_register_reward: 0, total_recharge_reward: 0, total_reward: 0 },
        loading: true,
        search: '',
        statusFilter: '',
        page: 1,
        pages: 1,
        total: 0,
        
        get token() { return localStorage.getItem('token'); },
        
        async init() {
            if (!this.token) {
                window.location.href = '/login';
                return;
            }
            await Promise.all([this.loadRecords(), this.loadStats()]);
        },
        
        async loadRecords() {
            this.loading = true;
            try {
                const params = new URLSearchParams({
                    page: this.page,
                    per_page: 20,
                    search: this.search,
                    status: this.statusFilter
                });
                const res = await fetch(`/api/admin/invites?${params}`, {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.records = data.data.records;
                    this.total = data.data.total;
                    this.pages = data.data.pages;
                }
            } catch (e) {
                console.error('Load invites failed:', e);
            }
            this.loading = false;
        },
        
        async loadStats() {
            try {
                const res = await fetch('/api/admin/invites/stats', {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.stats = data.data;
                }
            } catch (e) {
                console.error('Load stats failed:', e);
            }
        }
    }
}
</script>
{% endblock %}
