{% extends "base.html" %}

{% block title %}优惠券管理 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="couponsPage()" x-init="init()">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '优惠券管理' : 'Coupon Management'"></h1>
        <button @click="openCreate()" class="px-4 py-2 bg-gray-900 dark:bg-gray-600 text-white rounded-xl hover:bg-gray-800 dark:hover:bg-gray-500 text-sm" x-text="$store.i18n.locale === 'zh' ? '创建优惠券' : 'Create Coupon'"></button>
    </div>

    <!-- 列表 - 桌面端表格 -->
    <div class="hidden sm:block bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden">
        <div class="hidden lg:block overflow-x-auto">
            <table class="w-full min-w-[700px]">
                <thead class="bg-gray-50 dark:bg-gray-700 border-b border-gray-200 dark:border-gray-600">
                    <tr>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '优惠码' : 'Code'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '名称' : 'Name'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '优惠' : 'Discount'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '使用' : 'Usage'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '排除' : 'Excluded'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '适用' : 'Applies To'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '状态' : 'Status'"></th>
                        <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '有效期' : 'Expires'"></th>
                        <th class="px-4 py-3 text-right text-xs font-medium text-gray-500 dark:text-gray-300 uppercase" x-text="$store.i18n.locale === 'zh' ? '操作' : 'Actions'"></th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
                    <template x-for="item in list" :key="item.id">
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50">
                            <td class="px-4 py-3 font-mono text-sm font-medium text-gray-900 dark:text-white" x-text="item.code"></td>
                            <td class="px-4 py-3 text-sm text-gray-700 dark:text-gray-300" x-text="item.name"></td>
                            <td class="px-4 py-3 text-sm">
                                <span class="px-2 py-1 rounded text-xs" :class="item.type === 'percent' ? 'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300' : 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300' transition-colors" x-text="item.value_text"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-600 dark:text-gray-400">
                                <span x-text="item.used_count"></span>/<span x-text="item.total_count === -1 ? '∞' : item.total_count"></span>
                            </td>
                            <td class="px-4 py-3 text-sm">
                                <template x-if="item.excluded_domains && item.excluded_domains.length > 0">
                                    <span class="px-2 py-1 bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 rounded text-xs" x-text="item.excluded_domains.length + ($store.i18n.locale === 'zh' ? '个' : '')"></span>
                                </template>
                                <template x-if="!item.excluded_domains || item.excluded_domains.length === 0">
                                    <span class="text-gray-400 dark:text-gray-500 text-xs" x-text="$store.i18n.locale === 'zh' ? '无' : 'None'"></span>
                                </template>
                            </td>
                            <td class="px-4 py-3 text-sm">
                                <span class="px-2 py-1 rounded text-xs" :class="{
                                    'bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-300': item.applicable_type === 'all',
                                    'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': item.applicable_type === 'domain'
                                } transition-colors" x-text="item.applicable_type === 'domain' ? ($store.i18n.locale === 'zh' ? '域名' : 'Domain') : ($store.i18n.locale === 'zh' ? '全部' : 'All')"></span>
                            </td>
                            <td class="px-4 py-3">
                                <span class="px-2 py-1 rounded text-xs" :class="item.is_valid ? 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'" x-text="item.is_valid ? ($store.i18n.locale === 'zh' ? '有效' : 'Valid') : ($store.i18n.locale === 'zh' ? '无效' : 'Invalid')"></span>
                            </td>
                            <td class="px-4 py-3 text-sm text-gray-500 dark:text-gray-400" x-text="item.expires_at ? item.expires_at.slice(0,10) : ($store.i18n.locale === 'zh' ? '永久' : 'Forever')"></td>
                            <td class="px-4 py-3 text-right space-x-2">
                                <button @click="openEdit(item)" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 text-sm" x-text="$store.i18n.locale === 'zh' ? '编辑' : 'Edit'"></button>
                                <button @click="toggleStatus(item)" class="text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 text-sm" x-text="item.status === 1 ? ($store.i18n.locale === 'zh' ? '禁用' : 'Disable') : ($store.i18n.locale === 'zh' ? '启用' : 'Enable')"></button>
                                <button @click="remove(item)" class="text-red-600 hover:text-red-800 dark:text-red-400 dark:hover:text-red-300 text-sm" x-text="$store.i18n.locale === 'zh' ? '删除' : 'Delete'"></button>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="list.length === 0">
                        <td colspan="9" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '暂无数据' : 'No data'"></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 列表 - 移动端卡片 -->
    <div class="sm:hidden space-y-3">
        <template x-for="item in list" :key="item.id">
            <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-4 hover:shadow-lg transition-shadow">
                <div class="flex items-start justify-between gap-2 mb-3">
                    <div class="min-w-0 flex-1">
                        <p class="font-mono text-sm font-medium text-gray-900 dark:text-white truncate" x-text="item.code"></p>
                        <p class="text-sm text-gray-600 dark:text-gray-400 truncate" x-text="item.name"></p>
                    </div>
                    <span class="px-2 py-1 rounded text-xs shrink-0" :class="item.is_valid ? 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'" x-text="item.is_valid ? ($store.i18n.locale === 'zh' ? '有效' : 'Valid') : ($store.i18n.locale === 'zh' ? '无效' : 'Invalid')"></span>
                </div>
                <div class="flex flex-wrap gap-2 text-xs mb-3">
                    <span class="px-2 py-1 rounded" :class="item.type === 'percent' ? 'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300' : 'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300' transition-colors" x-text="item.value_text"></span>
                    <span class="px-2 py-1 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 rounded">
                        <span x-text="$store.i18n.locale === 'zh' ? '使用: ' : 'Used: '"></span><span x-text="item.used_count"></span>/<span x-text="item.total_count === -1 ? '∞' : item.total_count"></span>
                    </span>
                    <span class="px-2 py-1 rounded" :class="{
                        'bg-purple-100 dark:bg-purple-900/50 text-purple-700 dark:text-purple-300': item.applicable_type === 'all',
                        'bg-blue-100 dark:bg-blue-900/50 text-blue-700 dark:text-blue-300': item.applicable_type === 'domain',
                        'bg-green-100 dark:bg-green-900/50 text-green-700 dark:text-green-300': item.applicable_type === 'vhost'
                    } transition-colors" x-text="item.applicable_type === 'domain' ? ($store.i18n.locale === 'zh' ? '域名' : 'Domain') : (item.applicable_type === 'vhost' ? ($store.i18n.locale === 'zh' ? '虚拟主机' : 'VHost') : ($store.i18n.locale === 'zh' ? '全部' : 'All'))"></span>
                    <template x-if="item.excluded_domains && item.excluded_domains.length > 0">
                        <span class="px-2 py-1 bg-red-100 dark:bg-red-900/50 text-red-700 dark:text-red-300 rounded" x-text="($store.i18n.locale === 'zh' ? '排除' : 'Excl. ') + item.excluded_domains.length + ($store.i18n.locale === 'zh' ? '个' : '')"></span>
                    </template>
                </div>
                <div class="flex items-center justify-between text-xs">
                    <span class="text-gray-500 dark:text-gray-400" x-text="item.expires_at ? ($store.i18n.locale === 'zh' ? '有效期: ' : 'Expires: ') + item.expires_at.slice(0,10) : ($store.i18n.locale === 'zh' ? '永久有效' : 'Never expires')"></span>
                    <div class="flex gap-3">
                        <button @click="openEdit(item)" class="text-blue-600 dark:text-blue-400" x-text="$store.i18n.locale === 'zh' ? '编辑' : 'Edit'"></button>
                        <button @click="toggleStatus(item)" class="text-blue-600 dark:text-blue-400" x-text="item.status === 1 ? ($store.i18n.locale === 'zh' ? '禁用' : 'Disable') : ($store.i18n.locale === 'zh' ? '启用' : 'Enable')"></button>
                        <button @click="remove(item)" class="text-red-600 dark:text-red-400" x-text="$store.i18n.locale === 'zh' ? '删除' : 'Delete'"></button>
                    </div>
                </div>
            </div>
        </template>
        <div x-show="list.length === 0" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-8 text-center text-gray-500 dark:text-gray-400 hover:shadow-lg transition-shadow" x-text="$store.i18n.locale === 'zh' ? '暂无数据' : 'No data'"></div>
    </div>

    <!-- 创建/编辑弹窗 -->
    <div x-show="showModal" x-cloak class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" @click.self="showModal = false">
        <div class="bg-white dark:bg-gray-800 rounded-xl w-full max-w-lg p-6 max-h-[90vh] overflow-y-auto hover:shadow-lg transition-shadow">
            <h3 class="text-lg font-semibold text-gray-900 dark:text-white mb-4" x-text="isEdit ? ($store.i18n.locale === 'zh' ? '编辑优惠券' : 'Edit Coupon') : ($store.i18n.locale === 'zh' ? '创建优惠券' : 'Create Coupon')"></h3>
            <div class="space-y-4">
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '优惠码' : 'Code'"></label>
                        <input type="text" x-model="form.code" :disabled="isEdit" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl uppercase bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :class="isEdit ? 'bg-gray-50 dark:bg-gray-600' : ''" :placeholder="$store.i18n.locale === 'zh' ? '留空自动生成' : 'Auto-generate if empty'">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"><span x-text="$store.i18n.locale === 'zh' ? '名称' : 'Name'"></span> *</label>
                        <input type="text" x-model="form.name" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :placeholder="$store.i18n.locale === 'zh' ? '新用户专享' : 'New user special'">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '优惠类型' : 'Discount Type'"></label>
                        <select x-model="form.type" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                            <option value="percent" x-text="$store.i18n.locale === 'zh' ? '折扣' : 'Percent'"></option>
                            <option value="fixed" x-text="$store.i18n.locale === 'zh' ? '满减' : 'Fixed'"></option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1"><span x-text="$store.i18n.locale === 'zh' ? '优惠值' : 'Value'"></span> *</label>
                        <input type="number" x-model="form.value" step="0.1" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :placeholder="form.type === 'percent' ? ($store.i18n.locale === 'zh' ? '8 = 8折' : '8 = 80% off') : ($store.i18n.locale === 'zh' ? '减免金额' : 'Amount off')">
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '最低消费' : 'Min Amount'"></label>
                        <input type="number" x-model="form.min_amount" step="0.01" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" placeholder="0">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '发放数量' : 'Total Count'"></label>
                        <input type="number" x-model="form.total_count" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white" :placeholder="$store.i18n.locale === 'zh' ? '-1 = 无限' : '-1 = unlimited'">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '过期时间' : 'Expiration'"></label>
                    <input type="datetime-local" x-model="form.expires_at" class="w-full px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl bg-white dark:bg-gray-700 text-gray-900 dark:text-white">
                </div>
                <!-- 适用产品类型 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '适用产品' : 'Applies To'"></label>
                    <div class="flex gap-4">
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" value="all" x-model="form.applicable_type" class="text-blue-600 focus:ring-blue-500">
                            <span class="text-sm text-gray-700 dark:text-gray-300" x-text="$store.i18n.locale === 'zh' ? '全部' : 'All'"></span>
                        </label>
                        <label class="flex items-center space-x-2 cursor-pointer">
                            <input type="radio" value="domain" x-model="form.applicable_type" class="text-blue-600 focus:ring-blue-500">
                            <span class="text-sm text-gray-700 dark:text-gray-300" x-text="$store.i18n.locale === 'zh' ? '域名' : 'Domain'"></span>
                        </label>
                    </div>
                </div>
                <!-- 排除域名 -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1" x-text="$store.i18n.locale === 'zh' ? '排除域名' : 'Excluded Domains'"></label>
                    <p class="text-xs text-gray-500 dark:text-gray-400 mb-2" x-text="$store.i18n.locale === 'zh' ? '选中的域名将无法使用此优惠券' : 'Selected domains cannot use this coupon'"></p>
                    <div class="border border-gray-200 dark:border-gray-600 rounded-xl p-3 max-h-40 overflow-y-auto bg-white dark:bg-gray-700">
                        <template x-if="domains.length === 0">
                            <p class="text-gray-400 dark:text-gray-500 text-sm" x-text="$store.i18n.locale === 'zh' ? '加载中...' : 'Loading...'"></p>
                        </template>
                        <div class="space-y-2">
                            <template x-for="domain in domains" :key="domain.id">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" :value="domain.id" x-model="form.excluded_domains" class="rounded border-gray-300 dark:border-gray-500 text-blue-600 focus:ring-blue-500">
                                    <span class="text-sm text-gray-700 dark:text-gray-300" x-text="domain.name"></span>
                                </label>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
            <div x-show="error" class="mt-4 p-3 bg-red-50 dark:bg-red-900/50 text-red-600 dark:text-red-400 rounded-xl text-sm" x-text="error"></div>
            <div class="flex gap-3 mt-6">
                <button @click="showModal = false" class="flex-1 px-4 py-2 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-gray-700" x-text="$store.i18n.locale === 'zh' ? '取消' : 'Cancel'"></button>
                <button @click="save()" :disabled="submitting" class="flex-1 px-4 py-2 bg-gray-900 dark:bg-gray-600 text-white rounded-xl hover:bg-gray-800 dark:hover:bg-gray-500 disabled:opacity-50">
                    <span x-show="!submitting" x-text="isEdit ? ($store.i18n.locale === 'zh' ? '保存' : 'Save') : ($store.i18n.locale === 'zh' ? '创建' : 'Create')"></span>
                    <span x-show="submitting" x-text="$store.i18n.locale === 'zh' ? '处理中...' : 'Processing...'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function couponsPage() {
    return {
        list: [], domains: [], showModal: false, submitting: false, error: '', isEdit: false, editId: null,
        form: { code: '', name: '', type: 'percent', value: '', min_amount: 0, total_count: -1, expires_at: '', applicable_type: 'all', excluded_domains: [] },
        get token() { return localStorage.getItem('token'); },
        async init() {
            if (!this.token) { window.location.href = '/login'; return; }
            await Promise.all([this.loadList(), this.loadDomains()]);
        },
        async loadList() {
            const res = await fetch('/api/admin/coupons', { headers: { 'Authorization': 'Bearer ' + this.token } });
            const data = await res.json();
            if (data.code === 200) this.list = data.data.coupons;
        },
        async loadDomains() {
            const res = await fetch('/api/admin/domains', { headers: { 'Authorization': 'Bearer ' + this.token } });
            const data = await res.json();
            if (data.code === 200) this.domains = data.data.domains;
        },
        openCreate() {
            this.isEdit = false;
            this.editId = null;
            this.form = { code: '', name: '', type: 'percent', value: '', min_amount: 0, total_count: -1, expires_at: '', applicable_type: 'all', excluded_domains: [] };
            this.error = '';
            this.showModal = true;
        },
        openEdit(item) {
            this.isEdit = true;
            this.editId = item.id;
            this.form = {
                code: item.code,
                name: item.name,
                type: item.type,
                value: item.value,
                min_amount: item.min_amount,
                total_count: item.total_count,
                expires_at: item.expires_at ? item.expires_at.slice(0, 16) : '',
                applicable_type: item.applicable_type || 'all',
                excluded_domains: item.excluded_domains || []
            };
            this.error = '';
            this.showModal = true;
        },
        async save() {
            this.error = '';
            const nameError = Alpine.store('i18n').locale === 'zh' ? '请填写优惠券名称' : 'Please enter coupon name';
            const valueError = Alpine.store('i18n').locale === 'zh' ? '请填写优惠值' : 'Please enter discount value';
            if (!this.form.name) { this.error = nameError; return; }
            if (!this.isEdit && (this.form.value === '' || this.form.value === null || this.form.value === undefined)) { 
                this.error = valueError; 
                return; 
            }
            this.submitting = true;
            
            const payload = { ...this.form };
            payload.excluded_domains = this.form.excluded_domains.map(id => parseInt(id));
            
            let res;
            if (this.isEdit) {
                res = await fetch(`/api/admin/coupons/${this.editId}`, {
                    method: 'PUT',
                    headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            } else {
                res = await fetch('/api/admin/coupons', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            }
            const data = await res.json();
            if (data.code === 200 || data.code === 201) {
                this.showModal = false;
                this.loadList();
            } else {
                this.error = data.message;
            }
            this.submitting = false;
        },
        async toggleStatus(item) {
            const res = await fetch(`/api/admin/coupons/${item.id}`, {
                method: 'PUT',
                headers: { 'Authorization': 'Bearer ' + this.token, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: item.status === 1 ? 0 : 1 })
            });
            if ((await res.json()).code === 200) this.loadList();
        },
        async remove(item) {
            const confirmMsg = Alpine.store('i18n').locale === 'zh' ? `确定删除优惠券 ${item.code} 吗？` : `Delete coupon ${item.code}?`;
            if (!confirm(confirmMsg)) return;
            const res = await fetch(`/api/admin/coupons/${item.id}`, {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + this.token }
            });
            if ((await res.json()).code === 200) this.loadList();
        }
    }
}
</script>
{% endblock %}
