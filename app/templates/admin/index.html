{% extends "base.html" %}

{% block title %}{{ site_settings.site_name|default('六趣DNS') }} - 管理后台{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="adminDashboard()" x-init="init()">
    <!-- 强制更新遮罩层 -->
    <div x-show="showForceUpdateBlocker" x-cloak class="fixed inset-0 z-40 bg-black/60 backdrop-blur-sm"></div>

    <!-- 版本更新弹窗 -->
    <div x-show="showUpdateModal" x-cloak 
         x-init="$watch('showUpdateModal', value => { document.body.style.overflow = value ? 'hidden' : '' })"
         class="fixed inset-0 z-50 flex items-center justify-center bg-black/50" 
         @click.self="!updateInfo.force_update && (showUpdateModal = false)">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl max-w-lg w-full mx-4 overflow-hidden" @click.stop>
            <!-- 头部 -->
            <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4 flex items-center justify-between">
                <h3 class="text-lg font-semibold text-white flex items-center">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? '发现新版本' : 'New Version Available'"></span>
                </h3>
                <button x-show="!updateInfo.force_update" @click="showUpdateModal = false" class="text-white/80 hover:text-white">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            
            <div class="p-6">
                <!-- 强制更新警告 -->
                <div x-show="updateInfo.force_update" class="mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg">
                    <div class="flex items-center text-red-600 dark:text-red-400">
                        <svg class="w-5 h-5 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                        </svg>
                        <span class="font-medium" x-text="$store.i18n.locale === 'zh' ? '此版本为强制更新，请立即升级后才能继续使用' : 'This is a mandatory update. Please upgrade immediately to continue.'"></span>
                    </div>
                </div>

                <!-- 版本信息 -->
                <div class="mb-4 space-y-2">
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                        <span class="text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '当前版本' : 'Current Version'"></span>
                        <span class="font-medium text-gray-700 dark:text-gray-300" x-text="'v' + currentVersion"></span>
                    </div>
                    <div class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                        <span class="text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '最新版本' : 'Latest Version'"></span>
                        <span class="font-semibold text-blue-600" x-text="'v' + updateInfo.latest_version"></span>
                    </div>
                    <div x-show="updateInfo.created_at" class="flex items-center justify-between py-2 border-b border-gray-100 dark:border-gray-700">
                        <span class="text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '发布时间' : 'Release Date'"></span>
                        <span class="text-gray-600 dark:text-gray-300" x-text="formatDate(updateInfo.created_at)"></span>
                    </div>
                </div>

                <!-- 更新日志 -->
                <div x-show="updateInfo.changelog_html" class="mb-4">
                    <h4 class="text-sm font-medium text-gray-700 dark:text-gray-300 mb-2" x-text="$store.i18n.locale === 'zh' ? '更新日志' : 'Changelog'"></h4>
                    <div class="max-h-48 overflow-y-auto p-3 bg-gray-50 dark:bg-gray-700/50 rounded-lg text-sm text-gray-600 dark:text-gray-300 prose prose-sm dark:prose-invert prose-ul:my-1 prose-li:my-0" 
                         x-html="updateInfo.changelog_html"></div>
                </div>

                <!-- 操作按钮 -->
                <div class="flex space-x-3">
                    <a x-show="updateInfo.download_url && updateInfo.download_url.trim() !== ''" 
                       :href="updateInfo.download_url" target="_blank"
                       class="flex-1 px-4 py-2.5 bg-blue-600 text-white text-center rounded-lg hover:bg-blue-700 transition font-medium cursor-pointer">
                        <span x-text="$store.i18n.locale === 'zh' ? '立即更新' : 'Update Now'"></span>
                    </a>
                    <button x-show="!updateInfo.download_url || updateInfo.download_url.trim() === ''" disabled
                            class="flex-1 px-4 py-2.5 bg-gray-300 dark:bg-gray-600 text-gray-500 dark:text-gray-400 text-center rounded-lg cursor-not-allowed font-medium">
                        <span x-text="$store.i18n.locale === 'zh' ? '暂无下载地址' : 'No Download URL'"></span>
                    </button>
                    <button x-show="!updateInfo.force_update" @click="showUpdateModal = false"
                            class="flex-1 px-4 py-2.5 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-gray-300 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition font-medium">
                        <span x-text="$store.i18n.locale === 'zh' ? '稍后提醒' : 'Remind Later'"></span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 开源声明 - 精简版顶部通知条 -->
    <div x-data="{ showBanner: true }" x-show="showBanner" x-cloak class="mb-4 bg-gradient-to-r from-red-500 to-orange-500 rounded-lg p-3 shadow-md">
        <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2 text-white">
                <svg class="w-5 h-5 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
                <span class="text-sm font-medium">🎉 本项目完全免费开源</span>
                <a href="https://github.com/976853694/cloudflare-DNS" target="_blank" class="text-white/90 hover:text-white underline text-sm">GitHub</a>
                <a href="https://976853694.github.io/dns-docs/#/zh/guide/index" target="_blank" class="text-white/90 hover:text-white underline text-sm">文档</a>
                <a href="https://qm.qq.com/q/nMNgw1CB7q" target="_blank" class="text-white/90 hover:text-white underline text-sm">QQ群</a>
            </div>
            <button @click="showBanner = false" class="text-white/80 hover:text-white">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- 页面标题和版本 -->
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('nav.admin')"></h1>
            <p class="text-sm text-gray-500 dark:text-gray-400 mt-1" x-text="$store.i18n.locale === 'zh' ? '欢迎回来，管理员' : 'Welcome back, Admin'"></p>
        </div>
        <div class="flex items-center space-x-3">
            <span class="text-xs text-gray-500 bg-gray-100 dark:bg-gray-700 px-3 py-1 rounded-full">v{{ config.APP_VERSION }}</span>
            <button @click="loadData()" class="p-2 text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition" title="刷新数据">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>
    </div>

    <!-- 核心指标卡片 -->
    <div class="mb-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
            <!-- 用户总数 -->
            <div class="bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl p-5 text-white shadow-lg hover:shadow-xl transition cursor-pointer" @click="window.location.href='/admin/users'">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </div>
                    <span class="text-xs bg-white/20 px-2 py-1 rounded" x-text="$store.i18n.locale === 'zh' ? '用户' : 'Users'"></span>
                </div>
                <div class="text-3xl font-bold mb-1" x-text="stats.users_count || 0"></div>
                <div class="flex items-center text-sm text-white/80">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? '今日' : 'Today'"></span>
                    <span class="ml-1 font-semibold" x-text="'+' + (stats.today_new_users || 0)"></span>
                </div>
            </div>

            <!-- 域名总数 -->
            <div class="bg-gradient-to-br from-green-500 to-green-600 rounded-xl p-5 text-white shadow-lg hover:shadow-xl transition cursor-pointer" @click="window.location.href='/admin/subdomains'">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9"></path>
                        </svg>
                    </div>
                    <span class="text-xs bg-white/20 px-2 py-1 rounded" x-text="$store.i18n.locale === 'zh' ? '域名' : 'Domains'"></span>
                </div>
                <div class="text-3xl font-bold mb-1" x-text="stats.subdomains_count || 0"></div>
                <div class="flex items-center text-sm text-white/80">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? '今日' : 'Today'"></span>
                    <span class="ml-1 font-semibold" x-text="'+' + (stats.today_new_subdomains || 0)"></span>
                </div>
            </div>

            <!-- DNS记录数 -->
            <div class="bg-gradient-to-br from-purple-500 to-purple-600 rounded-xl p-5 text-white shadow-lg hover:shadow-xl transition cursor-pointer" @click="window.location.href='/admin/dns-records'">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                        </svg>
                    </div>
                    <span class="text-xs bg-white/20 px-2 py-1 rounded" x-text="$store.i18n.locale === 'zh' ? '记录' : 'Records'"></span>
                </div>
                <div class="text-3xl font-bold mb-1" x-text="stats.records_count || 0"></div>
                <div class="flex items-center text-sm text-white/80">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? 'DNS解析' : 'DNS Records'"></span>
                </div>
            </div>

            <!-- 今日登录 -->
            <div class="bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl p-5 text-white shadow-lg hover:shadow-xl transition cursor-pointer" @click="window.location.href='/admin/logs'">
                <div class="flex items-center justify-between mb-3">
                    <div class="w-12 h-12 bg-white/20 rounded-lg flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <span class="text-xs bg-white/20 px-2 py-1 rounded" x-text="$store.i18n.locale === 'zh' ? '活跃' : 'Active'"></span>
                </div>
                <div class="text-3xl font-bold mb-1" x-text="stats.today_logins || 0"></div>
                <div class="flex items-center text-sm text-white/80">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? '今日登录' : 'Today Logins'"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- 主要内容区 - 趋势图和待办事项 -->
    <div class="mb-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- 趋势图 (占2/3) -->
        <div class="lg:col-span-2 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '7日数据趋势' : '7-Day Trend'"></h3>
                <div class="flex items-center space-x-2">
                    <button @click="chartDays = 7; loadCharts()" :class="chartDays === 7 ? 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-3 py-1 rounded text-xs font-medium transition">7天</button>
                    <button @click="chartDays = 30; loadCharts()" :class="chartDays === 30 ? 'bg-blue-100 dark:bg-blue-900 text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700'" class="px-3 py-1 rounded text-xs font-medium transition">30天</button>
                </div>
            </div>
            <div id="trendChart" class="h-80"></div>
        </div>

        <!-- 待办事项 (占1/3) -->
        <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-5 shadow-sm">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-semibold text-gray-900 dark:text-white flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path>
                    </svg>
                    <span x-text="$store.i18n.locale === 'zh' ? '待办事项' : 'Pending Tasks'"></span>
                </h3>
                <span class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '需要处理' : 'Need Action'"></span>
            </div>
            <div class="space-y-3">
                <!-- 免费套餐申请 -->
                <a href="/admin/free-plan-applications" class="block p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition" :class="pendingTasks.free_plan_pending > 0 ? 'bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800' : 'bg-gray-50 dark:bg-gray-700/50'">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center" :class="pendingTasks.free_plan_pending > 0 ? 'bg-red-100 dark:bg-red-900' : 'bg-gray-200 dark:bg-gray-600'">
                                <svg class="w-4 h-4" :class="pendingTasks.free_plan_pending > 0 ? 'text-red-600 dark:text-red-400' : 'text-gray-500 dark:text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '免费套餐申请' : 'Free Plan Apps'"></p>
                                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '待审核' : 'Pending'"></p>
                            </div>
                        </div>
                        <span class="text-lg font-bold" :class="pendingTasks.free_plan_pending > 0 ? 'text-red-600 dark:text-red-400' : 'text-gray-400 dark:text-gray-500'" x-text="pendingTasks.free_plan_pending || 0"></span>
                    </div>
                </a>

                <!-- 即将到期域名 -->
                <a href="/admin/subdomains?expired=0&days=7" class="block p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition" :class="pendingTasks.expiring_soon > 0 ? 'bg-orange-50 dark:bg-orange-900/20 border border-orange-200 dark:border-orange-800' : 'bg-gray-50 dark:bg-gray-700/50'">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center" :class="pendingTasks.expiring_soon > 0 ? 'bg-orange-100 dark:bg-orange-900' : 'bg-gray-200 dark:bg-gray-600'">
                                <svg class="w-4 h-4" :class="pendingTasks.expiring_soon > 0 ? 'text-orange-600 dark:text-orange-400' : 'text-gray-500 dark:text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '即将到期域名' : 'Expiring Domains'"></p>
                                <p class="text-xs text-gray-500 dark:text-gray-400" x-text="$store.i18n.locale === 'zh' ? '7天内' : 'Within 7 days'"></p>
                            </div>
                        </div>
                        <span class="text-lg font-bold" :class="pendingTasks.expiring_soon > 0 ? 'text-orange-600 dark:text-orange-400' : 'text-gray-400 dark:text-gray-500'" x-text="pendingTasks.expiring_soon || 0"></span>
                    </div>
                </a>

                <!-- 待回复工单 -->
                <a href="/admin/tickets?status=open" class="block p-3 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition" :class="pendingTasks.pending_tickets > 0 ? 'bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800' : 'bg-gray-50 dark:bg-gray-700/50'">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center" :class="pendingTasks.pending_tickets > 0 ? 'bg-yellow-100 dark:bg-yellow-900' : 'bg-gray-200 dark:bg-gray-600'">
                                <svg class="w-4 h-4" :class="pendingTasks.pending_tickets > 0 ? 'text-yellow-600 dark:text-yellow-400' : 'text-gray-500 dark:text-gray-400'" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                                </svg>
                            </div>
                            <div>
                                <p class="text-sm font-medium text-gray-900 dark:text-white" x-text="$store.i18n.locale === 'zh' ? '待回复工单' : 'Pending Tickets'"></p>

                <p class="text-sm text-gray-500 dark:text-gray-400 text-center py-4" x-text="$store.i18n.locale === 'zh' ? '暂无活动记录' : 'No recent activities'"></p>

            <template x-for="activity in activities" :key="activity.id">

<script>
function adminDashboard() {
    return {
        stats: {},
        pendingTasks: {},
        activities: [],
        chartDays: 7,
        showUpdateModal: false,
        showForceUpdateBlocker: false,
        updateInfo: {},
        currentVersion: '{{ config.APP_VERSION }}',
        token: localStorage.getItem('token'),
        
        async init() {
            await this.loadData();
            await this.checkUpdate();
        },
        
        async loadData() {
            try {
                const headers = { 'Authorization': 'Bearer ' + this.token };
                
                // 加载统计数据
                const statsRes = await fetch('/api/admin/stats', { headers });
                const statsData = await statsRes.json();
                if (statsData.code === 200) {
                    this.stats = statsData.data;
                }
                
                // 加载待办事项
                const tasksRes = await fetch('/api/admin/pending-tasks', { headers });
                const tasksData = await tasksRes.json();
                if (tasksData.code === 200) {
                    this.pendingTasks = tasksData.data;
                }
                
                // 加载最近活动
                const activitiesRes = await fetch('/api/admin/recent-activities?limit=10', { headers });
                const activitiesData = await activitiesRes.json();
                if (activitiesData.code === 200) {
                    this.activities = activitiesData.data.activities;
                }
                
                // 加载图表
                await this.loadCharts();
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        },
        
        async loadCharts() {
            try {
                const headers = { 'Authorization': 'Bearer ' + this.token };
                const res = await fetch(`/api/admin/charts/overview?days=${this.chartDays}`, { headers });
                const data = await res.json();
                if (data.code === 200) {
                    this.renderTrendChart(data.data);
                }
            } catch (error) {
                console.error('加载图表失败:', error);
            }
        },
        
        renderTrendChart(data) {
            const chartDom = document.getElementById('trendChart');
            if (!chartDom) return;
            
            const myChart = echarts.init(chartDom);
            const isDark = document.documentElement.classList.contains('dark');
            
            const option = {
                tooltip: {
                    trigger: 'axis',
                    backgroundColor: isDark ? '#1f2937' : '#ffffff',
                    borderColor: isDark ? '#374151' : '#e5e7eb',
                    textStyle: {
                        color: isDark ? '#f3f4f6' : '#111827'
                    }
                },
                legend: {
                    data: [
                        this.$store.i18n.locale === 'zh' ? '新增用户' : 'New Users',
                        this.$store.i18n.locale === 'zh' ? '新增域名' : 'New Domains',
                        this.$store.i18n.locale === 'zh' ? '收入' : 'Income'
                    ],
                    textStyle: {
                        color: isDark ? '#9ca3af' : '#6b7280'
                    }
                },
                grid: {
                    left: '3%',
                    right: '4%',
                    bottom: '3%',
                    containLabel: true
                },
                xAxis: {
                    type: 'category',
                    boundaryGap: false,
                    data: data.dates,
                    axisLine: {
                        lineStyle: {
                            color: isDark ? '#374151' : '#e5e7eb'
                        }
                    },
                    axisLabel: {
                        color: isDark ? '#9ca3af' : '#6b7280'
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: {
                        lineStyle: {
                            color: isDark ? '#374151' : '#e5e7eb'
                        }
                    },
                    axisLabel: {
                        color: isDark ? '#9ca3af' : '#6b7280'
                    },
                    splitLine: {
                        lineStyle: {
                            color: isDark ? '#374151' : '#f3f4f6'
                        }
                    }
                },
                series: [
                    {
                        name: this.$store.i18n.locale === 'zh' ? '新增用户' : 'New Users',
                        type: 'line',
                        smooth: true,
                        data: data.users,
                        itemStyle: {
                            color: '#3b82f6'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                                { offset: 1, color: 'rgba(59, 130, 246, 0.05)' }
                            ])
                        }
                    },
                    {
                        name: this.$store.i18n.locale === 'zh' ? '新增域名' : 'New Domains',
                        type: 'line',
                        smooth: true,
                        data: data.subdomains,
                        itemStyle: {
                            color: '#10b981'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(16, 185, 129, 0.3)' },
                                { offset: 1, color: 'rgba(16, 185, 129, 0.05)' }
                            ])
                        }
                    },
                    {
                        name: this.$store.i18n.locale === 'zh' ? '收入' : 'Income',
                        type: 'line',
                        smooth: true,
                        data: data.income,
                        itemStyle: {
                            color: '#f59e0b'
                        },
                        areaStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: 'rgba(245, 158, 11, 0.3)' },
                                { offset: 1, color: 'rgba(245, 158, 11, 0.05)' }
                            ])
                        }
                    }
                ]
            };
            
            myChart.setOption(option);
            
            // 响应式
            window.addEventListener('resize', () => {
                myChart.resize();
            });
        },
        
        async checkUpdate() {
            try {
                const headers = { 'Authorization': 'Bearer ' + this.token };
                const res = await fetch('/api/admin/check-update', { headers });
                const data = await res.json();
                if (data.code === 200 && data.data.has_update) {
                    this.updateInfo = data.data;
                    this.showUpdateModal = true;
                    if (data.data.force_update) {
                        this.showForceUpdateBlocker = true;
                    }
                }
            } catch (error) {
                console.error('检查更新失败:', error);
            }
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);
            
            if (minutes < 1) return this.$store.i18n.locale === 'zh' ? '刚刚' : 'Just now';
            if (minutes < 60) return `${minutes}${this.$store.i18n.locale === 'zh' ? '分钟前' : ' min ago'}`;
            if (hours < 24) return `${hours}${this.$store.i18n.locale === 'zh' ? '小时前' : ' hours ago'}`;
            if (days < 7) return `${days}${this.$store.i18n.locale === 'zh' ? '天前' : ' days ago'}`;
            
            return date.toLocaleDateString(this.$store.i18n.locale === 'zh' ? 'zh-CN' : 'en-US');
        }
    };
}
</script>
