{% extends "base.html" %}

{% block title %}菜单管理 - {{ site_settings.site_name|default('六趣DNS') }}{% endblock %}

{% block content %}
<div class="p-4 sm:p-6" x-data="sidebarPage()" x-init="init()">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <h1 class="text-xl sm:text-2xl font-bold text-gray-900 dark:text-white" x-text="$store.i18n.t('sidebar.title')"></h1>
        <button @click="resetMenus()" :disabled="resetting"
            class="px-4 py-2 bg-orange-500 hover:bg-orange-600 text-white rounded-xl flex items-center space-x-2 disabled:opacity-50 text-sm">
            <svg x-show="resetting" class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span x-text="$store.i18n.t('sidebar.resetMenus')"></span>
        </button>
    </div>

    <!-- Tab 切换 -->
    <div class="flex space-x-4 mb-6">
        <button @click="currentTab = 'admin'; loadMenus()" 
            class="px-4 py-2 rounded-xl font-medium transition"
            :class="currentTab === 'admin' ? 'bg-gray-900 dark:bg-gray-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700'">
            <span x-text="$store.i18n.t('sidebar.adminMenu')"></span>
        </button>
        <button @click="currentTab = 'user'; loadMenus()" 
            class="px-4 py-2 rounded-xl font-medium transition"
            :class="currentTab === 'user' ? 'bg-gray-900 dark:bg-gray-600 text-white' : 'bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700'">
            <span x-text="$store.i18n.t('sidebar.userMenu')"></span>
        </button>
    </div>

    <!-- 提示信息 -->
    <div class="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 rounded-xl p-4 mb-6 transition-colors">
        <div class="flex items-start">
            <svg class="w-5 h-5 text-blue-500 mt-0.5 mr-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <div class="text-sm text-blue-700 dark:text-blue-300">
                <p x-text="$store.i18n.t('sidebar.tip')"></p>
                <p class="mt-1" x-text="$store.i18n.t('sidebar.dragTip')"></p>
            </div>
        </div>
    </div>

    <!-- 加载中 -->
    <div x-show="loading" class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl p-10 text-center hover:shadow-lg transition-shadow">
        <div class="inline-block w-8 h-8 border-4 border-gray-200 dark:border-gray-600 border-t-gray-600 dark:border-t-gray-300 rounded-full animate-spin"></div>
    </div>

    <!-- 菜单列表 -->
    <div x-show="!loading" class="space-y-4">
        <!-- 管理后台菜单 -->
        <template x-if="currentTab === 'admin'">
            <div id="admin-menu-list" class="space-y-4">
                <template x-for="(group, groupIndex) in structured" :key="group.menu_key">
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden menu-group hover:shadow-lg transition-shadow" :data-key="group.menu_key">
                        <!-- 一级菜单 -->
                        <div class="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700 group-header">
                            <div class="flex items-center space-x-2 sm:space-x-3 flex-1 min-w-0">
                                <!-- 上下移动按钮 -->
                                <div class="flex flex-col space-y-0.5">
                                    <button @click="moveGroup(groupIndex, 'up')" :disabled="groupIndex === 0"
                                        class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                                        </svg>
                                    </button>
                                    <button @click="moveGroup(groupIndex, 'down')" :disabled="groupIndex === structured.length - 1"

                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                        </svg>
                                    </button>
                                </div>
                                <span class="font-medium text-gray-900 dark:text-white truncate" x-text="$store.i18n.locale === 'zh' ? group.name_zh : group.name_en"></span>
                                <span class="hidden sm:inline text-xs text-gray-500 dark:text-gray-400 flex-shrink-0" x-text="'(' + group.menu_key + ')'"></span>
                            </div>
                            <div class="flex items-center space-x-2 sm:space-x-4 flex-shrink-0">

                                    <input type="checkbox" class="sr-only peer" :checked="group.visible" @change="toggleVisibility(group)">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-500 peer-checked:bg-green-500"></div>
                                </label>
                            </div>
                        </div>
                        
                        <!-- 子菜单列表 -->
                        <div x-show="group.children && group.children.length > 0" class="divide-y divide-gray-100 dark:divide-gray-700 sub-menu-list" :data-parent="group.menu_key">
                            <template x-for="(item, itemIndex) in group.children" :key="item.menu_key">
                                <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/30 sub-menu-item" :data-key="item.menu_key">
                                    <div class="flex items-center space-x-2 sm:space-x-3 pl-4 sm:pl-8 flex-1 min-w-0">
                                        <!-- 上下移动按钮 -->
                                        <div class="flex flex-col space-y-0.5">
                                            <button @click="moveChild(groupIndex, itemIndex, 'up')" :disabled="itemIndex === 0"
                                                class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                                                </svg>
                                            </button>
                                            <button @click="moveChild(groupIndex, itemIndex, 'down')" :disabled="itemIndex === group.children.length - 1"
                                                class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                                </svg>
                                            </button>
                                        </div>
                                        <span class="text-gray-700 dark:text-gray-300 truncate" x-text="$store.i18n.locale === 'zh' ? item.name_zh : item.name_en"></span>
                                        <span class="hidden sm:inline text-xs text-gray-400 flex-shrink-0" x-text="item.url"></span>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer flex-shrink-0" @click.stop>
                                        <input type="checkbox" class="sr-only peer" :checked="item.visible" @change="toggleVisibility(item)">
                                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-500 peer-checked:bg-green-500"></div>
                                    </label>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>
        
        <!-- 用户前台菜单 -->
        <template x-if="currentTab === 'user'">
            <div id="user-menu-list" class="space-y-4">
                <template x-for="(group, groupIndex) in structured" :key="group.menu_key">
                    <div class="bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-xl overflow-hidden menu-group hover:shadow-lg transition-shadow" :data-key="group.menu_key">
                        <!-- 一级菜单 -->
                        <div class="flex items-center justify-between px-4 py-3 bg-gray-50 dark:bg-gray-700/50 border-b border-gray-200 dark:border-gray-700 group-header">
                            <div class="flex items-center space-x-2 sm:space-x-3 flex-1 min-w-0">
                                <!-- 上下移动按钮 -->
                                <div class="flex flex-col space-y-0.5">
                                    <button @click="moveGroup(groupIndex, 'up')" :disabled="groupIndex === 0"
                                        class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                                        </svg>
                                    </button>
                                    <button @click="moveGroup(groupIndex, 'down')" :disabled="groupIndex === structured.length - 1"
                                        class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                        </svg>
                                    </button>
                                </div>
                                <span class="font-medium text-gray-900 dark:text-white truncate" x-text="$store.i18n.locale === 'zh' ? group.name_zh : group.name_en"></span>
                                <span class="hidden sm:inline text-xs text-gray-500 dark:text-gray-400 flex-shrink-0" x-text="'(' + group.menu_key + ')'"></span>
                                <span x-show="group.url" class="hidden sm:inline text-xs text-gray-400 flex-shrink-0" x-text="group.url"></span>
                            </div>
                            <div class="flex items-center space-x-2 sm:space-x-4 flex-shrink-0">
                                <span x-show="group.children && group.children.length > 0" class="hidden sm:inline text-sm text-gray-500 dark:text-gray-400" x-text="group.children.length + ' ' + $store.i18n.t('sidebar.subMenus')"></span>
                                <label class="relative inline-flex items-center cursor-pointer" @click.stop>
                                    <input type="checkbox" class="sr-only peer" :checked="group.visible" @change="toggleVisibility(group)">
                                    <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-500 peer-checked:bg-green-500"></div>
                                </label>
                            </div>
                        </div>
                        
                        <!-- 子菜单列表 -->
                        <div x-show="group.children && group.children.length > 0" class="divide-y divide-gray-100 dark:divide-gray-700 sub-menu-list" :data-parent="group.menu_key">
                            <template x-for="(item, itemIndex) in group.children" :key="item.menu_key">
                                <div class="flex items-center justify-between px-4 py-3 hover:bg-gray-50 dark:hover:bg-gray-700/30 sub-menu-item" :data-key="item.menu_key">
                                    <div class="flex items-center space-x-2 sm:space-x-3 pl-4 sm:pl-8 flex-1 min-w-0">
                                        <!-- 上下移动按钮 -->
                                        <div class="flex flex-col space-y-0.5">
                                            <button @click="moveChild(groupIndex, itemIndex, 'up')" :disabled="itemIndex === 0"
                                                class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path>
                                                </svg>
                                            </button>
                                            <button @click="moveChild(groupIndex, itemIndex, 'down')" :disabled="itemIndex === group.children.length - 1"
                                                class="p-0.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 disabled:opacity-30 disabled:cursor-not-allowed">
                                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                                                </svg>
                                            </button>
                                        </div>
                                        <span class="text-gray-700 dark:text-gray-300 truncate" x-text="$store.i18n.locale === 'zh' ? item.name_zh : item.name_en"></span>
                                        <span class="hidden sm:inline text-xs text-gray-400 flex-shrink-0" x-text="item.url"></span>
                                    </div>
                                    <label class="relative inline-flex items-center cursor-pointer flex-shrink-0" @click.stop>
                                        <input type="checkbox" class="sr-only peer" :checked="item.visible" @change="toggleVisibility(item)">
                                        <div class="w-9 h-5 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all dark:border-gray-500 peer-checked:bg-green-500"></div>
                                    </label>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- 保存按钮 -->
    <div x-show="!loading && hasChanges" class="fixed bottom-6 right-6">
        <button @click="saveChanges()" :disabled="saving"
            class="px-6 py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl shadow-lg flex items-center space-x-2 disabled:opacity-50">
            <svg x-show="saving" class="w-5 h-5 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
            <span x-text="saving ? $store.i18n.t('common.saving') : $store.i18n.t('common.save')"></span>
        </button>
    </div>
</div>

<style>
.sortable-ghost {
    opacity: 0.4;
    background: #c8ebfb;
}
.sortable-chosen {
    background: #f3f4f6;
}
.dark .sortable-ghost {
    background: #374151;
}
.dark .sortable-chosen {
    background: #4b5563;
}
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/sortable.min.js') }}"></script>
<script>
function sidebarPage() {
    return {
        currentTab: 'admin',
        menus: [],
        structured: [],
        loading: true,
        saving: false,
        resetting: false,
        hasChanges: false,
        originalData: null,
        sortableInstances: [],
        
        get token() { return localStorage.getItem('token'); },
        
        async init() {
            if (!this.token) {
                window.location.href = '/login';
                return;
            }
            await this.loadMenus();
        },
        
        async resetMenus() {
            if (!confirm(Alpine.store('i18n').t('sidebar.resetConfirm'))) {
                return;
            }
            this.resetting = true;
            try {
                const res = await fetch('/api/admin/sidebar/menus/reset', {
                    method: 'POST',
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    alert(Alpine.store('i18n').t('common.saveSuccess'));
                    await this.loadMenus();
                    // 刷新侧边栏
                    await Alpine.store('sidebarMenu').init();
                } else {
                    alert(data.message || Alpine.store('i18n').t('common.saveFailed'));
                }
            } catch (e) {
                console.error('Reset menus failed:', e);
                alert(Alpine.store('i18n').t('common.saveFailed'));
            }
            this.resetting = false;
        },
        
        async loadMenus() {
            this.loading = true;
            // 销毁旧的 sortable 实例
            this.destroySortables();
            
            try {
                const res = await fetch(`/api/admin/sidebar/menus?type=${this.currentTab}`, {
                    headers: { 'Authorization': 'Bearer ' + this.token }
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.menus = data.data.menus;
                    this.structured = data.data.structured;
                    this.originalData = JSON.stringify(this.structured);
                    this.hasChanges = false;
                    
                    // 等待 DOM 更新后初始化拖拽
                    this.$nextTick(() => {
                        setTimeout(() => this.initSortable(), 100);
                    });
                }
            } catch (e) {
                console.error('Load menus failed:', e);
            }
            this.loading = false;
        },
        
        destroySortables() {
            this.sortableInstances.forEach(instance => {
                if (instance && instance.destroy) {
                    instance.destroy();
                }
            });
            this.sortableInstances = [];
        },
        
        initSortable() {
            // 不再使用 Sortable.js 拖拽，改用按钮移动
            // 保留空函数以兼容现有调用
        },
        
        // 移动菜单位置
        moveGroup(index, direction) {
            const newIndex = direction === 'up' ? index - 1 : index + 1;
            if (newIndex < 0 || newIndex >= this.structured.length) return;
            
            // 交换位置
            const temp = this.structured[index];
            this.structured[index] = this.structured[newIndex];
            this.structured[newIndex] = temp;
            
            // 更新 sort_order
            this.structured.forEach((group, idx) => {
                group.sort_order = (idx + 1) * 10;
            });
            
            this.checkChanges();
        },
        
        // 移动子菜单位置
        moveChild(groupIndex, childIndex, direction) {
            const group = this.structured[groupIndex];
            if (!group || !group.children) return;
            
            const newIndex = direction === 'up' ? childIndex - 1 : childIndex + 1;
            if (newIndex < 0 || newIndex >= group.children.length) return;
            
            // 交换位置
            const temp = group.children[childIndex];
            group.children[childIndex] = group.children[newIndex];
            group.children[newIndex] = temp;
            
            // 更新 sort_order
            group.children.forEach((child, idx) => {
                child.sort_order = idx + 1;
            });
            
            this.checkChanges();
        },
        
        toggleVisibility(item) {
            item.visible = !item.visible;
            this.checkChanges();
        },
        
        checkChanges() {
            this.hasChanges = JSON.stringify(this.structured) !== this.originalData;
        },
        
        async saveChanges() {
            this.saving = true;
            try {
                // 收集所有菜单的更新数据
                const updates = [];
                for (const group of this.structured) {
                    updates.push({
                        menu_key: group.menu_key,
                        visible: group.visible,
                        sort_order: group.sort_order
                    });
                    if (group.children) {
                        for (const child of group.children) {
                            updates.push({
                                menu_key: child.menu_key,
                                visible: child.visible,
                                sort_order: child.sort_order
                            });
                        }
                    }
                }
                
                const res = await fetch('/api/admin/sidebar/menus/batch', {
                    method: 'PUT',
                    headers: {
                        'Authorization': 'Bearer ' + this.token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        menu_type: this.currentTab,
                        menus: updates
                    })
                });
                const data = await res.json();
                if (data.code === 200) {
                    this.originalData = JSON.stringify(this.structured);
                    this.hasChanges = false;
                    // 显示成功提示
                    alert(this.$store.i18n.t('sidebar.saveSuccess'));
                    // 刷新侧边栏数据
                    await Alpine.store('sidebarMenu').init();
                } else {
                    alert(data.message || this.$store.i18n.t('common.saveFailed'));
                }
            } catch (e) {
                console.error('Save failed:', e);
                alert(this.$store.i18n.t('common.saveFailed'));
            }
            this.saving = false;
        }
    }
}
</script>
{% endblock %}
